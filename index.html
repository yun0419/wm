function showCreateQuestionnaireModal(sessionId) {
    var session = appData.sessions.find(function(s) { return s.sessionId === sessionId; });
    if (!session) return;
    var friendId = session.type === 'friend' ? session.targetId : null;
    if (!friendId) {
        alert('仅支持单人聊天');
        return;
    }
    
    var questions = [];
    var questionCounter = 0;
    var currentCreateMode = 'manual';
    
    function addQuestion() {
        questionCounter++;
        questions.push({
            id: 'q' + Date.now() + '_' + questionCounter,
            text: '',
            type: 'choice',
            options: ['', ''],
            multiple: false,
            jumpMap: {}
        });
        render();
    }
    
    function removeQuestion(index) {
        if (questions.length <= 1) {
            alert('至少保留一个问题');
            return;
        }
        questions.splice(index, 1);
        render();
    }
    
    function moveQuestion(fromIdx, toIdx) {
        if (toIdx < 0 || toIdx >= questions.length) return;
        var item = questions.splice(fromIdx, 1)[0];
        questions.splice(toIdx, 0, item);
        render();
    }
    
    function render() {
        var container = modal.querySelector('#questionBuilder');
        if (!container) return;
        
        var html = '';
        for (var i = 0; i < questions.length; i++) {
            var q = questions[i];
            var typeLabel = q.type === 'choice' ? '选择题' : (q.type === 'truefalse' ? '对错题' : (q.type === 'multiple' ? '多选题' : '解答题'));
            
            var optionsHtml = '';
            if (q.type !== 'essay') {
                optionsHtml = '<div style="font-size:12px;color:#888;margin-bottom:4px;">选项：</div>';
                for (var oi = 0; oi < q.options.length; oi++) {
                    var opt = q.options[oi];
                    optionsHtml += '<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center;">';
                    optionsHtml += '<input type="text" class="optionInput" data-qidx="' + i + '" data-oidx="' + oi + '" value="' + escapeHtml(opt) + '" placeholder="选项 ' + (oi+1) + '" style="flex:1;padding:4px 8px;border-radius:6px;border:0.5px solid #ddd;font-size:12px;">';
                    if (q.options.length > 2) {
                        optionsHtml += '<button class="removeOptionBtn" data-qidx="' + i + '" data-oidx="' + oi + '" style="background:#ff3b30;padding:1px 6px;font-size:10px;border-radius:10px;">✕</button>';
                    }
                    optionsHtml += '<select class="jumpSelect" data-qidx="' + i + '" data-oidx="' + oi + '" style="padding:2px 4px;font-size:11px;border-radius:6px;border:0.5px solid #ddd;max-width:70px;">';
                    optionsHtml += '<option value="">下一题</option>';
                    for (var qi = 0; qi < questions.length; qi++) {
                        var selected = (q.jumpMap && q.jumpMap[oi] === qi) ? 'selected' : '';
                        optionsHtml += '<option value="' + qi + '" ' + selected + '>→ ' + (qi+1) + '</option>';
                    }
                    optionsHtml += '</select></div>';
                }
                if (q.type !== 'essay') {
                    optionsHtml += '<button class="addOptionBtn" data-qidx="' + i + '" style="background:#888;padding:2px 8px;font-size:10px;border-radius:12px;">+ 添加选项</button>';
                }
            }
            
            html += '<div class="question-item" data-idx="' + i + '" style="background:#f8f8fa;border-radius:10px;padding:12px;margin-bottom:12px;border-left:3px solid #07c160;position:relative;">';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
            html += '<span style="font-weight:600;font-size:13px;">#' + (i+1) + ' ' + typeLabel + '</span>';
            html += '<div style="display:flex;gap:4px;">';
            html += '<button class="moveUpBtn" data-idx="' + i + '" ' + (i === 0 ? 'disabled' : '') + ' style="background:#888;padding:2px 8px;font-size:10px;border-radius:12px;' + (i === 0 ? 'opacity:0.3;' : '') + '">↑</button>';
            html += '<button class="moveDownBtn" data-idx="' + i + '" ' + (i === questions.length-1 ? 'disabled' : '') + ' style="background:#888;padding:2px 8px;font-size:10px;border-radius:12px;' + (i === questions.length-1 ? 'opacity:0.3;' : '') + '">↓</button>';
            html += '<button class="removeQBtn" data-idx="' + i + '" style="background:#ff3b30;padding:2px 8px;font-size:10px;border-radius:12px;">删除</button>';
            html += '</div></div>';
            html += '<input type="text" class="qTextInput" data-idx="' + i + '" placeholder="请输入问题内容..." value="' + escapeHtml(q.text) + '" style="width:100%;padding:6px 10px;border-radius:8px;border:0.5px solid #ddd;font-size:13px;margin-bottom:6px;">';
            html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;">';
            html += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="radio" name="qType_' + i + '" value="choice" ' + (q.type === 'choice' ? 'checked' : '') + ' class="qTypeRadio" data-idx="' + i + '"> 单选题</label>';
html += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="radio" name="qType_' + i + '" value="multiple" ' + (q.type === 'multiple' ? 'checked' : '') + ' class="qTypeRadio" data-idx="' + i + '"> 多选题</label>';
html += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="radio" name="qType_' + i + '" value="truefalse" ' + (q.type === 'truefalse' ? 'checked' : '') + ' class="qTypeRadio" data-idx="' + i + '"> 对错题</label>';
html += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="radio" name="qType_' + i + '" value="essay" ' + (q.type === 'essay' ? 'checked' : '') + ' class="qTypeRadio" data-idx="' + i + '"> 解答题</label>';
html += '<label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="radio" name="qType_' + i + '" value="sort" ' + (q.type === 'sort' ? 'checked' : '') + ' class="qTypeRadio" data-idx="' + i + '"> 排序题</label>';
            html += '</div>';
            html += '<div class="optionsContainer" data-idx="' + i + '" style="' + (q.type === 'essay' ? 'display:none;' : '') + '">' + optionsHtml + '</div>';
            html += '<div style="font-size:10px;color:#999;margin-top:4px;">题型：' + typeLabel + '</div>';
            html += '</div>';
        }
        
        container.innerHTML = html;
        bindQuestionEvents();
    }
    
    function bindQuestionEvents() {
        var container = modal.querySelector('#questionBuilder');
        if (!container) return;
        
        var removeBtns = container.querySelectorAll('.removeQBtn');
        for (var i = 0; i < removeBtns.length; i++) {
            (function(btn) {
                btn.onclick = function() {
                    var idx = parseInt(btn.dataset.idx);
                    removeQuestion(idx);
                };
            })(removeBtns[i]);
        }
        
        var upBtns = container.querySelectorAll('.moveUpBtn');
        for (var i = 0; i < upBtns.length; i++) {
            (function(btn) {
                btn.onclick = function() {
                    var idx = parseInt(btn.dataset.idx);
                    moveQuestion(idx, idx - 1);
                };
            })(upBtns[i]);
        }
        
        var downBtns = container.querySelectorAll('.moveDownBtn');
        for (var i = 0; i < downBtns.length; i++) {
            (function(btn) {
                btn.onclick = function() {
                    var idx = parseInt(btn.dataset.idx);
                    moveQuestion(idx, idx + 1);
                };
            })(downBtns[i]);
        }
        
        var textInputs = container.querySelectorAll('.qTextInput');
        for (var i = 0; i < textInputs.length; i++) {
            (function(input) {
                input.oninput = function() {
                    var idx = parseInt(input.dataset.idx);
                    questions[idx].text = input.value;
                };
            })(textInputs[i]);
        }
        
        var typeRadios = container.querySelectorAll('.qTypeRadio');
        for (var i = 0; i < typeRadios.length; i++) {
            (function(radio) {
                radio.onchange = function() {
                    var idx = parseInt(radio.dataset.idx);
                    var newType = radio.value;
                    questions[idx].type = newType;
                    if (newType === 'truefalse') {
                        questions[idx].options = ['对', '错'];
                    } else if (newType === 'essay') {
                        questions[idx].options = [];
                    } else if ((newType === 'choice' || newType === 'multiple') && questions[idx].options.length < 2) {
                        questions[idx].options = ['', ''];
                    }
                    render();
                };
            })(typeRadios[i]);
        }
        
        var optionInputs = container.querySelectorAll('.optionInput');
        for (var i = 0; i < optionInputs.length; i++) {
            (function(input) {
                input.oninput = function() {
                    var qidx = parseInt(input.dataset.qidx);
                    var oidx = parseInt(input.dataset.oidx);
                    questions[qidx].options[oidx] = input.value;
                };
            })(optionInputs[i]);
        }
        
        var addOptionBtns = container.querySelectorAll('.addOptionBtn');
        for (var i = 0; i < addOptionBtns.length; i++) {
            (function(btn) {
                btn.onclick = function() {
                    var qidx = parseInt(btn.dataset.qidx);
                    questions[qidx].options.push('');
                    render();
                };
            })(addOptionBtns[i]);
        }
        
        var removeOptionBtns = container.querySelectorAll('.removeOptionBtn');
        for (var i = 0; i < removeOptionBtns.length; i++) {
            (function(btn) {
                btn.onclick = function() {
                    var qidx = parseInt(btn.dataset.qidx);
                    var oidx = parseInt(btn.dataset.oidx);
                    if (questions[qidx].options.length <= 2) {
                        alert('至少需要2个选项');
                        return;
                    }
                    questions[qidx].options.splice(oidx, 1);
                    render();
                };
            })(removeOptionBtns[i]);
        }
        
        var jumpSelects = container.querySelectorAll('.jumpSelect');
        for (var i = 0; i < jumpSelects.length; i++) {
            (function(sel) {
                sel.onchange = function() {
                    var qidx = parseInt(sel.dataset.qidx);
                    var oidx = parseInt(sel.dataset.oidx);
                    var val = sel.value;
                    if (!questions[qidx].jumpMap) questions[qidx].jumpMap = {};
                    if (val === '') {
                        delete questions[qidx].jumpMap[oidx];
                    } else {
                        questions[qidx].jumpMap[oidx] = parseInt(val);
                    }
                };
            })(jumpSelects[i]);
        }
    }
    
    function switchMode(mode) {
        currentCreateMode = mode;
        var modeContainer = modal.querySelector('#createModeContainer');
        if (!modeContainer) return;
        
        if (mode === 'manual') {

                }

    var sendBtn = modal.querySelector('#sendQuestionnaireBtn');

        sendBtn.onclick = function() {
            var title = modal.querySelector('#questionnaireTitle').value.trim();
            if (!title) {
                alert('请输入问卷标题');
                return;
            }
            if (questions.length === 0) {
                alert('请至少添加一道题');
                return;
            }
            
            var valid = true;
            for (var i = 0; i < questions.length; i++) {
                var q = questions[i];
                if (!q.text.trim()) {
                    alert('问题 ' + (i+1) + ' 内容不能为空');
                    valid = false;
                    break;
                }
                if (q.type !== 'essay') {
                    var validOptions = q.options.filter(function(o) { return o.trim(); });
                    if (validOptions.length < 2) {
                        alert('问题 ' + (i+1) + ' 至少需要2个有效选项');
                        valid = false;
                        break;
                    }
                }
                if (q.jumpMap) {
                    for (var oi in q.jumpMap) {
                        var target = q.jumpMap[oi];
                        if (target < 0 || target >= questions.length || target === i) {
                            alert('问题 ' + (i+1) + ' 的跳转目标无效');
                            valid = false;
                            break;
                        }
                    }
                }
                if (!valid) break;
            }
            if (!valid) return;
            
            var randomHours = Math.random() * 24;
            var delayMs = randomHours * 60 * 60 * 1000;
            
            var questionnaire = {
                id: 'q' + Date.now(),
                title: title,
                sessionId: sessionId,
                friendId: friendId,
                direction: 'sent',
                fromMe: true,
                questions: questions.map(function(q) {
                    return {
                        id: q.id,
                        text: q.text,
                        type: q.type,
                        options: q.type === 'essay' ? [] : q.options.filter(function(o) { return o.trim(); }),
                        multiple: q.multiple || false,
                        jumpMap: q.jumpMap || {}
                    };
                }),
                answers: {},
                status: 'pending',
                hasRedDot: false,
                createdAt: Date.now(),
                completedAt: null,
                expectedReplyTimestamp: Date.now() + delayMs
            };
            
            appData.questionnaires[questionnaire.id] = questionnaire;
            saveData();
            sendQuestionnaireAsFile(sessionId, questionnaire, true);
            modal.remove();
            
            var hours = Math.floor(randomHours);
            var minutes = Math.floor((randomHours - hours) * 60);
            alert('问卷已发送，预计 ' + hours + '小时' + (minutes > 0 ? minutes + '分钟' : '') + ' 后对方开始回答');
            showQuestionnaireManager(sessionId);
        };
    }
}

// ===== 新增：获取题库总题数 =====
function getQuestionBankTotalCount() {
    var total = 0;
    for (var cat in appData.questionBank) {
        if (appData.questionBank.hasOwnProperty(cat)) {
            total += (appData.questionBank[cat] || []).length;
        }
    }
    return total;
}

// ==================== 显示已完成问卷的答案详情 ====================
function showCompletedResult(questionnaireId) {
    var q = appData.questionnaires[questionnaireId];
    if (!q) {
        alert('问卷不存在或已被删除');
        return;
    }
    
    var friendName = '对方';
    var friend = appData.friends.find(function(f) { return f.id === q.friendId; });
    if (friend) friendName = friend.name;

                if (qItem2.type === 'essay') {
                    var input = body.querySelector('#essayAnswer');
                    if (input) {
                        answers[qItem2.id] = input.value;
                        q.answers[qItem2.id] = input.value;
                        saveData();
                    }
                }
                
                var answer = answers[qItem2.id];
                if (answer === undefined || answer === null || answer === '') {
                    alert('请先回答当前题目');
                    return;
                }
                if (Array.isArray(answer) && answer.length === 0) {
                    alert('请至少选择一个选项');
                    return;
                }
                if (typeof answer === 'string' && !answer.trim()) {
                    alert('请输入回答内容');
                    return;
                }
                
                q.answers[qItem2.id] = answer;
                saveData();
                
                var allAnswered = true;
                for (var i = 0; i < q.questions.length; i++) {
                    var qi = q.questions[i];
                    if (q.answers[qi.id] === undefined || q.answers[qi.id] === null || q.answers[qi.id] === '') {
                        allAnswered = false;
                        break;
                    }
                }
                
                if (allAnswered) {
                    q.status = 'completed';
                    q.completedAt = Date.now();
                    q.hasRedDot = true;
                    saveData();
                    if (modalRef) modalRef.remove();
                    alert('✅ 问卷已提交完成！');
                    if (currentOpenChatWindow && currentOpenSessionId) {
                        renderChatMessagesToWindow(currentOpenChatWindow, currentOpenSessionId);
                    }
                    return;
                }
                
                var jumpTo = getJumpTarget(qItem2, answer);
                if (jumpTo !== null && jumpTo < q.questions.length) {
                    renderQuestion(jumpTo);
                } else {
                    var nextUnanswered = findFirstUnanswered();
                    if (nextUnanswered !== -1) {
                        renderQuestion(nextUnanswered);
                    } else {
                        q.status = 'completed';
                        q.completedAt = Date.now();
                        q.hasRedDot = true;
                        saveData();
                        if (modalRef) modalRef.remove();

function renderQuestionsReadOnly() {

        var qItem = q.questions[i];
        var answer = q.answers[qItem.id];
        var isAnswered = answer !== undefined && answer !== null && answer !== '';
        var typeLabel = qItem.type === 'choice' ? '单选题' : (qItem.type === 'multiple' ? '多选题' : (qItem.type === 'truefalse' ? '对错题' : '解答题'));
        
        var optionsHtml = '';
        if (qItem.type === 'sort') {
    // 排序题：按排名顺序显示选项
    if (Array.isArray(answer) && answer.length > 0) {
        optionsHtml = '<div style="font-size:12px;color:#888;margin-top:2px;">';
        for (var ri = 0; ri < answer.length; ri++) {
            var idx = answer[ri];
            var opt = qItem.options[idx] || '选项' + (idx + 1);

        }

} else if (qItem.type !== 'essay') {
    optionsHtml = '<div style="font-size:12px;color:#888;margin-top:2px;">';
    for (var oi = 0; oi < qItem.options.length; oi++) {
        var opt = qItem.options[oi];
        var isSelected = false;
        if (Array.isArray(answer)) {
            isSelected = answer.includes(oi);
        } else if (typeof answer === 'number') {
            isSelected = answer === oi;
        }
        var checkMark = isSelected ? '✅ ' : '▪ ';
        optionsHtml += '<div style="padding:3px 0;">' + checkMark + escapeHtml(opt) + '</div>';
    }
    optionsHtml += '</div>';
} else {
    if (typeof answer === 'string' && answer) {
        optionsHtml = '<div style="margin-top:4px;padding:8px;background:#f5f5f5;border-radius:6px;font-size:13px;">' + escapeHtml(answer) + '</div>';
    } else {
        optionsHtml = '<div style="margin-top:4px;color:#8e8e93;font-size:12px;">未作答</div>';
    }
}
        
        var answerDisplay = '';
        if (isAnswered) {
            if (Array.isArray(answer)) {
                var labels = answer.map(function(idx) { return qItem.options[idx] || '未知'; });
                answerDisplay = '已选：' + labels.join('、');
            } else if (typeof answer === 'string') {
                answerDisplay = '回答：' + escapeHtml(answer);
            } else if (typeof answer === 'number') {
                answerDisplay = '已选：' + escapeHtml(qItem.options[answer] || '未知');
            } else {
                answerDisplay = '已作答';
            }
        } else {
            answerDisplay = '未作答';
        }
        
        var borderColor = isAnswered ? '#07c160' : '#ff9500';
        html += '<div style="background:#f8f8fa;border-radius:8px;padding:10px;margin-bottom:8px;border-left:3px solid ' + borderColor + ';">';

        html += optionsHtml;

        html += '</div>';
    }
    return html;
}

function importQuestionsFromText(text) {
    if (!text || !text.trim()) return [];
    
    var lines = text.split(/\r?\n/);
    var questions = [];
    var currentQ = null;
    var currentType = 'choice';
    var isCollectingOptions = false;
    
    for (var li = 0; li < lines.length; li++) {
        var line = lines[li].trim();
        if (!line) continue;
        if (line.startsWith('---') || line.startsWith('===')) continue;
        if (line.startsWith('#') && !line.includes('分类')) continue;
        
        var typeMatch = line.match(/\[(.+?)\]/);
if (typeMatch) {
    var typeName = typeMatch[1];
    if (typeName.includes('选择') || typeName === 'choice') {
        currentType = 'choice';
    } else if (typeName.includes('多选') || typeName === 'multiple') {
        currentType = 'multiple';
    } else if (typeName.includes('对错') || typeName === 'truefalse') {
        currentType = 'truefalse';
    } else if (typeName.includes('解答') || typeName === 'essay' || typeName === '简答') {
        currentType = 'essay';
    } else if (typeName.includes('排序') || typeName === 'sort') {
        currentType = 'sort';
    }
            
            var textPart = line.replace(/\[.+?\]/, '').trim();
            textPart = textPart.replace(/^\d+[.、]\s*/, '');
            if (textPart) {
    if (currentQ && currentQ.text) questions.push(currentQ);
    currentQ = {
        id: 'qb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        text: textPart,
        type: currentType,
        options: [],
        disabled: false
    };
    isCollectingOptions = (currentType !== 'essay');
}
            continue;
        }
        
        var numMatch = line.match(/^(\d+)[.、]\s*(.+)/);
        if (numMatch && !typeMatch) {
            if (currentQ && currentQ.text) {
    questions.push(currentQ);
}
currentQ = {
    id: 'qb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
    text: numMatch[2].trim(),
    type: currentType || 'choice',
    options: [],
    disabled: false
};
isCollectingOptions = (currentQ.type !== 'essay');
            continue;
        }
        
        var optMatch = line.match(/^([A-Za-z])[.、]\s*(.+)/);
        if (optMatch) {
            if (currentQ && isCollectingOptions) {
                currentQ.options.push(optMatch[2].trim());
            }
            continue;
        }
        
        if (currentQ && currentQ.type === 'truefalse' && (line === '对' || line === '错')) {
            if (currentQ.options.length === 0) {
                currentQ.options = ['对', '错'];
            }
            continue;
        }
        
        if (currentQ) {
            currentQ.text += ' ' + line;
        }
    }
    
    if (currentQ && currentQ.text) {
    if ((currentQ.type === 'choice' || currentQ.type === 'multiple') && currentQ.options.length < 2) {
        currentQ.options = ['选项A', '选项B'];
    }
    if (currentQ.type === 'truefalse' && currentQ.options.length === 0) {
        currentQ.options = ['对', '错'];
    }
    // 确保 disabled 字段存在
    if (currentQ.disabled === undefined) {
        currentQ.disabled = false;
    }
    questions.push(currentQ);
}
    
    return questions;
}

function generateRandomQuestionnaire(sessionId, friendId) {
    // 收集所有题目 - 过滤掉 disabled: true 的题目
    var allQuestions = [];
    for (var cat in appData.questionBank) {
        if (appData.questionBank.hasOwnProperty(cat)) {
            var items = appData.questionBank[cat] || [];
            for (var i = 0; i < items.length; i++) {
                // 只收集未被禁用的题目
                if (!items[i].disabled) {
                    allQuestions.push({ ...items[i], category: cat });
                }
            }
        }
    }
    
    // 可用题目至少需要 2 道才能生成问卷
    if (allQuestions.length < 2) {
        console.log("可用题目不足2题，跳过问卷生成");
        return;
    }
    
    // 随机选择 2-20 道题
    var maxCount = Math.min(20, allQuestions.length);
    var minCount = Math.min(2, maxCount);
    var count = Math.floor(Math.random() * (maxCount - minCount + 1)) + minCount;
    
    var shuffled = [...allQuestions];
    for (var i = shuffled.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
    }
    var selected = shuffled.slice(0, count);
    
    // 确保题型混合
    var typeCount = {};
    for (var i = 0; i < selected.length; i++) {
        var t = selected[i].type || 'choice';
        typeCount[t] = (typeCount[t] || 0) + 1;
    }
    var types = Object.keys(typeCount);
    if (types.length < 2 && allQuestions.length >= 4) {
        var otherTypes = ['choice', 'multiple', 'truefalse', 'essay'].filter(function(t) {
            return t !== types[0];
        });
        var extraQuestions = [];
        for (var i = 0; i < allQuestions.length; i++) {
            var q = allQuestions[i];
            if (q.type === otherTypes[0] && !selected.includes(q)) {
                extraQuestions.push(q);
                break;
            }
        }
        if (extraQuestions.length > 0) {
            selected[selected.length - 1] = extraQuestions[0];
            for (var i = selected.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = selected[i];
                selected[i] = selected[j];
                selected[j] = temp;
            }
        }
    }
    
    // 构建问卷题目
    var questions = [];
    for (var i = 0; i < selected.length; i++) {
        var q = selected[i];
        var options = [];
        if (q.type === 'essay') {
            options = [];
        } else if (q.type === 'truefalse') {
            options = ['对', '错'];
        } else {
            options = (q.options && q.options.length > 0) ? q.options : ['', ''];
        }
        questions.push({
            id: 'q' + Date.now() + '_' + i,
            text: q.text,
            type: q.type || 'choice',
            options: options,
            multiple: (q.type === 'multiple'),
            jumpMap: {}
        });
    }
    
    // 随机标题
    var titles = ['日常小问卷 📋', '心情小测试 💭', '随便聊聊 ✨', '趣味问答 🎯', '了解一下 🌸', '随机问答 🤔', '默契大考验 💕', '真心话 📝', '好奇一下 👀', '随便问问 🧐'];
    var title = titles[Math.floor(Math.random() * titles.length)];
    
    // 构建问卷（标记为对方发来的）
    var questionnaire = {
        id: 'q' + Date.now() + '_auto_' + Math.random().toString(36).substr(2, 4),
        title: title,
        sessionId: sessionId,
        friendId: friendId,
        direction: 'received',
        fromMe: false,
        questions: questions,
        answers: {},
        status: 'pending',
        hasRedDot: false,
        createdAt: Date.now(),
        completedAt: null,
        expectedReplyTimestamp: Date.now()
    };
    
    // ===== 关键修复：确保问卷对象完整后再发送 =====
    appData.questionnaires[questionnaire.id] = questionnaire;
    saveData();
    
    // ===== 关键修复：第三个参数 false 表示"对方发来的" =====
    sendQuestionnaireAsFile(sessionId, questionnaire, false);
    
    if (currentOpenChatWindow && currentOpenSessionId === sessionId) {
        renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
    }
    
    var friend = appData.friends.find(function(f) { return f.id === friendId; });
    var friendName = friend ? friend.name : '对方';
    alert('📋 ' + friendName + ' 给你发了一份问卷：' + title + '\n\n点击聊天中的问卷卡片开始作答');
}

    lines.push("  👤 好友数：" + (appData.friends ? appData.friends.length : 0));
    lines.push("  👥 群聊数：" + (appData.groups ? appData.groups.length : 0));
    lines.push("  💬 会话数：" + sessionCount);
    lines.push("  💬 总消息数：" + totalMsgs);
    lines.push("  📱 朋友圈：" + (appData.moments ? appData.moments.length : 0));
    lines.push("  📖 日记：" + (appData.diaryEntries ? appData.diaryEntries.length : 0));
    lines.push("  ✉️ 信件：" + (function() { var c = 0; for (var k in appData.letters) { if (appData.letters.hasOwnProperty(k)) c += appData.letters[k].length; } return c; })());
    lines.push("  💕 情侣空间：" + (function() { var c = 0; for (var k in appData.coupleSpaces) { if (appData.coupleSpaces.hasOwnProperty(k) && appData.coupleSpaces[k].enabled) c++; } return c; })());
    lines.push("  📊 投票：" + Object.keys(appData.votes || {}).length);
    lines.push("  📋 问卷：" + Object.keys(appData.questionnaires || {}).length);
    lines.push("");
    lines.push("╔══════════════════════════════════════════════════════════╗");
    lines.push("║              📄 导出完成 · 感谢使用                    ║");
    lines.push("╚══════════════════════════════════════════════════════════╝");
    
    // ===== 下载 =====
    var textContent = lines.join("\n");
    var blob = new Blob([textContent], { type: "text/plain;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    
    var dateStr = now.getFullYear() + "-" + 
                  String(now.getMonth() + 1).padStart(2, "0") + "-" + 
                  String(now.getDate()).padStart(2, "0") + "_" +
                  String(now.getHours()).padStart(2, "0") + "-" +
                  String(now.getMinutes()).padStart(2, "0");
    var filename = "完整数据档案_" + dateStr + ".txt";
    
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    
    alert("✅ 完整数据档案导出成功！\n\n📁 文件名：" + filename + "\n📄 用记事本打开即可阅读\n\n📊 包含：聊天记录、朋友圈、日记、信件、情侣空间、词条库、记·念、日历、投票、问卷");
}

function importAllData() {
    var input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    
    input.onchange = function(e) {
        var file = e.target.files[0];
        if (!file) return;
        
        var reader = new FileReader();
        reader.onload = function(ev) {
            try {
                var importedData = JSON.parse(ev.target.result);
                
                if (!importedData.version || !importedData.user) {
                    showImportResultModal("❌ 无效的备份文件，请检查文件格式", "error");
                    return;
                }
                
                var confirmMsg = "⚠️ 导入将覆盖当前所有数据！\n\n";
                confirmMsg += "📊 备份文件包含：\n";
                confirmMsg += "  • 好友：" + (importedData.friends ? importedData.friends.length : 0) + " 人\n";
                confirmMsg += "  • 群聊：" + (importedData.groups ? importedData.groups.length : 0) + " 个\n";
                
                var msgCount = 0;
                if (importedData.messages) {
                    for (var sid in importedData.messages) {
                        if (importedData.messages.hasOwnProperty(sid)) {
                            msgCount += importedData.messages[sid].length;
                        }
                    }
                }
                confirmMsg += "  • 消息：" + msgCount + " 条\n";
                confirmMsg += "  • 日记：" + (importedData.diaryEntries ? importedData.diaryEntries.length : 0) + " 篇\n";
                confirmMsg += "  • 朋友圈：" + (importedData.moments ? importedData.moments.length : 0) + " 条\n";
                confirmMsg += "  • 问卷：" + (importedData.questionnaires ? Object.keys(importedData.questionnaires).length : 0) + " 份\n";
                confirmMsg += "  • 信件：" + (importedData.letters ? Object.keys(importedData.letters).length : 0) + " 位好友的信件\n\n";
                confirmMsg += "⚠️ 此操作将覆盖当前所有数据，不可撤销！\n\n确定继续吗？";
                
                if (!confirm(confirmMsg)) return;
                
                for (var key in importedData) {
                    if (importedData.hasOwnProperty(key) && key !== "version" && key !== "exportTime") {
                        appData[key] = importedData[key];
                    }
                }
                
                saveData();
                buildSessionsFromData();
                restoreVoteTimers();
                startLetterCheckLoop();
                applyGlobalTheme();
                renderCurrentPage();
                attachDynamicEvents();
                
                var successMsg = "✅ 数据导入成功！\n\n" +
                      "📅 备份时间：" + (importedData.exportTime || "未知") + "\n" +
                      "📦 版本：" + (importedData.version || "1.0") + "\n\n" +
                      "🔄 页面已刷新，请查看数据恢复情况。";
                
                showImportResultModal(successMsg, "success");
                
            } catch (err) {
                showImportResultModal("❌ 导入失败：文件格式错误或已损坏\n\n" + err.message, "error");
                console.error("导入错误:", err);
            }
        };
        
        reader.onerror = function() {
            showImportResultModal("❌ 读取文件失败，请重试", "error");
        };
        
        reader.readAsText(file);
    };
    
    input.click();
}

// ===== 新增：导入结果弹窗（独立样式，避免污染） =====
function showImportResultModal(message, type) {
    var oldMask = document.querySelector('.modal-mask');
    if (oldMask) oldMask.remove();
    
    var mask = document.createElement('div');
    mask.className = 'modal-mask';
    mask.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
    
    var isSuccess = (type === 'success');
    var borderColor = isSuccess ? '#07c160' : '#ff3b30';
    
    mask.innerHTML = `
        <div style="
            background: #ffffff;
            border-radius: 16px;
            padding: 24px 20px 20px 20px;
            max-width: 380px;
            width: 85%;
            margin: 0 auto;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            border-top: 4px solid ${borderColor};
        ">
            <div style="
                text-align: center;
                font-size: 15px;
                line-height: 1.8;
                color: #1c1c1e;
                white-space: pre-wrap;
                word-break: break-word;
            ">${message}</div>
            <button onclick="this.closest('.modal-mask').remove()" style="
                margin-top: 18px;
                background: ${isSuccess ? '#07c160' : '#ff3b30'};
                border: none;
                padding: 10px 24px;
                border-radius: 20px;
                color: white;
                font-size: 15px;
                font-weight: 500;
                width: 100%;
                cursor: pointer;
                transition: opacity 0.2s;
            ">确定</button>
        </div>
    `;
    
    document.body.appendChild(mask);
}

init();
</script>
