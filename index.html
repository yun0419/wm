<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>我们 - 唯一</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        :root {
    --app-bg-color: #fff;
    --chat-bg-color: #f5f5f7;
    --chat-bg-image: none;
    --header-bg-color: #fff;
    --tabbar-bg-color: #fff;
    --app-font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}
body, .app, .page, .settings-item, button, input, textarea, .bubble, .moment-content, .letter-content, .vote-title, .diary-text {
    font-family: var(--app-font-family);
        }
        .app {
    max-width: 100%;
    margin: 0;
    height: 100vh;
    background: var(--app-bg-color);
    display: flex;
    flex-direction: column;
    box-shadow: none;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
}
        .chat-view {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--chat-bg-color);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    max-width: 100%;
    margin: 0;
    transition: background 0.3s;
}
        .chat-view.has-bg-image {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .header {
            background: var(--header-bg-color);
            border-bottom: 0.5px solid #e9e9ef;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 20;
            transition: background 0.3s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .avatar-small {
            width: 36px;
            height: 36px;
            background: #07c160;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            overflow: hidden;
        }
        .avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .nickname {
            font-weight: 600;
            font-size: 16px;
        }
        .header-right {
            font-size: 24px;
            cursor: pointer;
            padding: 0 6px;
        }
        .page {
            flex: 1;
            overflow-y: auto;
            background: var(--app-bg-color);
            display: none;
            padding-bottom: 60px;
        }
        .page.active {
            display: block;
        }
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 100%;
            margin: 0;
            background: var(--tabbar-bg-color);
            border-top: 0.5px solid #e9e9ef;
            display: flex;
            justify-content: space-around;
            padding: 6px 12px 10px;
            z-index: 200;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
            transition: background 0.3s;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            color: #8e8e93;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }
        .tab-item.active {
            color: #07c160;
            font-weight: 500;
        }
        .tab-icon {
            font-size: 22px;
        }
        .session-item, .contact-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-bottom: 0.5px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.1s;
        }
        .session-item:active, .contact-item:active {
            background: #f9f9f9;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: #e5e5ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .session-info {
            flex: 1;
            overflow: hidden;
        }
        .session-name {
            font-weight: 500;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
        }
        .last-msg {
            font-size: 12px;
            color: #6c6c70;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .unread-badge {
            background: #ff3b30;
            color: white;
            border-radius: 16px;
            min-width: 18px;
            height: 18px;
            font-size: 11px;
            text-align: center;
            padding: 0 5px;
            line-height: 18px;
            margin-left: 6px;
        }
        .time {
            font-size: 10px;
            color: #8e8e93;
        }
        .chat-header {
            padding: 10px 14px;
            border-bottom: 0.5px solid #e9e9ef;
            display: flex;
            align-items: center;
            background: var(--app-bg-color);
        }
        .chat-header .avatar-small {
            width: 32px;
            height: 32px;
            margin-right: 8px;
            cursor: pointer;
        }
        .back-btn {
            font-size: 24px;
            margin-right: 10px;
            cursor: pointer;
        }
        .chat-name {
            font-weight: 600;
            font-size: 16px;
            flex: 1;
            cursor: pointer;
        }
        .messages-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    width: 100%;
    transition: height 0.3s;
}
.message-wrapper {
    display: flex;
    flex-direction: column;
    width: 100%;
    margin-bottom: 10px;
}
.message {
    max-width: 85%;
    display: flex;
    align-items: flex-start;
    gap: 6px;
}
.message-mine {
    align-self: flex-end;
    flex-direction: row-reverse;
}
.message-other {
    align-self: flex-start;
    flex-direction: row;
}
.message-pat {
    align-self: center !important;
    justify-content: center !important;
    width: auto !important;
    max-width: 100% !important;
}
.message-pat .msg-avatar {
    display: none;
}
.message-pat .msg-name {
    display: none;
}
.message-pat .bubble {
    background: #e5e5ea !important;
    color: #6c6c70;
    text-align: center;
    font-size: 12px !important;
    padding: 5px 14px !important;
    border-radius: 20px !important;
    white-space: nowrap !important;
    display: inline-block;
    width: auto;
    max-width: none !important;
}
        .reply-preview {
            display: inline-block;
            max-width: 90%;
            margin-bottom: 4px;
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: background 0.2s;
            word-break: break-word;
            white-space: normal;
        }
        .message-mine .reply-preview {
            background: #e8f5e9;
            text-align: right;
        }
        .message-other .reply-preview {
            background: #f0f0f0;
            text-align: left;
        }
        .reply-preview:active {
            background: #e0e0e0;
        }
        .reply-preview .reply-sender {
            font-weight: 600;
            color: #07c160;
            margin-right: 4px;
        }
        .reply-preview .reply-text {
            word-break: break-word;
        }
        .reply-preview .reply-image {
            display: inline-block;
            max-width: 30px;
            max-height: 30px;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 4px;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            background: #e5e5ea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }
        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .msg-content {
            max-width: calc(100% - 40px);
        }
        .msg-name {
            font-size: 10px;
            color: #8e8e93;
            margin-bottom: 2px;
        }
        .message-mine .msg-name {
            text-align: right;
        }
        .message-other .msg-name {
            text-align: left;
        }
        .bubble {
            padding: 6px 10px;
            border-radius: 16px;
            background: white;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
            word-break: break-all;
            font-size: 14px;
            max-width: 100%;
            min-width: 50px;
            white-space: normal;
        }
        .message-mine .bubble {
            background: #d9f0e3;
        }
        .message-other .bubble {
            background: white;
        }
        .bubble img {
            max-width: 60px;
            max-height: 60px;
            border-radius: 6px;
        }
        .msg-time {
            font-size: 9px;
            color: #8e8e93;
            margin-top: 3px;
            text-align: right;
        }
        .read-status {
            font-size: 9px;
            color: #07c160;
            margin-left: 6px;
        }
        .highlight-message {
            background-color: #e0e0e0;
            transition: background 0.3s ease;
        }
        .input-area {
            padding: 6px 10px;
            background: var(--app-bg-color);
            border-top: 0.5px solid #e9e9ef;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            transition: transform 0.3s;
            z-index: 10;
        }
        .reply-bar {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f0f0f0;
            padding: 5px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-size: 11px;
        }
        .reply-bar .reply-info {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #666;
        }
        .reply-bar .cancel-reply {
            background: #ff3b30;
            padding: 2px 8px;
            border-radius: 14px;
            font-size: 10px;
            cursor: pointer;
        }
        .input-icons {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }
        .input-icon-btn {
            background: transparent;
            font-size: 20px;
            padding: 0;
            margin: 0;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #07c160;
            cursor: pointer;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .input-area input {
            flex: 1;
            padding: 7px 10px;
            border-radius: 18px;
            border: 0.5px solid #ddd;
            outline: none;
            font-size: 13px;
            min-width: 0;
            background: var(--app-bg-color);
        }
        .send-btn {
            background: #07c160;
            color: white;
            border: none;
            border-radius: 18px;
            padding: 0 12px;
            height: 32px;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .plus-btn {
            background: #07c160;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .typing-status {
            font-size: 11px;
            color: #6c6c70;
            padding: 3px 14px;
            font-style: italic;
            display: none;
        }
        .contact-tabs {
            display: flex;
            border-bottom: 1px solid #e9e9ef;
            background: var(--app-bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .contact-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }
        .contact-tab.active {
            color: #07c160;
            border-bottom: 2px solid #07c160;
        }
        .group-panel {
            display: none;
        }
        .group-panel.active-panel {
            display: block;
        }
        .settings-card {
            margin: 12px;
            background: #f8f8fa;
            border-radius: 10px;
            padding: 6px 0;
        }
        .settings-item {
            padding: 10px 14px;
            border-bottom: 0.5px solid #e9e9ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
            font-size: 14px;
        }
        .red-dot {
            width: 6px;
            height: 6px;
            background: #ff3b30;
            border-radius: 50%;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
        }
        .switch {
            width: 40px;
            height: 22px;
            background: #ddd;
            border-radius: 22px;
            position: relative;
            transition: 0.2s;
        }
        .switch.active {
            background: #07c160;
        }
        .switch::after {
            content: "";
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.2s;
        }
        .switch.active::after {
            left: 20px;
        }
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .full-modal {
            width: 100%;
            max-width: 550px;
            height: 100%;
            max-height: 100%;
            border-radius: 0;
        }
        .modal-container {
            background: var(--app-bg-color);
            width: 85%;
            max-width: 400px;
            border-radius: 16px;
            max-height: 70%;
            overflow-y: auto;
            position: relative;
            padding: 16px;
        }
        .modal-container.full-modal {
            width: 100%;
            max-width: 550px;
            height: 100%;
            max-height: 100%;
            border-radius: 0;
        }
        .modal-close-btn {
            position: sticky;
            top: 0;
            left: 0;
            background: var(--app-bg-color);
            padding-bottom: 6px;
            cursor: pointer;
            font-size: 24px;
            display: inline-block;
            margin-bottom: 6px;
            color: #07c160;
        }
        button {
            background: #07c160;
            border: none;
            padding: 5px 10px;
            border-radius: 14px;
            color: white;
            margin: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        hr {
            margin: 10px 0;
        }
        .diary-entry, .memory-entry {
            border-bottom: 1px solid #eee;
            padding: 6px 0;
        }
        .calendar-container {
            text-align: center;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-bottom: 6px;
        }
        .calendar-weekday {
            font-weight: bold;
            color: #8e8e93;
            font-size: 12px;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        .calendar-day {
            padding: 6px 2px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
            font-size: 12px;
        }
        .calendar-day:hover {
            background: #e5e5ea;
        }
        .calendar-day.selected {
            background: #07c160;
            color: white;
        }
        .calendar-day.today {
            background: #ff9500;
            color: white;
        }
        .calendar-day.has-event {
            background: #07c160;
            color: white;
        }
        .event-marker {
            font-size: 8px;
            margin-top: 2px;
        }
        .batch-input {
            width: 100%;
            height: 80px;
            margin: 6px 0;
            padding: 6px;
            font-size: 12px;
        }
        .lexicon-tabs {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 1px solid #e9e9ef;
            margin-bottom: 10px;
        }
        .lexicon-tab {
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            background: #f0f0f0;
            margin: 2px;
            border-radius: 14px;
        }
        .lexicon-tab.active {
            background: #07c160;
            color: white;
        }
        .lexicon-panel {
            display: none;
        }
        .lexicon-panel.active-panel {
            display: block;
        }
        .lexicon-category {
            margin-top: 12px;
            border: 0.5px solid #e9e9ef;
            border-radius: 10px;
            overflow: hidden;
        }
        .lexicon-category-header {
            background: #f8f8fa;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }
        .lexicon-category-content {
            padding: 10px;
            border-top: 0.5px solid #e9e9ef;
            display: none;
        }
        .lexicon-category-content.open {
            display: block;
        }
        .group-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
        }
        .group-tab {
            padding: 3px 10px;
            background: #e5e5ea;
            border-radius: 18px;
            cursor: pointer;
            font-size: 12px;
        }
        .group-tab.active {
            background: #07c160;
            color: white;
        }
        .add-group-btn {
            background: #07c160;
            color: white;
            border: none;
            border-radius: 18px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 11px;
        }
        .lexicon-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            border-bottom: 1px solid #eee;
            position: relative;
        }
        .lexicon-item img {
            max-width: 35px;
            max-height: 35px;
            border-radius: 6px;
        }
        .lexicon-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .batch-delete-btn {
            background: #ff3b30;
            margin-bottom: 6px;
        }
        .batch-select-all {
            margin-left: 10px;
            font-size: 11px;
        }
        .delete-group-btn {
            background: #ff3b30;
            border-radius: 14px;
            padding: 2px 6px;
            font-size: 10px;
            margin-left: 6px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .emoji-grid-item {
            text-align: center;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 10px 2px;
            position: relative;
        }
        .emoji-grid-item img {
            max-width: 50px;
            max-height: 50px;
            border-radius: 6px;
        }
        .emoji-grid-item .del-emoji-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff3b30;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            padding: 0;
            line-height: 20px;
        }
        .moment-item {
            background: var(--app-bg-color);
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .moment-item:active {
            background: #f5f5f5;
        }
        .moment-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .moment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }
        .moment-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .moment-user {
            font-weight: 600;
            font-size: 14px;
        }
        .moment-time {
            font-size: 10px;
            color: #8e8e93;
        }
        .moment-content {
            margin: 6px 0;
            word-break: break-all;
            font-size: 13px;
        }
        .moment-content img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            margin-top: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .moment-preview {
            color: #6c6c70;
            font-size: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .moment-stats {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 6px;
        }
        .moment-comments {
            background: #f8f8fa;
            border-radius: 6px;
            padding: 6px;
            margin-top: 6px;
        }
        .moment-comment {
            font-size: 12px;
            padding: 3px 0;
        }
        .moment-comment span {
            font-weight: 500;
        }
        .delete-moment-btn {
            background: #ff3b30;
            margin-top: 6px;
            width: 100%;
        }
        .range-slider {
            width: 100%;
            margin: 6px 0;
            -webkit-appearance: slider-horizontal;
            appearance: auto;
        }
        .range-value {

// ==================== 辅助函数 ====================
function saveData() {
    // 【优化】强制确保 coupleSpaces 数据被正确保存
    if (appData.coupleSpaces) {
        for (var fid in appData.coupleSpaces) {
            if (appData.coupleSpaces.hasOwnProperty(fid)) {
                var space = appData.coupleSpaces[fid];
                if (space) {
                    if (space.hisBirthday === undefined) space.hisBirthday = null;
                    if (space.hisHeight === undefined) space.hisHeight = null;
                    if (!space.reminder) {
                        space.reminder = {
                            birthday: { lastRemindDate: null, hasRemindedToday: false },
                            anniversary: { lastRemindDate: null, hasRemindedToday: false, hasShownPopup: false }
                        };
                    } else {
                        if (!space.reminder.birthday) space.reminder.birthday = { lastRemindDate: null, hasRemindedToday: false };
                        if (!space.reminder.anniversary) space.reminder.anniversary = { lastRemindDate: null, hasRemindedToday: false, hasShownPopup: false };
                    }
                }
            }
        }
    }
    
    // 使用 IndexedDB 保存
    saveDataToDB(appData).catch(function(e) {
        console.error('保存失败:', e);
        alert('⚠️ 数据保存失败！请检查存储空间或刷新页面重试。');
    });
    
    // 每10次保存触发一次检测
    if (!window._saveCounter) window._saveCounter = 0;
    window._saveCounter++;
    if (window._saveCounter % 10 === 0) {
        setTimeout(function() {
            performPerformanceCheck();
        }, 100);
    }
}

// ===== 新增：自动清理90天前的消息（仅删除图片，保留文字） =====
function autoCleanOldMessages() {
    var now = Date.now();
    var days90 = 90 * 24 * 60 * 60 * 1000;
    var cleanedCount = 0;
    var imageCleanedCount = 0;
    
    for (var sid in appData.messages) {
        if (appData.messages.hasOwnProperty(sid)) {
            var msgs = appData.messages[sid];
            if (!msgs || msgs.length === 0) continue;
            
            var newMsgs = [];
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                // 检查消息时间是否在90天内
                var msgTime = new Date(m.time).getTime();
                if (isNaN(msgTime)) {
                    // 如果时间无效，保留
                    newMsgs.push(m);
                    continue;
                }
                if (now - msgTime < days90) {
                    newMsgs.push(m);
                } else {
                    // 超过90天的消息
                    if (m.text && m.text.startsWith('data:image')) {
                        // 图片消息：删除图片内容，保留文字占位
                        m.text = '[图片已自动清理]';
                        newMsgs.push(m);
                        imageCleanedCount++;
                    } else {
                        // 非图片消息直接删除
                        cleanedCount++;
                    }
                }
            }
            appData.messages[sid] = newMsgs;
        }
    }
    
    var totalCleaned = cleanedCount + imageCleanedCount;
    if (totalCleaned > 0) {
        saveData();
        console.log('🔄 自动清理了 ' + totalCleaned + ' 条90天前的消息（其中 ' + imageCleanedCount + ' 张图片转为占位）');
    }
}

        lexiconTotalCount: 0,

        localStorageSize: 0,
        localStorageSizeMB: '0',
        // 会话数
        sessionCount: 0
    };
    
    // 1. 统计消息
    if (appData.messages) {
        for (var sid in appData.messages) {
            var msgs = appData.messages[sid] || [];
            stats.totalMessages += msgs.length;
            stats.sessionMessageCounts[sid] = msgs.length;
            stats.imageCountBySession[sid] = 0;
            
            // 统计图片
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                if (m.text && m.text.startsWith('data:image')) {
                    stats.imageCount++;
                    stats.imageCountBySession[sid]++;
                }
            }
            
            // 获取会话名称
            var session = appData.sessions.find(function(s) { return s.sessionId === sid; });
            if (session) {
                stats.sessionNames[sid] = session.name;
            } else {
                stats.sessionNames[sid] = sid;
            }
        }
    }
    
    // 2. 统计日记（我的 + 好友的）
    stats.diaryCount = (appData.diaryEntries || []).length;
    if (appData.friendDiaries) {
        for (var fid in appData.friendDiaries) {
            stats.diaryCount += (appData.friendDiaries[fid] || []).length;
        }
    }
    
    // 3. 统计朋友圈（我的 + 好友的）
    stats.momentCount = (appData.moments || []).length;
    if (appData.friendMoments) {
        for (var fid in appData.friendMoments) {
            var list = appData.friendMoments[fid] || [];
            stats.friendMomentCount += list.length;
            stats.momentCount += list.length;
        }

    // 4. 统计信件
    if (appData.letters) {
        for (var fid in appData.letters) {
            stats.letterCount += (appData.letters[fid] || []).length;
        }
    }
    
    // 5. 统计情侣回忆
    if (appData.coupleMemories) {
        for (var fid in appData.coupleMemories) {
            stats.coupleMemories += (appData.coupleMemories[fid] || []).length;
        }
    }
    
    // 6. 统计投票
    stats.voteCount = Object.keys(appData.votes || {}).length;
    
    // 7. 统计问卷
    stats.questionnaireCount = Object.keys(appData.questionnaires || {}).length;
    
    // 8. 统计日历事件
    if (appData.calendarEvents) {
        for (var date in appData.calendarEvents) {
            stats.calendarEvents += (appData.calendarEvents[date] || []).length;
        }
    }
    
    // 9. 统计记·念
    stats.memoryEvents = (appData.memoryEvents || []).length;
    
    // 10. 统计词条库图片（公共 + 私人）
    stats.lexiconImageCount = 0;
    stats.lexiconTotalCount = 0;
    
    // 公共词条库
    if (appData.lexicon && appData.lexicon.public) {
        var publicLex = appData.lexicon.public;
        var catNames = ['wordCards', 'emojis', 'kaomojis', 'emoji', 'patPat', 'weather', 'status'];
        for (var ci = 0; ci < catNames.length; ci++) {
            var cat = catNames[ci];
            var groups = publicLex[cat] || {};
            for (var g in groups) {
                if (groups.hasOwnProperty(g)) {
                    var items = groups[g] || [];
                    stats.lexiconTotalCount += items.length;
                    for (var ii = 0; ii < items.length; ii++) {
                        if (typeof items[ii] === 'string' && items[ii].startsWith('data:image')) {

    // 私人词条库

        for (var fid in appData.privateLexicon) {
            var priv = appData.privateLexicon[fid];
            var catNames2 = ['wordCards', 'emojis', 'kaomojis', 'emoji', 'patPat', 'weather', 'status'];

                var cat = catNames2[ci];
                var groups = priv[cat] || {};
                for (var g in groups) {

                        var items = groups[g] || [];
                        stats.lexiconTotalCount += items.length;
                        for (var ii = 0; ii < items.length; ii++) {
                            if (typeof items[ii] === 'string' && items[ii].startsWith('data:image')) {

    // 11. 存储大小（由于改为 IndexedDB，改为异步获取，这里先设置为0，由调用方异步更新）
stats.localStorageSize = 0;
stats.localStorageSizeMB = '0.00';
// 实际获取在调用时异步更新
if (window._statsPromise) {

    stats.sessionCount = appData.sessions ? appData.sessions.length : 0;

// ==================== 性能自检测模块 ====================

// 配置阈值
var PERFORMANCE_THRESHOLDS = {
    localStorageSizeMB: 85,          // 超过 85MB 警告（网页显示，实际约 8.5-9.5MB）
    localStorageSizeCriticalMB: 90,  // 超过 90MB 严重警告（网页显示，实际约 9-10MB）
    sessionImages: 100,              // 单会话图片超过 100 张提醒
    totalImages: 300,                // 总图片数超过 300 提醒
    momentsImages: 100,              // 朋友圈图片超过 100 提醒
    coupleImages: 100,               // 情侣空间图片超过 100 提醒
};

// 执行性能检测
function performPerformanceCheck() {
    var stats = getDetailedDataStats();
    var warnings = [];
    var criticalWarnings = [];
    
    // 1. 检测 localStorage 大小（网页显示值，已×10）
var sizeMB = parseFloat(stats.localStorageSizeMB);
if (sizeMB > PERFORMANCE_THRESHOLDS.localStorageSizeCriticalMB) {
    criticalWarnings.push('💾 localStorage 已达 ' + sizeMB + 'MB（网页显示），即将触顶');
} else if (sizeMB > PERFORMANCE_THRESHOLDS.localStorageSizeMB) {
    warnings.push('💾 localStorage 已用 ' + sizeMB + 'MB（网页显示），建议清理');
}
    
    // 2. 检测各会话图片数
    if (stats.imageCountBySession) {
        for (var sid in stats.imageCountBySession) {
            var count = stats.imageCountBySession[sid];
            if (count > PERFORMANCE_THRESHOLDS.sessionImages) {
                var sessionName = stats.sessionNames[sid] || sid;
                warnings.push('💬 会话「' + sessionName + '」有 ' + count + ' 张图片，建议清理');
            }
        }
    }
    
    // 3. 检测总图片数
    if (stats.imageCount > PERFORMANCE_THRESHOLDS.totalImages) {
        warnings.push('🖼️ 聊天图片总数 ' + stats.imageCount + ' 张，建议清理');
    }
    
    // 4. 检测总消息数
    if (stats.totalMessages > PERFORMANCE_THRESHOLDS.totalMessages) {
        warnings.push('💬 总消息数 ' + stats.totalMessages + ' 条，过多会影响加载速度');
    }
    
    // 5. 检测朋友圈图片数
    var momentImages = 0;
    if (appData.moments) {
        for (var i = 0; i < appData.moments.length; i++) {
            var m = appData.moments[i];
            if (m.images) momentImages += m.images.length;
        }
    }
    if (appData.friendMoments) {
        for (var fid in appData.friendMoments) {
            var list = appData.friendMoments[fid] || [];
            for (var i = 0; i < list.length; i++) {
                if (list[i].images) momentImages += list[i].images.length;
            }
        }
    }
    if (momentImages > PERFORMANCE_THRESHOLDS.momentsImages) {
        warnings.push('📱 朋友圈图片共 ' + momentImages + ' 张，超过 ' + PERFORMANCE_THRESHOLDS.momentsImages + ' 张提醒');
    }
    
    // 6. 检测情侣空间图片数
    var coupleImages = 0;
    if (appData.coupleMemories) {
        for (var fid in appData.coupleMemories) {
            var list = appData.coupleMemories[fid] || [];
            for (var i = 0; i < list.length; i++) {
                if (list[i].image) coupleImages++;
            }
        }
    }
    if (coupleImages > PERFORMANCE_THRESHOLDS.coupleImages) {
        warnings.push('💕 情侣空间图片共 ' + coupleImages + ' 张，超过 ' + PERFORMANCE_THRESHOLDS.coupleImages + ' 张提醒');
    }
    
    // 如果没有警告，更新检测时间后返回
    if (warnings.length === 0 && criticalWarnings.length === 0) {
        updatePerfCheckResult(null, stats);
        return;
    }
    
    // 检查是否已经提醒过（避免频繁打扰）
    var lastCheck = localStorage.getItem('we_app_perf_check');
    if (lastCheck) {
        try {
            var parsed = JSON.parse(lastCheck);
            var daysSince = (Date.now() - parsed.timestamp) / (1000 * 60 * 60 * 24);
            // 如果 1 天内提醒过，且警告级别没有升级，则不再提醒
            if (daysSince < 1 && parsed.warningLevel === getWarningLevel(warnings, criticalWarnings)) {
                return;
            }
        } catch(e) {}
    }
    
    // 显示性能警告
    showPerformanceWarningModal(warnings, criticalWarnings, stats);
}

// 获取警告级别
function getWarningLevel(warnings, criticalWarnings) {
    if (criticalWarnings.length > 0) return 'critical';
    if (warnings.length > 0) return 'warning';
    return 'ok';
}

// 更新检测记录
function updatePerfCheckResult(action, stats) {
    var level = 'ok';
    if (action === 'ignored') {
        level = 'ignored';
    } else if (action === 'later') {
        level = 'later';
    }
    
    var record = {
        timestamp: Date.now(),
        action: action || 'checked',
        warningLevel: level,
        stats: {
            totalMessages: stats.totalMessages || 0,
            localStorageSize: stats.localStorageSize || 0,
        }
    };
    localStorage.setItem('we_app_perf_check', JSON.stringify(record));
}

function applyGlobalTheme() {
    let theme = appData.globalTheme || { bgColor: "#ffffff", bgImage: null, bgOpacity: 100, fontFamily: "", fontSize: 14, followSystemFont: true, headerBgColor: "rgba(255,255,255,1)", tabbarBgColor: "rgba(255,255,255,1)" };
    
    // 应用背景到所有 .page 页面（内容区域）
    let pages = document.querySelectorAll('.page');
    let bgOpacity = (theme.bgOpacity !== undefined ? theme.bgOpacity : 100) / 100;
    
    pages.forEach(page => {
        page.style.backgroundColor = 'transparent';
        if (theme.bgImage) {
            page.style.backgroundImage = `url(${theme.bgImage})`;
            page.style.backgroundSize = 'cover';
            page.style.backgroundPosition = 'center';
            page.style.backgroundRepeat = 'no-repeat';
            // 使用透明度
            page.style.backgroundBlendMode = 'normal';
            // 添加一个半透明遮罩层来实现透明度效果
            page.style.position = 'relative';
            // 如果之前没有遮罩，创建一个
            let overlay = page.querySelector('.page-bg-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.className = 'page-bg-overlay';
                overlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;';
                page.style.position = 'relative';
                page.insertBefore(overlay, page.firstChild);
            }
            // 使用 rgba 背景色作为遮罩
            let r = parseInt(theme.bgColor.slice(1,3), 16) || 255;
            let g = parseInt(theme.bgColor.slice(3,5), 16) || 255;
            let b = parseInt(theme.bgColor.slice(5,7), 16) || 255;
            overlay.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${1 - bgOpacity})`;
        } else {
            page.style.backgroundImage = 'none';
            page.style.backgroundColor = theme.bgColor || '#ffffff';
            let overlay = page.querySelector('.page-bg-overlay');
            if (overlay) overlay.remove();
        }
    });
    
    // 标题栏和标签栏不受背景影响，保持独立
    document.documentElement.style.setProperty('--header-bg-color', theme.headerBgColor || "rgba(255,255,255,1)");
    document.documentElement.style.setProperty('--tabbar-bg-color', theme.tabbarBgColor || "rgba(255,255,255,1)");
    
    // 字体设置
    if (!theme.followSystemFont && theme.fontFamily) {
        document.documentElement.style.setProperty('--app-font-family', theme.fontFamily);
        document.documentElement.style.setProperty('--app-font-size', theme.fontSize + 'px');
        document.body.style.fontFamily = theme.fontFamily;
        document.body.style.fontSize = theme.fontSize + 'px';
    } else {
        document.documentElement.style.setProperty('--app-font-family', 'inherit');
        document.documentElement.style.setProperty('--app-font-size', '14px');
        document.body.style.fontFamily = '';
        document.body.style.fontSize = '';
    }
}

// ==================== 头像框渲染（新版 - 支持复杂样式 + 装饰元素） ====================
function renderAvatarWithFrame(avatarSrc, frameId, size) {
    size = size || 32;
    let frame = null;
    let frameCss = '';
    let frameTemplate = '';

    if (!frameId || frameId === 'frame_default') {
        frame = appData.avatarFrames.library.find(f => f.id === 'frame_default');
    } else {
        frame = appData.avatarFrames.library.find(f => f.id === frameId);
    }
    
    if (frame) {
        frameCss = frame.css || '';
        frameTemplate = frame.template || '';
    }

    let imgHtml = '';
    if (avatarSrc && avatarSrc.startsWith('data:image')) {
        imgHtml = `<img src="${avatarSrc}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;">`;
    } else {
        imgHtml = `<span style="font-size:${Math.max(size * 0.5, 14)}px;line-height:${size}px;display:block;text-align:center;width:100%;height:100%;border-radius:50%;">${avatarSrc || '👤'}</span>`;
    }

    if (frameTemplate && frameTemplate.trim()) {
        let uid = 'frame_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        let containerStyle = `width:${size}px;height:${size}px;flex-shrink:0;display:inline-block;`;

        // ===== 修复：先替换 {SIZE*数字} 表达式，再替换 {SIZE} =====
        let renderedTemplate = frameTemplate
            .replace(/\{AVATAR\}/g, imgHtml)
            .replace(/\{SIZE\*([\d.]+)\}/g, function(match, num) {
                return (size * parseFloat(num)) + 'px';
            })
            .replace(/\{SIZE\}/g, size)
            .replace(/\{UID\}/g, uid);

        let styleTag = '';
        if (frameCss && frameCss.trim()) {
            let scopedCss = frameCss.replace(/([.#]?[\w-]+(?:\s*[>+~]\s*[.#]?[\w-]+)*)\s*\{/g, function(match, selector) {
                if (selector.includes(uid)) return match;
                let parts = selector.split(/\s*([>+~])\s*/);
                let scopedParts = parts.map(part => {
                    if (part === '>' || part === '+' || part === '~') return part;
                    if (part.trim() === '') return part;
                    if (part.startsWith('.')) {
                        return '.' + uid + part;
                    } else if (part.startsWith('#')) {
                        return '#' + uid + part;
                    } else {
                        return '.' + uid + ' ' + part;
                    }
                });
                let newSelector = scopedParts.join(' ');
                return newSelector + ' {';
            });
            styleTag = `<style>.${uid} { display:inline-block; } ${scopedCss}</style>`;
        }

        return `<div class="avatar-frame-wrapper ${uid}" style="${containerStyle}">${styleTag}${renderedTemplate}</div>`;
    }

    let style = `width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#e5e5ea;flex-shrink:0;`;
    if (frameCss && frameCss.trim()) {
        style += ' ' + frameCss;
    }
    return `<div class="avatar-frame-wrapper" style="${style}">${imgHtml}</div>`;
}

    let frames = getAvatarFrameList();

        if (confirm(`当前头像框共 ${frames.length} 个，超过上限10个。是否自动删除多余的（保留最近添加的10个）？\n\n选「确定」自动清理，选「取消」自己手动删除。`)) {
            let sorted = [...frames].reverse();
            let keep = sorted.slice(0, 10);
            let keepIds = keep.map(f => f.id);
            appData.avatarFrames.library = appData.avatarFrames.library.filter(f => keepIds.includes(f.id) || f.id === 'frame_default');
            let sessions = appData.avatarFrames.sessions || {};
            for (let sid in sessions) {
                let cfg = sessions[sid];
                if (cfg.my && !keepIds.includes(cfg.my) && cfg.my !== 'frame_default') delete cfg.my;
                if (cfg.other && !keepIds.includes(cfg.other) && cfg.other !== 'frame_default') delete cfg.other;
                if (Object.keys(cfg).length === 0) delete sessions[sid];

function applyChatTheme(sessionId) {
    if (!currentOpenChatWindow) return;
    let chatView = currentOpenChatWindow;
    
    // 获取单人装扮设置
    let theme = appData.chatThemes[sessionId] || {};
    let globalTheme = appData.globalTheme || {};
    
    // 聊天背景：优先使用单人装扮，否则使用全局背景
    let bgColor = theme.bgColor || globalTheme.bgColor || "#f5f5f7";
    let bgImage = theme.bgImage || globalTheme.bgImage || null;
    let bgOpacity = (globalTheme.bgOpacity !== undefined ? globalTheme.bgOpacity : 100) / 100;
    
    // 应用聊天背景
    chatView.style.backgroundColor = bgColor;
    if (bgImage) {
        chatView.style.backgroundImage = `url(${bgImage})`;
        chatView.style.backgroundSize = 'cover';
        chatView.style.backgroundPosition = 'center';
        chatView.classList.add('has-bg-image');
        // 如果有背景图片，用颜色作为半透明遮罩实现透明度
        if (bgOpacity < 1) {
            let r = parseInt(bgColor.slice(1,3), 16) || 255;
            let g = parseInt(bgColor.slice(3,5), 16) || 255;
            let b = parseInt(bgColor.slice(5,7), 16) || 255;
            chatView.style.backgroundBlendMode = 'overlay';
            // 通过伪元素或额外样式实现透明度
            chatView.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${1 - bgOpacity})`;
        } else {
            chatView.style.backgroundBlendMode = 'normal';
        }
    } else {
        chatView.style.backgroundImage = 'none';
        chatView.classList.remove('has-bg-image');
        chatView.style.backgroundBlendMode = 'normal';
        // 应用透明度到纯色背景
        if (bgOpacity < 1) {
            let r = parseInt(bgColor.slice(1,3), 16) || 255;
            let g = parseInt(bgColor.slice(3,5), 16) || 255;
            let b = parseInt(bgColor.slice(5,7), 16) || 255;
            chatView.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${bgOpacity})`;
        } else {
            chatView.style.backgroundColor = bgColor;
        }
    }
    
    // 字体设置：优先使用单人装扮，否则使用全局字体
    if (theme.fontSettings && !theme.fontSettings.followSystem && theme.fontSettings.fontFamily) {
        chatView.style.fontFamily = theme.fontSettings.fontFamily;
        chatView.style.fontSize = theme.fontSettings.fontSize + 'px';
    } else if (!globalTheme.followSystemFont && globalTheme.fontFamily) {
        chatView.style.fontFamily = globalTheme.fontFamily;
        chatView.style.fontSize = globalTheme.fontSize + 'px';
    } else {
        chatView.style.fontFamily = '';
        chatView.style.fontSize = '';
    }
}

// ===== 新增：获取某天距离今天的天数 =====
function getDaysUntilDate(dateStr) {
    if (!dateStr) return 999;
    let today = new Date();
    today.setHours(0, 0, 0, 0);
    let target = new Date(dateStr);
    if (isNaN(target.getTime())) return 999;
    target.setHours(0, 0, 0, 0);
    let diff = Math.floor((target - today) / (1000 * 60 * 60 * 24));
    return diff;
}

// ===== 新增：检查生日提醒 =====
function checkBirthdayReminder(friendId, space) {
    if (!space.hisBirthday) return;
    let today = getTodayDateStr();
    let daysUntil = getDaysUntilDate(space.hisBirthday);
    
    if (daysUntil > 0 || daysUntil < -3) {
        if (space.reminder.birthday.hasRemindedToday) {
            space.reminder.birthday.hasRemindedToday = false;
            space.reminder.birthday.lastRemindDate = null;
            saveData();
        }
        return;
    }
    
    if (space.reminder.birthday.lastRemindDate === today && space.reminder.birthday.hasRemindedToday) {
        return;
    }
    
    space.reminder.birthday.lastRemindDate = today;
    space.reminder.birthday.hasRemindedToday = true;
    
    if (!appData.friendBirthdayRedDot) appData.friendBirthdayRedDot = {};
    appData.friendBirthdayRedDot[friendId] = true;
    saveData();
}

// ===== 新增：检查周年提醒 =====
function checkAnniversaryReminder(friendId, space) {
    if (!space.startDate) return;
    let today = getTodayDateStr();
    let start = new Date(space.startDate);
    let thisYear = new Date().getFullYear();
    let anniversaryThisYear = new Date(thisYear, start.getMonth(), start.getDate());
    let anniversaryStr = `${thisYear}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
    
    if (anniversaryThisYear < new Date()) {
        anniversaryThisYear.setFullYear(thisYear + 1);
        anniversaryStr = `${thisYear+1}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
    }
    
    let daysUntil = getDaysUntilDate(anniversaryStr);
    let yearsTogether = new Date().getFullYear() - start.getFullYear();
    if (new Date() < new Date(space.startDate)) yearsTogether = 0;
    
    if (daysUntil > 0 || daysUntil < -3) {
        if (space.reminder.anniversary.hasRemindedToday) {
            space.reminder.anniversary.hasRemindedToday = false;
            space.reminder.anniversary.lastRemindDate = null;
            if (daysUntil < -3) {
                space.reminder.anniversary.hasShownPopup = false;
            }
            saveData();
        }
        return;
    }
    
    if (space.reminder.anniversary.lastRemindDate === today && space.reminder.anniversary.hasRemindedToday) {
        if (daysUntil === 0 && !space.reminder.anniversary.hasShownPopup) {
            showAnniversaryPopup(friendId, space, yearsTogether + 1);
            space.reminder.anniversary.hasShownPopup = true;
            saveData();
        }
        return;
    }
    
    space.reminder.anniversary.lastRemindDate = today;
    space.reminder.anniversary.hasRemindedToday = true;
    
    if (!appData.friendAnniversaryRedDot) appData.friendAnniversaryRedDot = {};
    appData.friendAnniversaryRedDot[friendId] = true;
    saveData();
    
    if (daysUntil === 0) {
        showAnniversaryPopup(friendId, space, yearsTogether + 1);
        space.reminder.anniversary.hasShownPopup = true;
        saveData();
    }
}

    let publishBtn = modal.querySelector("#publishBtn");
    let addImageBtn = modal.querySelector("#addImageBtn");
    let imagePreviewArea = modal.querySelector("#imagePreviewArea");
    let selectedImages = [];
    
    if (addImageBtn) {
        addImageBtn.onclick = () => {
            if (selectedImages.length >= 9) {
                alert("最多只能添加9张图片");
                return;
            }
            let input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.multiple = true;
            input.onchange = async (e) => {
                let files = e.target.files;
                let remaining = 9 - selectedImages.length;
                let toAdd = Math.min(files.length, remaining);
                for (let i = 0; i < toAdd; i++) {
                    try {
                        let thumb = await compressImage(files[i], 80, 0.5);
                        let original = await compressImageToWidth(files[i], 800, 0.7);
                        selectedImages.push({ thumb, original });
                    } catch (err) {
                        let reader = new FileReader();
                        reader.onload = (ev) => {
                            selectedImages.push({ thumb: ev.target.result, original: ev.target.result });
                        };
                        reader.readAsDataURL(files[i]);
                    }
                }
                updateImagePreview();
            };
            input.click();
        };
    }
    
    function updateImagePreview() {
        if (!imagePreviewArea) return;
        imagePreviewArea.innerHTML = "";
        for (let idx = 0; idx < selectedImages.length; idx++) {
            let img = selectedImages[idx];
            let imgContainer = document.createElement("div");
            imgContainer.style.position = "relative";
            imgContainer.style.width = "80px";
            imgContainer.style.height = "80px";
            imgContainer.style.borderRadius = "8px";
            imgContainer.style.overflow = "hidden";
            imgContainer.style.border = "1px solid #ddd";
            let imgElem = document.createElement("img");
            imgElem.src = img.thumb;
            imgElem.style.width = "100%";
            imgElem.style.height = "100%";
            imgElem.style.objectFit = "cover";
            let deleteBtn = document.createElement("span");
            deleteBtn.innerHTML = "✕";
            deleteBtn.style.position = "absolute";
            deleteBtn.style.top = "2px";
            deleteBtn.style.right = "2px";
            deleteBtn.style.background = "rgba(0,0,0,0.6)";
            deleteBtn.style.color = "white";
            deleteBtn.style.borderRadius = "50%";
            deleteBtn.style.width = "20px";
            deleteBtn.style.height = "20px";
            deleteBtn.style.display = "flex";
            deleteBtn.style.alignItems = "center";
            deleteBtn.style.justifyContent = "center";
            deleteBtn.style.fontSize = "12px";
            deleteBtn.style.cursor = "pointer";
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                selectedImages.splice(idx, 1);
                updateImagePreview();
            };
            imgContainer.appendChild(imgElem);
            imgContainer.appendChild(deleteBtn);
            imagePreviewArea.appendChild(imgContainer);
        }
        if (addImageBtn) {
            if (selectedImages.length >= 9) {
                addImageBtn.style.display = "none";
            } else {
                addImageBtn.style.display = "inline-block";
            }
        }
    }
    
    if (publishBtn) {
        publishBtn.onclick = async () => {
            let text = textInput.value.trim();
            if (!text && selectedImages.length === 0) {
                alert("请输入内容或添加图片");
                return;
            }
            let newMoment = {
                id: Date.now(),
                text: text,
                images: selectedImages,
                time: new Date().toLocaleString(),
                comments: []
            };
            appData.moments.unshift(newMoment);
            saveData();
            modal.remove();
            alert("发布成功！💕");
            renderProfilePage();
            scheduleAllFriendsCommentOnNewMoment(newMoment.id);
        };
    }
}

// ===== 新增：调度零点检查 =====
function scheduleMidnightCheck() {
    let now = new Date();
    let tomorrow = new Date(now);
    tomorrow.setDate(now.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    let msUntilMidnight = tomorrow - now;
    
    setTimeout(() => {
        checkMidnightReminders();
        scheduleMidnightCheck();
    }, msUntilMidnight);
}

// ==================== IndexedDB 存储模块 ====================

const DB_NAME = 'we_app_db';
const DB_VERSION = 1;
const STORE_NAME = 'appData';

let dbInstance = null;
let saveQueue = [];
let isSaving = false;

// 打开数据库
function openDB() {
    return new Promise(function(resolve, reject) {
        if (dbInstance) {
            resolve(dbInstance);
            return;
        }
        var request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = function(event) {
            var db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            }
        };
        request.onsuccess = function(event) {
            dbInstance = event.target.result;
            resolve(dbInstance);
        };
        request.onerror = function(event) {
            reject(event.target.error);
        };
    });
}

// 保存数据到 IndexedDB
function saveDataToDB(data) {
    return new Promise(function(resolve, reject) {
        saveQueue.push({ data: JSON.parse(JSON.stringify(data)), resolve: resolve, reject: reject });
        processSaveQueue();
    });
}

// 处理保存队列
var saveTimer = null;
function processSaveQueue() {
    if (isSaving) return;
    if (saveQueue.length === 0) return;

    if (saveTimer) {
        clearTimeout(saveTimer);
    }
    saveTimer = setTimeout(function() {
        doSave();
    }, 50);
}

function doSave() {
    if (isSaving) return;
    if (saveQueue.length === 0) return;

    isSaving = true;
    var lastItem = saveQueue[saveQueue.length - 1];
    var dataToSave = lastItem.data;

    openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
            var transaction = db.transaction(STORE_NAME, 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            var request = store.put({ id: 'mainData', data: dataToSave });
            request.onsuccess = function() {
                resolve();
            };
            request.onerror = function(event) {
                reject(event.target.error);
            };
        });
    }).then(function() {
        var queueCopy = saveQueue.slice();
        saveQueue = [];
        for (var i = 0; i < queueCopy.length; i++) {
            queueCopy[i].resolve();
        }
        isSaving = false;
        if (saveQueue.length > 0) {
            processSaveQueue();
        }
    }).catch(function(err) {
        console.error('IndexedDB 保存失败:', err);
        var queueCopy = saveQueue.slice();
        saveQueue = [];
        for (var i = 0; i < queueCopy.length; i++) {
            queueCopy[i].reject(err);
        }
        isSaving = false;
        if (saveQueue.length > 0) {
            setTimeout(processSaveQueue, 1000);
        }
    });
}

// 从 IndexedDB 加载数据
function loadDataFromDB() {
    return new Promise(function(resolve, reject) {
        openDB().then(function(db) {
            return new Promise(function(res, rej) {
                var transaction = db.transaction(STORE_NAME, 'readonly');
                var store = transaction.objectStore(STORE_NAME);
                var request = store.get('mainData');
                request.onsuccess = function() {
                    res(request.result);
                };
                request.onerror = function(event) {
                    rej(event.target.error);
                };
            });
        }).then(function(result) {
            if (result && result.data) {
                resolve(result.data);
            } else {
                resolve(null);
            }
        }).catch(function(err) {
            reject(err);
        });
    });
}

// 清除所有数据
function clearDB() {
    return new Promise(function(resolve, reject) {
        openDB().then(function(db) {
            return new Promise(function(res, rej) {
                var transaction = db.transaction(STORE_NAME, 'readwrite');
                var store = transaction.objectStore(STORE_NAME);
                var request = store.clear();
                request.onsuccess = function() {
                    res();
                };
                request.onerror = function(event) {
                    rej(event.target.error);
                };
            });
        }).then(resolve).catch(reject);
    });
}

// 获取存储大小估算
function getDBSize() {
    return new Promise(function(resolve) {
        openDB().then(function(db) {
            var transaction = db.transaction(STORE_NAME, 'readonly');
            var store = transaction.objectStore(STORE_NAME);
            var request = store.get('mainData');
            request.onsuccess = function() {
                if (request.result && request.result.data) {
                    var str = JSON.stringify(request.result.data);
                    var bytes = str.length * 2;
                    resolve(bytes);
                } else {
                    resolve(0);
                }
            };
            request.onerror = function() {
                resolve(0);
            };
        }).catch(function() {
            resolve(0);
        });
    });
}

function restoreVoteTimers() {
    let now = Date.now();
    for (let voteId in appData.votes) {
        let vote = appData.votes[voteId];
        if (!vote.ended && vote.endTime > now) {
            let remaining = vote.endTime - now;
            startVoteTimer(voteId, remaining);
            startVoteAiLoop(voteId);
        } else if (vote.endTime <= now && !vote.ended) {
            vote.ended = true;
            if (vote.intervalId) clearInterval(vote.intervalId);
            saveData();
        }
    }
}

function startVoteTimer(voteId, delayMs) {
    setTimeout(() => {
        let vote = appData.votes[voteId];
        if (vote && !vote.ended) {
            vote.ended = true;
            if (vote.intervalId) clearInterval(vote.intervalId);
            saveData();
            if (currentOpenChatWindow) {
                let sessionId = currentOpenChatWindow.getAttribute("data-session-id");
                if (sessionId) renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
            }
        }
    }, delayMs);
}

function startVoteAiLoop(voteId) {
    let vote = appData.votes[voteId];
    if (!vote || vote.ended) return;
    
    let session = null;
    let totalVoters = 0;
    for (let s of appData.sessions) {
        let msgs = appData.messages[s.sessionId] || [];
        for (let m of msgs) {
            if (m.isVote && m.voteId === voteId) {
                session = s;
                break;
            }
        }
        if (session) break;
    }
    
    if (session) {
        if (session.type === "friend") {
            totalVoters = 1;
        } else if (session.type === "group") {
            let group = appData.groups.find(g => g.id === session.targetId);
            if (group) {
                totalVoters = group.members.filter(mid => mid !== "self").length;
            }
        }
    }
    
    let interval = setInterval(() => {
        let currentVote = appData.votes[voteId];
        if (!currentVote || currentVote.ended) {
            clearInterval(interval);
            return;
        }
        
        let currentTotalVotes = currentVote.votes.reduce((a,b) => a + b, 0);
        
        if (totalVoters > 0 && currentTotalVotes >= totalVoters) {
            currentVote.ended = true;
            if (currentVote.intervalId) clearInterval(currentVote.intervalId);
            saveData();
            if (currentOpenChatWindow) {
                let sessionId = currentOpenChatWindow.getAttribute("data-session-id");
                if (sessionId) renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
            }
            return;
        }
        
        let availableOptions = currentVote.options.map((_, idx) => idx);
        if (availableOptions.length > 0) {
            let selected = availableOptions[Math.floor(Math.random() * availableOptions.length)];
            currentVote.votes[selected]++;
            saveData();
            if (currentOpenChatWindow) {
                let sessionId = currentOpenChatWindow.getAttribute("data-session-id");
                if (sessionId) renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
            }
        }
    }, Math.random() * 10000 + 5000);
    vote.intervalId = interval;
    saveData();
}

function generateReplyFromLexicon(friendId) {
    let allTextItems = [];
    // 包含所有词条类型（除拍一拍外）
    const includeCategories = ["wordCards", "kaomojis", "emoji", "weather", "status", "emojis"];
    
    // 从公共词条库收集
    for (let cat of includeCategories) {
        let groups = appData.lexicon.public[cat] || {};
        for (let g in groups) {
            if (Array.isArray(groups[g])) {
                for (let item of groups[g]) {
                    if (typeof item === 'string' && !item.startsWith("data:image")) {
                        allTextItems.push(item);
                    }
                }
            }
        }
    }
    
    // 从该好友的私人词条库收集（仅该好友可用）
    if (friendId) {
        let priv = getPrivateLexicon(friendId);
        for (let cat of includeCategories) {
            let groups = priv[cat] || {};
            for (let g in groups) {
                if (Array.isArray(groups[g])) {
                    for (let item of groups[g]) {
                        if (typeof item === 'string' && !item.startsWith("data:image")) {
                            allTextItems.push(item);
                        }
                    }
                }
            }
        }
    }
    
    if (allTextItems.length === 0) {
        return "（暂无词条，请先在公共词条库或私人词条库中添加内容）";
    }
    
    // 回信和日记：10-50条随机组合
    let count = Math.floor(Math.random() * 41) + 10;
    let shuffled = [...allTextItems];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    let selected = shuffled.slice(0, Math.min(count, shuffled.length));
    
    // 每3个词条换一行
    let result = "";
    for (let i = 0; i < selected.length; i++) {
        result += selected[i];
        if ((i + 1) % 3 === 0 && i !== selected.length - 1) {
            result += "<br>";
        } else if (i !== selected.length - 1) {
            result += "，";
        }
    }
    return result;
}

async function compressImage(file, maxWidth = 60, quality = 0.5) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                resolve(compressedDataUrl);
            };
            img.onerror = reject;
        };
        reader.onerror = reject;
    });
}

function escapeHtml(str) {
    if(!str) return "";
    return String(str).replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

// ==================== 渲染评论内容（支持图片） ====================
function renderCommentText(text) {
    if (!text) return "";
    
    // 检查是否包含 data:image 图片
    var imageMatch = text.match(/(data:image\/[^;]+;base64,[^\s"]+)/);
    if (imageMatch) {
        var imageSrc = imageMatch[1];
        var textPart = text.replace(imageSrc, '').trim();
        var result = '';
        if (textPart) {
            result += escapeHtml(textPart) + ' ';
        }
        result += `<img src="${imageSrc}" style="max-width: 50px; max-height: 50px; border-radius: 4px; vertical-align: middle; cursor: pointer;" class="comment-image" data-original="${imageSrc}">`;
        return result;
    }
    
    // 如果整个内容就是纯图片
    if (text && text.startsWith("data:image")) {
        return `<img src="${text}" style="max-width: 50px; max-height: 50px; border-radius: 4px; vertical-align: middle; cursor: pointer;" class="comment-image" data-original="${text}">`;
    }
    
    return escapeHtml(text);
}

function calcDays(dateStr) {
    if (!dateStr) return 0;
    let today = new Date();
    today.setHours(0, 0, 0, 0);
    let target = new Date(dateStr);
    if (isNaN(target.getTime())) return 0;
    target.setHours(0, 0, 0, 0);
    let diff = Math.floor((today - target) / (1000 * 60 * 60 * 24));
    return diff >= 0 ? diff : 0;
}

function calcDaysFuture(dateStr) {
    if (!dateStr) return 0;
    let today = new Date();
    today.setHours(0, 0, 0, 0);
    let target = new Date(dateStr);
    if (isNaN(target.getTime())) return 0;
    target.setHours(0, 0, 0, 0);
    let diff = Math.floor((target - today) / (1000 * 60 * 60 * 24));
    return diff >= 0 ? diff : 0;
}

// ===== 新增：计算年龄 =====
function calculateAge(birthdayStr) {
    if (!birthdayStr) return null;
    let today = new Date();
    let birth = new Date(birthdayStr);
    if (isNaN(birth.getTime())) return null;
    let age = today.getFullYear() - birth.getFullYear();
    let m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
        age--;
    }
    return age;
}

function getZodiac(birthdayStr) {
    if (!birthdayStr) return null;
    let birth = new Date(birthdayStr);
    if (isNaN(birth.getTime())) return null;
    let month = birth.getMonth() + 1;
    let day = birth.getDate();
    const zodiacs = [
        { sign: '摩羯座', start: [1, 1], end: [1, 19] },
        { sign: '水瓶座', start: [1, 20], end: [2, 18] },
        { sign: '双鱼座', start: [2, 19], end: [3, 20] },
        { sign: '白羊座', start: [3, 21], end: [4, 19] },
        { sign: '金牛座', start: [4, 20], end: [5, 20] },
        { sign: '双子座', start: [5, 21], end: [6, 21] },
        { sign: '巨蟹座', start: [6, 22], end: [7, 22] },
        { sign: '狮子座', start: [7, 23], end: [8, 22] },
        { sign: '处女座', start: [8, 23], end: [9, 22] },
        { sign: '天秤座', start: [9, 23], end: [10, 23] },
        { sign: '天蝎座', start: [10, 24], end: [11, 22] },
        { sign: '射手座', start: [11, 23], end: [12, 21] },
        { sign: '摩羯座', start: [12, 22], end: [12, 31] }
    ];
    for (let z of zodiacs) {
        let s = z.start;
        let e = z.end;
        if ((month === s[0] && day >= s[1]) || (month === e[0] && day <= e[1]) || (month > s[0] && month < e[0])) {
            return z.sign;
        }
        if (z.sign === '摩羯座' && ((month === 12 && day >= 22) || (month === 1 && day <= 19))) {
            return z.sign;
        }
    }
    return null;
}

// ==================== 写信功能 ====================
function sendLetter(friendId, content, isFromMe = true) {
    if (!content.trim()) return;
    let now = new Date();
    let randomHours = (Math.random() * 23 + 1).toFixed(1);
    let randomHoursNum = parseFloat(randomHours);
    let delayMs = randomHoursNum * 60 * 60 * 1000;
    let expectedReplyTime = new Date(now.getTime() + delayMs);
    
    let letter = {
        id: Date.now(),
        content: content,
        time: now.toISOString(),
        reply: null,
        replyTime: null,
        expectedReplyTimestamp: expectedReplyTime.getTime(),
        expectedReplyHours: randomHoursNum,
        direction: isFromMe ? "my" : "their",
        from: isFromMe ? "self" : "other"
    };
    if (!appData.letters[friendId]) appData.letters[friendId] = [];
    appData.letters[friendId].push(letter);
    saveData();
    alert(`信件已发送，预计 ${randomHoursNum} 小时内${isFromMe ? "回信" : "回复"}`);
}

function getRandomMomentContentWithImages(friendId) {
    let allTextItems = [];
    // 朋友圈只从字卡、颜文字、emoji、天气中选取（去掉状态和拍一拍）
    const textCategories = ["wordCards", "kaomojis", "emoji", "weather"];
    
    // ✅ 从公共词条库收集
    for (let cat of textCategories) {
        let groups = appData.lexicon.public[cat] || {};
        for (let g in groups) {
            if (Array.isArray(groups[g])) {
                for (let item of groups[g]) {
                    if (typeof item === 'string' && !item.startsWith("data:image")) {
                        allTextItems.push(item);
                    }
                }
            }
        }
    }
    
    // ✅ 从该好友的私人词条库收集（仅该好友可用）
    if (friendId) {
        let priv = getPrivateLexicon(friendId);
        for (let cat of textCategories) {
            let groups = priv[cat] || {};
            for (let g in groups) {
                if (Array.isArray(groups[g])) {
                    for (let item of groups[g]) {
                        if (typeof item === 'string' && !item.startsWith("data:image")) {
                            allTextItems.push(item);
                        }
                    }
                }
            }
        }
    }
    
    // 如果没有词条，返回空（不生成朋友圈）
    if (allTextItems.length === 0) {
        return { text: "", images: [] };
    }
    
    // 数量范围：5-15条
    let count = Math.floor(Math.random() * 11) + 5;
    count = Math.min(count, allTextItems.length);
    
    let shuffled = [...allTextItems];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    let selected = shuffled.slice(0, count);
    
    // 去重
    selected = [...new Set(selected)];
    
    // 用空格连接
    let textContent = selected.join(" ");
    
    // 随机添加图片（可选，20%概率）
    let hasImage = Math.random() < 0.2;
    let images = [];
    if (hasImage) {
        let imageCount = Math.floor(Math.random() * 2) + 1;
        for (let i = 0; i < imageCount; i++) {
            let img = getRandomImageFromLexicon(friendId);
            if (img) {
                images.push({ thumb: img, original: img });
            }
        }
    }
    
    return { text: textContent, images: images };
}

// ==================== 情侣空间功能 ====================
function getCoupleSpace(friendId) {
    if (!appData.coupleSpaces) appData.coupleSpaces = {};
    if (!appData.coupleSpaces[friendId]) {
        appData.coupleSpaces[friendId] = {
            enabled: false,
            startDate: null,
            nickname: null,
            hisBirthday: null,
            hisHeight: null,
            reminder: {
                birthday: { lastRemindDate: null, hasRemindedToday: false },
                anniversary: { lastRemindDate: null, hasRemindedToday: false, hasShownPopup: false }
            }
        };
        // 立即保存新创建的空间，防止丢失
        saveData();
    }
    // 补全可能缺失的字段（兼容旧数据）- 只补全不覆盖已有值
    let space = appData.coupleSpaces[friendId];
    let needsSave = false;
    if (space.hisBirthday === undefined) { space.hisBirthday = null; needsSave = true; }
    if (space.hisHeight === undefined) { space.hisHeight = null; needsSave = true; }
    if (!space.reminder) {
        space.reminder = {
            birthday: { lastRemindDate: null, hasRemindedToday: false },
            anniversary: { lastRemindDate: null, hasRemindedToday: false, hasShownPopup: false }
        };
        needsSave = true;
    } else {
        if (!space.reminder.birthday) { space.reminder.birthday = { lastRemindDate: null, hasRemindedToday: false }; needsSave = true; }
        if (!space.reminder.anniversary) { space.reminder.anniversary = { lastRemindDate: null, hasRemindedToday: false, hasShownPopup: false }; needsSave = true; }
    }
    if (needsSave) saveData();
    return appData.coupleSpaces[friendId];
}

function toggleCoupleSpace(friendId) {
    let space = getCoupleSpace(friendId);
    let friend = appData.friends.find(f => f.id === friendId);
    if (!friend) return;
    
    if (space.enabled) {
        if (confirm(`确定要关闭与 ${friend.name} 的情侣空间吗？`)) {
            // 获取最新对象防止引用过期
            let freshSpace = getCoupleSpace(friendId);
            freshSpace.enabled = false;
            freshSpace.startDate = null;
            freshSpace.nickname = null;
            saveData();
            alert("情侣空间已关闭");
            showFriendProfile(friendId);
        }
    } else {
        let nickname = prompt(`请输入你对 ${friend.name} 的专属昵称（例如：宝宝、亲爱的）`, "宝宝");
        if (nickname === null) return;
        if (!nickname.trim()) {
            alert("昵称不能为空");
            return;
        }
        let freshSpace = getCoupleSpace(friendId);
        freshSpace.enabled = true;
        freshSpace.startDate = getTodayDateStr();
        freshSpace.nickname = nickname.trim();
        // 确保新增字段存在，不覆盖已有值
        if (freshSpace.hisBirthday === undefined) freshSpace.hisBirthday = null;
        if (freshSpace.hisHeight === undefined) freshSpace.hisHeight = null;
        if (!freshSpace.reminder) {
            freshSpace.reminder = {
                birthday: { lastRemindDate: null, hasRemindedToday: false },
                anniversary: { lastRemindDate: null, hasRemindedToday: false, hasShownPopup: false }
            };
        }
        saveData();
        alert(`💕 恭喜你与 ${friend.name} 开启了情侣空间！💕`);
        showFriendProfile(friendId);
    }
}

    let space = getCoupleSpace(friendId);
    let friend = appData.friends.find(f => f.id === friendId);
    if (!friend || !space.enabled) return;

    // 检查「我们的回忆」是否有红点
    let memories = appData.coupleMemories?.[friendId] || [];
    let hasUnread = memories.some(m => m.hasRedDot === true);
    let redDotHtml = hasUnread ? '<span class="red-dot"></span>' : '';

    let modalHtml = `
        <div class="modal-container" style="width: 90%; max-width: 400px; padding: 16px; text-align: center;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span id="closeCoupleSpaceModal" style="cursor:pointer; font-size:18px; color:#ff3b30;">✕ 关闭</span>
                <span style="font-size:18px; font-weight:600; color:#ff6b81;">💕 情侣空间</span>
                <span id="backToProfileFromCoupleSpace" style="cursor:pointer; font-size:14px; color:#07c160;">← 返回</span>
            </div>
            <div style="display: flex; flex-direction: column; gap: 8px; text-align: left;">
                <div class="settings-item" data-sub="we" style="padding: 10px 14px; border-radius: 8px; background: #f8f8fa; border-bottom: none; justify-content: center; font-weight: 500;">
                    我们
                </div>
                <div class="settings-item" data-sub="hisThought" style="padding: 10px 14px; border-radius: 8px; background: #f8f8fa; border-bottom: none; justify-content: center; font-weight: 500;">
                    他的想法
                </div>
                <div class="settings-item" data-sub="memories" style="padding: 10px 14px; border-radius: 8px; background: #f8f8fa; border-bottom: none; justify-content: center; font-weight: 500; position: relative;">
                    我们的回忆 ${redDotHtml}
                </div>
                <div class="settings-item" data-sub="imageCSS" style="padding: 10px 14px; border-radius: 8px; background: #f8f8fa; border-bottom: none; justify-content: center; font-weight: 500;">
                    图片样式
                </div>
            </div>
        </div>
    `;

    let modal = showModal(modalHtml);
    
    // ✕ 关闭 → 回到消息列表
    let closeBtn = modal.querySelector("#closeCoupleSpaceModal");
    if (closeBtn) {
        closeBtn.onclick = () => {
            modal.remove();
        };
    }
    
    // ← 返回 → 回到个人主页
    let backBtn = modal.querySelector("#backToProfileFromCoupleSpace");
    if (backBtn) {
        backBtn.onclick = () => {
            modal.remove();
            showFriendProfile(friendId);
        };
    }

    modal.querySelectorAll("[data-sub]").forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            let sub = btn.dataset.sub;
            modal.remove();
            if (sub === "we") {
                showWeModal(friendId);
            } else if (sub === "hisThought") {
                triggerHisThought(friendId);
            } else if (sub === "memories") {
                if (appData.coupleMemories?.[friendId]) {
                    appData.coupleMemories[friendId].forEach(m => m.hasRedDot = false);
                    saveData();
                }
                showCoupleMemoriesModal(friendId);
            } else if (sub === "imageCSS") {
                showImageCSSModal(friendId);
            }
        };
    });
}
