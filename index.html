// ==================== 他的想法 ====================
function triggerHisThought(friendId) {
    // 2% 概率触发
    if (Math.random() >= 0.02) {
        // 触发失败，静默关闭
        return;
    }

    let friend = appData.friends.find(f => f.id === friendId);
    if (!friend) return;

    let space = getCoupleSpace(friendId);
    let nickname = space.nickname || friend.name;

    // 显示模拟键盘弹窗
    showTypingKeyboardModal(friendId, nickname);
}

// ==================== 模拟键盘弹窗 ====================
function showTypingKeyboardModal(friendId, nickname) {
    let keys = [
        ['Q','W','E','R','T','Y','U','I','O','P'],
        ['A','S','D','F','G','H','J','K','L'],
        ['Z','X','C','V','B','N','M']
    ];
    let punctuation = ['，', '。', ' '];

    let currentText = '';
    let isFinished = false;

    let modalHtml = `
        <div class="modal-container" style="width: 92%; max-width: 450px; padding: 16px; border-radius: 16px; background: var(--app-bg-color);">
            <div style="font-size: 14px; color: #8e8e93; margin-bottom: 6px; text-align: center;">${escapeHtml(nickname)} 正在打字...</div>
            <div id="typingTextDisplay" style="min-height: 60px; padding: 10px; background: #f5f5f7; border-radius: 10px; font-size: 18px; letter-spacing: 2px; word-break: break-all; margin-bottom: 12px; color: #1c1c1e; text-align: left;">&nbsp;</div>
            <div id="keyboardContainer" style="display: flex; flex-direction: column; gap: 6px; align-items: center; user-select: none;">
    `;

    // 字母行
    for (let row of keys) {
        modalHtml += `<div style="display: flex; gap: 4px; justify-content: center;">`;
        for (let key of row) {
            modalHtml += `<div class="key-btn" data-key="${key}" style="width: 30px; height: 36px; background: #e5e5ea; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #1c1c1e; transition: background 0.1s; cursor: default;">${key}</div>`;
        }
        modalHtml += `</div>`;
    }

    // 标点符号行
    modalHtml += `<div style="display: flex; gap: 6px; justify-content: center; margin-top: 2px;">`;
    for (let p of punctuation) {
        let label = p === ' ' ? '空格' : p;
        modalHtml += `<div class="key-btn" data-key="${p}" style="min-width: 40px; height: 36px; background: #e5e5ea; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 400; color: #1c1c1e; padding: 0 8px; cursor: default;">${label}</div>`;
    }
    modalHtml += `<div class="key-btn" data-key="⌫" style="min-width: 40px; height: 36px; background: #ff3b30; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 400; color: #fff; padding: 0 8px; cursor: default;">⌫</div>`;
    modalHtml += `</div>`;

    modalHtml += `
            </div>
            <div style="margin-top: 10px; text-align: center; font-size: 11px; color: #8e8e93;">⏳ 对方正在输入...</div>
        </div>
    `;

    let modal = showModal(modalHtml);

    // 获取所有按键
    let keyBtns = modal.querySelectorAll('.key-btn');
    let textDisplay = modal.querySelector('#typingTextDisplay');

    // 生成随机打字序列（字母和标点混合，无上限）
    let allKeyChars = [];
    for (let row of keys) {
        allKeyChars.push(...row);
    }
    allKeyChars.push(...punctuation);

    // 随机生成打字序列长度 5-50 个字符
    let totalTypingCount = Math.floor(Math.random() * 46) + 5;
    let typingSequence = [];
    for (let i = 0; i < totalTypingCount; i++) {
        let randomChar = allKeyChars[Math.floor(Math.random() * allKeyChars.length)];
        typingSequence.push(randomChar);
    }

    let currentIndex = 0;
    let typingSpeed = 0; // 动态计算

    function typeNextChar() {
        if (isFinished || currentIndex >= typingSequence.length) {
            // 打字完成，自动确定
            finishTyping();
            return;
        }

        let char = typingSequence[currentIndex];
        let keyBtn = null;

        // 查找对应的按键
        for (let btn of keyBtns) {
            if (btn.dataset.key === char) {
                keyBtn = btn;
                break;
            }
        }

        // 高亮按键
        if (keyBtn) {
            keyBtn.style.background = '#07c160';
            keyBtn.style.color = '#fff';
            setTimeout(() => {
                keyBtn.style.background = '';
                keyBtn.style.color = '';
            }, 150);
        }

        // 更新文本
        if (char === ' ') {
            currentText += ' ';
        } else {
            currentText += char;
        }

        if (textDisplay) {
            textDisplay.textContent = currentText;
            textDisplay.scrollTop = textDisplay.scrollHeight;
        }

        currentIndex++;

        // 随机间隔 100-500ms
        typingSpeed = Math.floor(Math.random() * 400) + 100;
        setTimeout(typeNextChar, typingSpeed);
    }

    function finishTyping() {
        if (isFinished) return;
        isFinished = true;

        // 如果文本为空，使用默认文本
        let finalText = currentText.trim();
        if (!finalText) {
            finalText = 'wo ai ni';
        }

        // 生成图片并发布到「我们的回忆」
        generateAndPostMemory(friendId, finalText);

        // 关闭弹窗
        modal.remove();
    }

    // 开始打字
    setTimeout(typeNextChar, 500);

    // 如果用户点击关闭，也完成打字
    let closeBtn = modal.querySelector('.modal-close-btn');
    if (closeBtn) {
        closeBtn.onclick = () => {
            if (!isFinished) {
                finishTyping();
            }
            modal.remove();
        };
    }
}

// ==================== 获取完整日期时间字符串 ====================
function getFullDateTimeStr() {
    let now = new Date();
    let year = now.getFullYear();
    let month = String(now.getMonth() + 1).padStart(2, '0');
    let day = String(now.getDate()).padStart(2, '0');
    let hours = String(now.getHours()).padStart(2, '0');
    let minutes = String(now.getMinutes()).padStart(2, '0');
    let seconds = String(now.getSeconds()).padStart(2, '0');
    return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
}

// ==================== 生成图片并发布到「我们的回忆」 ====================
function generateAndPostMemory(friendId, text) {
    let friend = appData.friends.find(f => f.id === friendId);
    if (!friend) return;

    let space = getCoupleSpace(friendId);
    let nickname = space.nickname || friend.name;

    // 生成图片
    let imageData = generateRomanticImage(text, friendId);

    // 随机决定是否添加配文（50% 概率）
    let caption = '';
    if (Math.random() < 0.5) {
        let captions = ['💕', '✨', '🌸', '🌙', '💭', '❤️', '🌟', '💫'];
        caption = captions[Math.floor(Math.random() * captions.length)];
    }

    // 发布到回忆
    let memory = {
        id: Date.now(),
        text: text,
        image: imageData,
        caption: caption,
        time: getFullDateTimeStr(),
        hasRedDot: true,
        comments: []
    };

    if (!appData.coupleMemories) appData.coupleMemories = {};
    if (!appData.coupleMemories[friendId]) appData.coupleMemories[friendId] = [];
    appData.coupleMemories[friendId].push(memory);
    saveData();

    // 显示弹窗提醒（仅后台触发时显示）
    if (window._isBackgroundTrigger) {
        window._isBackgroundTrigger = false;
        let nickname = space.nickname || friend.name;
        alert(`💕 ${nickname} 好像有东西放在回忆里了，记得去看哦`);
    }

    // 刷新界面
    renderCurrentPage();
}

// ===== 水墨晕染背景绘制函数（多色混合版） =====
function drawInkWashBackground(ctx, w, h, color1, color2) {
    ctx.clearRect(0, 0, w, h);

    function hexToRgb(hex) {
        let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
            r: parseInt(result[1], 16),
            g: parseInt(result[2], 16),
            b: parseInt(result[3], 16)
        } : { r: 255, g: 200, b: 200 };
    }

    let c1 = hexToRgb(color1);
    let c2 = hexToRgb(color2);

    let baseGrad = ctx.createLinearGradient(0, 0, w * 0.7, h);
    baseGrad.addColorStop(0, color1);
    baseGrad.addColorStop(0.5, `rgb(${(c1.r + c2.r) / 2}, ${(c1.g + c2.g) / 2}, ${(c1.b + c2.b) / 2})`);
    baseGrad.addColorStop(1, color2);
    ctx.fillStyle = baseGrad;
    ctx.fillRect(0, 0, w, h);

    let spots = [
        { x: w * 0.3, y: h * 0.25, r: w * 0.55, color: color1, opacity: 0.4 },
        { x: w * 0.7, y: h * 0.65, r: w * 0.5, color: color2, opacity: 0.35 },
        { x: w * 0.5, y: h * 0.45, r: w * 0.4, color: `rgb(${(c1.r + c2.r) / 2}, ${(c1.g + c2.g) / 2}, ${(c1.b + c2.b) / 2})`, opacity: 0.25 },
        { x: w * 0.1, y: h * 0.7, r: w * 0.3, color: color1, opacity: 0.2 },
        { x: w * 0.85, y: h * 0.2, r: w * 0.25, color: color2, opacity: 0.2 },
        { x: w * 0.5, y: h * 0.85, r: w * 0.35, color: color1, opacity: 0.15 },
        { x: w * 0.15, y: h * 0.15, r: w * 0.2, color: color2, opacity: 0.15 },
        { x: w * 0.9, y: h * 0.8, r: w * 0.22, color: color1, opacity: 0.15 },
        { x: w * 0.25, y: h * 0.5, r: w * 0.18, color: color2, opacity: 0.12 },
        { x: w * 0.7, y: h * 0.35, r: w * 0.15, color: color1, opacity: 0.12 },
    ];

    for (let spot of spots) {
        let grad = ctx.createRadialGradient(spot.x, spot.y, 0, spot.x, spot.y, spot.r);
        grad.addColorStop(0, spot.color);
        grad.addColorStop(0.6, spot.color);
        grad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.globalAlpha = spot.opacity;
        ctx.fillStyle = grad;
        ctx.fillRect(spot.x - spot.r, spot.y - spot.r, spot.r * 2, spot.r * 2);
    }
    ctx.globalAlpha = 1.0;

    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 600; i++) {
        let x = Math.random() * w;
        let y = Math.random() * h;
        let radius = Math.random() * 2.5 + 0.5;
        let gray = Math.floor(Math.random() * 100 + 120);
        ctx.fillStyle = `rgb(${gray}, ${gray}, ${gray})`;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;

    let edgeGrad = ctx.createRadialGradient(w/2, h/2, w*0.25, w/2, h/2, w*0.75);
    edgeGrad.addColorStop(0, 'rgba(255,255,255,0)');
    edgeGrad.addColorStop(0.7, 'rgba(255,255,255,0)');
    edgeGrad.addColorStop(1, 'rgba(255,255,255,0.06)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, 0, w, h);
}

// ==================== 生成恋爱风格图片 ====================
function generateRomanticImage(text, friendId) {
    let canvas = document.createElement('canvas');
    canvas.width = 400;
    canvas.height = 500;
    let ctx = canvas.getContext('2d');

    // ===== 获取该好友的样式设置 =====
    let rawData = appData.coupleImageCSS?.[friendId];
    let style = {};
    if (typeof rawData === 'string') {
        style = {
            topColor: '#FFD1DC',
            bottomColor: '#FFB7C5',
            bgImage: null,
            cssCode: rawData
        };
        appData.coupleImageCSS[friendId] = style;
        saveData();
    } else if (rawData && typeof rawData === 'object') {
        style = rawData;
    } else {
        style = { topColor: '#FFD1DC', bottomColor: '#FFB7C5', bgImage: null, cssCode: '' };
    }

    let topColor = style.topColor || '#FFD1DC';
    let bottomColor = style.bottomColor || '#FFB7C5';
    let bgImage = style.bgImage || null;
    let cssCode = style.cssCode || '';

    // ===== 背景绘制 =====
    if (bgImage && bgImage !== 'null' && bgImage !== '') {
        try {
            let img = new Image();
            img.src = bgImage;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        } catch(e) {
            drawInkWashBackground(ctx, canvas.width, canvas.height, topColor, bottomColor);
        }
    } else {
        drawInkWashBackground(ctx, canvas.width, canvas.height, topColor, bottomColor);
    }

    // ===== 主文字（居中） =====
    ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#4a4a4a';
    ctx.font = 'bold 42px "PingFang SC", "Helvetica Neue", system-ui, sans-serif';

    let lines = [];
    let words = text.split(' ');
    let currentLine = '';
    for (let word of words) {
        let testLine = currentLine + word + ' ';
        let metrics = ctx.measureText(testLine);
        if (metrics.width > 320 && currentLine.length > 0) {
            lines.push(currentLine.trim());
            currentLine = word + ' ';
        } else {
            currentLine = testLine;
        }
    }
    if (currentLine.trim()) {
        lines.push(currentLine.trim());
    }

    if (lines.length === 0) {
        lines = [text];
    }

    let lineHeight = 56;
    let startY = 250 - ((lines.length - 1) * lineHeight) / 2;
    ctx.textBaseline = 'top';
    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], 200, startY + i * lineHeight);
    }

    return canvas.toDataURL('image/png');
}

// ==================== 对方24小时内自动回复评论 ====================
function scheduleMemoryCommentReply(friendId, memoryId) {

    setTimeout(() => {
        let memories = appData.coupleMemories?.[friendId] || [];

// 添加头像框（高级版，支持模板）
function addAvatarFrameAdvanced(name, css, template) {
    // 支持对象参数
    if (typeof name === 'object' && name !== null) {
        let obj = name;
        let frameName = obj.name || obj.title || '未命名';
        let frameCss = obj.css || obj.style || '';
        let frameTemplate = obj.template || obj.html || '';
        return addAvatarFrameAdvanced(frameName, frameCss, frameTemplate);
    }
    
    // 确保数据结构存在
    if (!appData.avatarFrames) {
        appData.avatarFrames = {
            library: [
                { id: 'frame_default', name: '默认', css: '', template: '' }
            ],
            default: 'frame_default',
            sessions: {}
        };
    }
    
    // 上限检查
    if (appData.avatarFrames.library.length >= 10) {
        alert('头像框已达上限（10个），请先删除再添加');
        return false;
    }
    
    // 名称校验
    if (!name || !name.trim()) {
        alert('请输入头像框名称');
        return false;
    }
    if (appData.avatarFrames.library.some(f => f.name === name.trim())) {
        alert('头像框名称已存在');
        return false;
    }
    
    let id = 'frame_' + Date.now();
    appData.avatarFrames.library.push({
        id: id,
        name: name.trim(),
        css: css || '',
        template: template || ''
    });
    saveData();
    return id;
}

        { id: "patPat", name: "拍一拍" },
        { id: "weather", name: "天气" },
        { id: "status", name: "状态" }
    ];
    let currentCategory = categories[0].id;
    let currentGroup = "默认";
    let batchMode = false;
    let selectedIndices = new Set();
    let floatingBar = null;
    let searchKeyword = "";
    
    function getCurrentItems() {
        let groups = lexicon[currentCategory] || {};
        if (!groups[currentGroup]) {
            groups[currentGroup] = [];
            lexicon[currentCategory] = groups;
            saveData();
        }
        return groups[currentGroup];
    }
    
    function saveCurrentItems(items) {
        let groups = lexicon[currentCategory] || {};
        groups[currentGroup] = items;
        lexicon[currentCategory] = groups;
        saveData();
    }
    
    function deleteGroup(groupName) {
        if (groupName === "默认") {
            alert("不能删除默认分组");
            return false;
        }
        let groups = lexicon[currentCategory] || {};
        if (!groups[groupName]) return false;
        if (confirm(`确定删除分组“${groupName}”及其所有词条吗？`)) {
            delete groups[groupName];
            if (Object.keys(groups).length === 0) {
                groups["默认"] = [];
            }
            lexicon[currentCategory] = groups;
            saveData();
            if (currentGroup === groupName) {
                currentGroup = Object.keys(groups)[0] || "默认";
            }
            return true;
        }
        return false;
    }
    
    function showFloatingBar(modalContainer) {
        if (floatingBar) floatingBar.remove();
        floatingBar = document.createElement("div");
        floatingBar.className = "floating-action-bar show";
        floatingBar.innerHTML = `
            <button id="floatingSelectAllBtn" style="background: #07c160; padding: 6px; font-size: 12px;">全选</button>
            <button id="floatingBatchDeleteBtn" style="background: #ff3b30; padding: 6px; font-size: 12px;">删除选中 (${selectedIndices.size})</button>
            <button id="floatingExitBatchBtn" style="background: #888; padding: 6px; font-size: 12px;">取消</button>
        `;
        document.body.appendChild(floatingBar);
        
        floatingBar.querySelector("#floatingSelectAllBtn").onclick = () => {
            let items = getCurrentItems();
            if (selectedIndices.size === items.length) {
                selectedIndices.clear();
            } else {
                for (let i = 0; i < items.length; i++) selectedIndices.add(i);
            }
            renderModal(modalContainer);
        };
        
        floatingBar.querySelector("#floatingBatchDeleteBtn").onclick = () => {
            if (selectedIndices.size === 0) {
                alert("请至少选择一个词条");
                return;
            }
            if (confirm(`确定删除 ${selectedIndices.size} 个词条吗？`)) {
                let items = getCurrentItems();
                let newItems = items.filter((_, idx) => !selectedIndices.has(idx));
                saveCurrentItems(newItems);
                batchMode = false;
                selectedIndices.clear();
                if (floatingBar) floatingBar.remove();
                renderModal(modalContainer);
            }
        };
        
        floatingBar.querySelector("#floatingExitBatchBtn").onclick = () => {
            batchMode = false;
            selectedIndices.clear();
            if (floatingBar) floatingBar.remove();
            renderModal(modalContainer);
        };
    }
    
    function showAddMenu(modalRef) {
        let menuHtml = `
            <div class="modal-container" style="width: 80%; max-width: 300px; padding: 16px;">
                <div style="text-align: center; margin-bottom: 16px; font-size: 16px; font-weight: 600;">选择添加方式</div>
                <div class="bottom-panel-option" data-action="single" style="margin: 8px 0; background: #07c160; color: white;">📝 添加一条（文本）</div>
                <div class="bottom-panel-option" data-action="batch" style="margin: 8px 0; background: #07c160; color: white;">📚 批量添加（多行）</div>
                <div class="bottom-panel-option" data-action="uploadImages" style="margin: 8px 0; background: #07c160; color: white;">📷 上传图片（可多选）</div>
                <div class="bottom-panel-option" data-action="cancel" style="margin: 8px 0; background: #888; color: white;">❌ 取消</div>
            </div>
        `;
        let menuModal = showModal(menuHtml);
        
        menuModal.querySelectorAll(".bottom-panel-option").forEach(opt => {
            opt.onclick = () => {
                let action = opt.dataset.action;
                menuModal.remove();
                if (action === "single") {
                    showSingleAddModal(modalRef);
                } else if (action === "batch") {
                    showBatchAddModal(modalRef);
                } else if (action === "uploadImages") {
        if (currentCategory !== "emojis") {
            alert("图片只能添加到「表情包」分类中");
            return;
        }
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.multiple = true;
        input.onchange = async (e) => {
            let files = e.target.files;
            if (files.length === 0) return;
            
            // ===== 新增：检查词条库图片总数 =====
            let totalImages = countAllLexiconImages();
            let maxImages = 500;
            
            if (totalImages >= maxImages) {
                alert('❌ 词条库图片已达上限 ' + maxImages + ' 张，请先删除旧图片再添加。');
                return;
            }
            
            let remaining = maxImages - totalImages;
            if (files.length > remaining) {
                if (!confirm('⚠️ 词条库最多 ' + maxImages + ' 张图片，当前已有 ' + totalImages + ' 张，只能再添加 ' + remaining + ' 张。\n\n是否只添加前 ' + remaining + ' 张？')) {
                    return;
                }
                // 只取前 remaining 个文件
                let originalFiles = files;
                files = [];
                for (var fi = 0; fi < Math.min(originalFiles.length, remaining); fi++) {
                    files.push(originalFiles[fi]);
                }
            }
            // ===== 新增结束 =====
            
            let items = getCurrentItems();
            let added = 0;
            for (let i = 0; i < files.length; i++) {
                try {
                    let compressed = await compressImage(files[i], 90, 0.5);
                    if (!items.includes(compressed)) {
                        items.push(compressed);
                        added++;
                    }
                } catch (err) {
                    let reader = new FileReader();
                    reader.onload = (ev) => {
                        let dataUrl = ev.target.result;
                        if (!items.includes(dataUrl)) {
                            items.push(dataUrl);
                            added++;
                        }
                    };
                    reader.readAsDataURL(files[i]);
                }
            }
            setTimeout(() => {
                saveCurrentItems(items);
                renderModal(modalRef);
                alert(`成功添加 ${added} 张图片`);
            }, 500);
        };
        input.click();
    }
            };
        });
    }
    
    function showSingleAddModal(modalRef) {
        let inputHtml = `
            <div class="modal-container" style="width: 85%; max-width: 350px; padding: 16px;">
                <div style="margin-bottom: 12px; font-size: 16px; font-weight: 600;">添加词条</div>
                <input type="text" id="singleItemInput" placeholder="输入词条内容" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 12px;">
                <div style="display: flex; gap: 8px;">
                    <button id="confirmSingleBtn" style="flex: 1; background: #07c160;">确认</button>
                    <button id="cancelSingleBtn" style="flex: 1; background: #888;">取消</button>
                </div>
            </div>
        `;
        let inputModal = showModal(inputHtml);
        let inputField = inputModal.querySelector("#singleItemInput");
        let confirmBtn = inputModal.querySelector("#confirmSingleBtn");
        let cancelBtn = inputModal.querySelector("#cancelSingleBtn");
        
        if (confirmBtn) {
            confirmBtn.onclick = () => {
                let val = inputField.value.trim();
                if (!val) { alert("请输入内容"); return; }
                let items = getCurrentItems();
                if (items.includes(val)) { alert("词条已存在"); return; }
                items.push(val);
                saveCurrentItems(items);
                inputModal.remove();
                renderModal(modalRef);
            };
        }
        if (cancelBtn) {
            cancelBtn.onclick = () => inputModal.remove();
        }
        setTimeout(() => inputField.focus(), 100);
    }
    
    function showBatchAddModal(modalRef) {
        let batchHtml = `
            <div class="modal-container" style="width: 85%; max-width: 400px; padding: 16px;">
                <div style="margin-bottom: 12px; font-size: 16px; font-weight: 600;">批量添加词条</div>
                <textarea id="batchTextArea" placeholder="每行一个词条" style="width: 100%; height: 150px; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 12px; resize: vertical;"></textarea>
                <div style="display: flex; gap: 8px;">
                    <button id="confirmBatchBtn" style="flex: 1; background: #07c160;">确认添加</button>
                    <button id="cancelBatchBtn" style="flex: 1; background: #888;">取消</button>
                </div>
            </div>
        `;
        let batchModal = showModal(batchHtml);
        let textarea = batchModal.querySelector("#batchTextArea");
        let confirmBtn = batchModal.querySelector("#confirmBatchBtn");
        let cancelBtn = batchModal.querySelector("#cancelBatchBtn");
        
        if (confirmBtn) {
            confirmBtn.onclick = () => {
                let text = textarea.value.trim();
                if (!text) { alert("请输入内容"); return; }
                let items = getCurrentItems();
                let lines = text.split(/\r?\n/).filter(line => line.trim().length > 0);
                let newLines = [];
                for (let line of lines) {
                    if (!items.includes(line) && !newLines.includes(line)) {
                        newLines.push(line);
                    }
                }
                if (newLines.length) {
                    items.push(...newLines);
                    saveCurrentItems(items);
                }
                batchModal.remove();
                renderModal(modalRef);
                alert(`成功添加 ${newLines.length} 个词条（重复 ${lines.length - newLines.length} 个）`);
            };
        }
        if (cancelBtn) {
            cancelBtn.onclick = () => batchModal.remove();
        }
        setTimeout(() => textarea.focus(), 100);
    }
    
    function editItem(index, modalRef) {
        let items = getCurrentItems();
        let oldValue = items[index];
        let isImage = oldValue && oldValue.startsWith("data:image");
        
        if (isImage) {
            alert("图片暂不支持编辑，请删除后重新上传");
            return;
        }
        
        let editHtml = `
            <div class="modal-container" style="width: 85%; max-width: 350px; padding: 16px;">
                <div style="margin-bottom: 12px; font-size: 16px; font-weight: 600;">编辑词条</div>
                <input type="text" id="editItemInput" value="${escapeHtml(oldValue)}" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 12px;">
                <div style="display: flex; gap: 8px;">
                    <button id="saveEditBtn" style="flex: 1; background: #07c160;">保存</button>
                    <button id="cancelEditBtn" style="flex: 1; background: #888;">取消</button>
                </div>
            </div>
        `;
        let editModal = showModal(editHtml);
        let inputField = editModal.querySelector("#editItemInput");
        let saveBtn = editModal.querySelector("#saveEditBtn");
        let cancelBtn = editModal.querySelector("#cancelEditBtn");
        
        if (saveBtn) {
            saveBtn.onclick = () => {
                let newVal = inputField.value.trim();
                if (!newVal) { alert("内容不能为空"); return; }
                if (newVal === oldValue) {
                    editModal.remove();
                    return;
                }
                if (items.includes(newVal)) { alert("词条已存在"); return; }
                items[index] = newVal;
                saveCurrentItems(items);
                editModal.remove();
                renderModal(modalRef);
            };
        }
        if (cancelBtn) {
            cancelBtn.onclick = () => editModal.remove();
        }
        setTimeout(() => inputField.focus(), 100);
    }

        }

        let addBtn = container.querySelector("#addItemBtn");
        if (addBtn) {
            addBtn.onclick = () => {
                showAddMenu(modal);
            };
        }
        
        let itemsContainerInner = container.querySelector("#lexiconItemsList");
        if (itemsContainerInner && batchMode) {
            let checkboxes = itemsContainerInner.querySelectorAll(".item-checkbox");
            for (let cb of checkboxes) {
                cb.onchange = (e) => {
                    let idx = parseInt(cb.dataset.idx);
                    if (cb.checked) {
                        selectedIndices.add(idx);
                    } else {
                        selectedIndices.delete(idx);
                    }
                    if (floatingBar) {
                        let btn = floatingBar.querySelector("#floatingBatchDeleteBtn");
                        if (btn) {
                            btn.innerHTML = `删除选中 (${selectedIndices.size})`;
                        }
                    }
                    let card = cb.closest(".lexicon-item-card");
                    if (card) {
                        if (cb.checked) {
                            card.style.background = "#e8f5e9";
                        } else {
                            card.style.background = "transparent";
                        }
                    }
                };
            }
        }
        
        if (!batchMode && itemsContainerInner) {
            let editBtns = itemsContainerInner.querySelectorAll(".edit-item-btn");
            for (let btn of editBtns) {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let idx = parseInt(btn.dataset.idx);
                    editItem(idx, modal);
                };
            }
            let deleteBtns = itemsContainerInner.querySelectorAll(".delete-item-btn");
            for (let btn of deleteBtns) {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let idx = parseInt(btn.dataset.idx);
                    if (confirm("确定删除这个词条吗？")) {
                        let items = getCurrentItems();
                        items.splice(idx, 1);
                        saveCurrentItems(items);
                        renderModal(modal);
                    }
                };
            }
            let cards = itemsContainerInner.querySelectorAll(".lexicon-item-card");
            for (let card of cards) {
                let idx = parseInt(card.dataset.idx);
                let pressTimer = null;
                card.addEventListener("touchstart", (e) => {
                    pressTimer = setTimeout(() => {
                        showPopupMenu("删除词条", [
                            { label: "删除", value: "delete" },
                            { label: "批量删除", value: "batch" },
                            { label: "全选删除", value: "selectAll" }
                        ], (action) => {
                            let items = getCurrentItems();
                            if (action === "delete") {
                                if (confirm("确定删除这个词条吗？")) {
                                    items.splice(idx, 1);
                                    saveCurrentItems(items);
                                    renderModal(modal);
                                }
                            } else if (action === "batch") {
                                batchMode = true;
                                selectedIndices.clear();
                                renderModal(modal);
                                showFloatingBar(modal);
                            } else if (action === "selectAll") {
                                batchMode = true;
                                for (let i = 0; i < items.length; i++) {
                                    selectedIndices.add(i);
                                }
                                renderModal(modal);
                                showFloatingBar(modal);
                            }
                        });
                    }, 500);
                    card.addEventListener("touchend", () => {
                        if (pressTimer) clearTimeout(pressTimer);
                    });
                    card.addEventListener("touchmove", () => {
                        if (pressTimer) clearTimeout(pressTimer);
                    });
                });
            }
        }
    }
    
    let modal = showModal(`<div class="modal-container" style="padding: 12px;"></div>`);
    renderModal(modal);
}

function scheduleFriendAutoReplyToMyComment(friendId, momentId, commentText) {
    let delayHours = Math.random() * 12;
    let delayMs = delayHours * 60 * 60 * 1000;
    setTimeout(() => {
        let friend = appData.friends.find(f => f.id === friendId);
        if (!friend) return;
        let moments = appData.friendMoments[friendId];
        if (!moments) return;
        let moment = moments.find(m => m.id === momentId);
        if (!moment) return;
        
        let replyText = getRandomCommentText(friendId);
        if (replyText) {
            if (!moment.comments) moment.comments = [];
            moment.comments.push({ 
                from: friendId, 
                name: friend.name, 
                text: replyText, 
                time: new Date().toLocaleString(),
                isAutoReply: true
            });
            saveData();
            // 刷新联系人页面
            if (currentPage === "contacts") {
                renderContactsPage();
            }
            if (currentPage === "messages") {
                renderMessagesPage();
            }
            // 如果好友朋友圈弹窗打开，刷新它
            // 通过重新打开好友朋友圈弹窗来刷新
            renderCurrentPage();
            alert(`好友 ${friend.name} 回复了你的评论：${replyText}`);
        }
    }, delayMs);
}

// ==================== 对方朋友圈（倒序+时间轴折叠+点击时间查看详情） ====================
function showFriendMomentsModal(friendId) {
    if (!appData.friendMoments[friendId]) appData.friendMoments[friendId] = [];
    let moments = appData.friendMoments[friendId];
    let friend = appData.friends.find(f => f.id === friendId);
    let friendName = friend ? friend.name : "好友";
    let friendAvatar = friend ? friend.avatar : "👤";
    
    // 如果没有朋友圈，生成一条默认的
    if (moments.length === 0) {
        let { text, images } = getRandomMomentContentWithImages(friendId);
        moments.push({ id: Date.now(), text, images, time: new Date().toLocaleString(), comments: [] });
        saveData();
    }
    
    // 按时间倒序排列（最新的在最上面）
    let sortedMoments = [...moments].sort((a, b) => {
        let dateA = new Date(a.time);
        let dateB = new Date(b.time);
        return dateB - dateA;
    });
    
    // 按年月分组
    let grouped = {};
    for (let m of sortedMoments) {
        let date = new Date(m.time);
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][month]) grouped[year][month] = [];
        grouped[year][month].push(m);
    }
    
    let years = Object.keys(grouped).sort((a, b) => b - a);
    
    let html = `<div class="full-page-modal" style="height:100%; display:flex; flex-direction:column; background:var(--app-bg-color);">

        </div>
        <div id="timelineContainer" style="flex:1; overflow-y:auto; padding:12px;">`;

        let months = Object.keys(grouped[year]).sort((a, b) => b - a);
        html += `<div class="timeline-year">
            <div class="timeline-year-header" data-year="friend_year_${year}">
                <span>${year}年</span>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="timeline-year-content" id="friend_year_${year}">`;
        
        for (let month of months) {
            html += `<div class="timeline-month">
                <div class="timeline-month-header" data-month="friend_year_${year}_month_${month}">
                    <span>${month}月</span>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="timeline-month-content" id="friend_year_${year}_month_${month}">`;
            
            for (let m of grouped[year][month]) {
    let contentHtml = "";
    if (m.text) contentHtml += `<div>${escapeHtml(m.text)}</div>`;
    if (m.images && m.images.length) {
        for (let img of m.images) {
            contentHtml += `<img src="${img.thumb || img}" style="max-width:60px; max-height:60px; border-radius:6px; margin-top:6px; cursor:pointer;" class="moment-image" data-original="${img.original || img}">`;
        }
    }
                
                let commentsHtml = "";
                if (m.comments && m.comments.length) {
                    commentsHtml = `<div class="moment-comments">`;
                    for (let cmt of m.comments) {
                        let commenterName = cmt.from === "self" ? "我" : (appData.friends.find(f => f.id === cmt.from)?.name || "好友");
                        commentsHtml += `<div class="moment-comment"><span>${escapeHtml(commenterName)}</span>：${renderCommentText(cmt.text)}</div>`;
                    }
                    commentsHtml += `</div>`;
                }
                
                let avatarHtml = friendAvatar?.startsWith("data:image") ? `<img src="${friendAvatar}">` : (friendAvatar || "👤");
                let timeDisplay = formatMomentTimeDisplay(m.time);
                
                html += `
                    <div class="moment-item" data-moment-id="${m.id}" style="display:flex; gap:10px; margin-bottom:15px;">
                        <div class="moment-time-clickable" data-moment-id="${m.id}" style="width:65px; flex-shrink:0; font-size:11px; color:#07c160; padding-top:8px; cursor:pointer;">${timeDisplay}</div>
                        <div style="flex:1;">
                            <div class="moment-header" style="margin-bottom:6px;">
                                <div class="moment-avatar">${avatarHtml}</div>
                                <div><div class="moment-user">${escapeHtml(friendName)}</div></div>
                            </div>
                            <div class="moment-content" data-moment-id="${m.id}" style="cursor:pointer;">${contentHtml}</div>
                            ${commentsHtml}
                            <div class="flex-between" style="margin-top:10px;">
                                <input type="text" class="momentCommentInput" placeholder="写评论..." style="flex:1; padding:6px 8px; border-radius:18px; border:0.5px solid #ccc; font-size:12px;">
                                <button class="momentCommentBtn" data-moment-id="${m.id}" style="margin-left:6px; padding:5px 12px; font-size:12px;">评论</button>
                            </div>
                        </div>
                    </div>
                    <div style="height:1px; background:#f0f0f0; margin:10px 0;"></div>
                `;
            }
            html += `</div></div>`;
        }
        html += `</div></div>`;
    }
    html += `</div></div>`;
    
    let modal = showModal(html, true);
    let container = modal.querySelector(".modal-container");
    if (container) container.classList.add("full-page-modal");

            showFriendProfile(friendId);

    for (let h of yearHeaders) {

    for (let h of monthHeaders) {
        h.onclick = () => {
            let monthId = h.dataset.month;
            let content = document.getElementById(monthId);
            if (content) {
                content.classList.toggle("collapsed");
                let icon = h.querySelector(".toggle-icon");
                if (icon) icon.innerHTML = content.classList.contains("collapsed") ? "▶" : "▼";
            }
        };
    }
    
    // 点击左侧时间查看详情
    let timeClickables = modal.querySelectorAll(".moment-time-clickable");
    for (let el of timeClickables) {
        el.onclick = (e) => {
            e.stopPropagation();
            let momentId = el.dataset.momentId;
            let moment = moments.find(m => m.id == momentId);
            if (moment) showSingleFriendMomentModal(moment, friendName, friendAvatar);
        };
    }
    
    // 点击内容区域查看详情
    let contentAreas = modal.querySelectorAll(".moment-content");
    for (let area of contentAreas) {
        area.onclick = (e) => {
            e.stopPropagation();
            let momentId = area.dataset.momentId;
            let moment = moments.find(m => m.id == momentId);
            if (moment) showSingleFriendMomentModal(moment, friendName, friendAvatar);

    // 图片预览
    let containerDiv = modal.querySelector("#timelineContainer");

    let img = e.target.closest(".moment-image");

});

function showFriendDiariesModal(friendId) {
    let diaries = appData.friendDiaries[friendId] || [];
    let currentIndex = diaries.length - 1;
    
    // 将内容中的<br>和\n正确转换为HTML换行
    function formatDiaryContent(content) {
        if (!content) return "";
        // 先将<br>标签替换为特殊标记，避免被双重转义
        let withBr = content.replace(/<br>/g, "【BR】");
        // 转义HTML
        let escaped = escapeHtml(withBr);
        // 将特殊标记还原为<br>
        let withBrAgain = escaped.replace(/【BR】/g, "<br>");
        // 再将普通换行符转换为<br>
        let final = withBrAgain.replace(/\n/g, "<br>");
        return final;
    }
    
    function renderDiary(index) {
        if (index < 0 || index >= diaries.length) return;
        let diary = diaries[index];
        let commentsHtml = "";
        if (diary.comments && diary.comments.length) {
            commentsHtml = `<div class="moment-comments">`;
            for (let cmt of diary.comments) {
                let commenterName = "";
                if (cmt.from === "self") {
                    commenterName = "我";
                } else {
                    let foundFriend = appData.friends.find(f => f.id === cmt.from);
                    commenterName = foundFriend ? foundFriend.name : "好友";
                }
                commentsHtml += `<div class="moment-comment"><span>${escapeHtml(commenterName)}</span>：${renderCommentText(cmt.text)}</div>`;

            commentsHtml += `</div>`;

                modal.remove();
            };
        }
        
        // ← 返回 → 回到个人主页
        let backBtn = modal.querySelector("#backToProfileFromDiary");
        if (backBtn) {
            backBtn.onclick = () => {
                modal.remove();

        for (let item of dirItems) {
            item.onclick = () => {

                modal.remove();
                renderDiary(newIndex);

                    <span id="backToProfileFromDiaryEmpty" style="cursor:pointer; font-size:14px; color:#07c160;">← 返回</span>
                </div>
                <div style="text-align:center; padding:30px; color:#8e8e93;">暂无日记</div>
            `;
            let closeBtn = modal.querySelector("#closeDiaryEmpty");
            if (closeBtn) {
                closeBtn.onclick = () => modal.remove();
            }
            let backBtn = modal.querySelector("#backToProfileFromDiaryEmpty");
            if (backBtn) {
                backBtn.onclick = () => {
                    modal.remove();
                    showFriendProfile(friendId);
                };
            }

        if (l.direction === "my" || (!l.direction && l.from === "self")) {
            myLetters.push(l);
            if (l.reply) theirReplies.push(l);
        } else if (l.direction === "their" || (!l.direction && l.from === "other")) {
            theirLetters.push(l);

        }

    function formatDateTime(isoString) {
        let date = new Date(isoString);
        return `${date.getMonth()+1}月${date.getDate()}日 ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    }
    
    function formatExpectedTime(timestamp) {
        let now = Date.now();
        let remaining = timestamp - now;
        if (remaining <= 0) return "即将回信";
        let hours = Math.floor(remaining / (1000 * 60 * 60));
        let minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
        if (hours > 0) {
            return `${hours}小时${minutes > 0 ? minutes + "分钟" : ""}后`;
        }
        return `${minutes}分钟后`;
    }

// ==================== 拍一拍消息生成 ====================
function getRandomPatMessage(fromSelf = true, friendId = null) {
    let patActions = [];
    
    // ✅ 从公共词条库收集（所有人共用）
    let publicPat = appData.lexicon.public?.patPat || {};
    for (let g in publicPat) {
        if (Array.isArray(publicPat[g])) {
            for (let item of publicPat[g]) {
                if (item && item.trim() && typeof item === 'string') {
                    patActions.push(item.trim());
                }
            }
        }
    }
    
    // ✅ 从私人词条库收集（仅该好友可用）
    if (friendId && appData.privateLexicon[friendId] && appData.privateLexicon[friendId].patPat) {
        let privPat = appData.privateLexicon[friendId].patPat;
        for (let g in privPat) {
            if (Array.isArray(privPat[g])) {
                for (let item of privPat[g]) {
                    if (item && item.trim() && typeof item === 'string') {
                        patActions.push(item.trim());
                    }
                }
            }
        }
    }
    
    // 如果没有任何拍一拍词条，使用默认值
    if (patActions.length === 0) {
        patActions = ["拍了拍", "戳了戳", "牵起了", "摸了摸"];
    }
    
    let patContent = patActions[Math.floor(Math.random() * patActions.length)];
    
    let symbol = "";
    if (fromSelf) {
        symbol = appData.chatSettings.myPatSymbol || "🤍";
    } else {
        if (friendId && appData.friendChatSettings[friendId]) {
            symbol = appData.friendChatSettings[friendId].otherPatSymbol || appData.chatSettings.otherPatSymbol || "🤍";
        } else {
            symbol = appData.chatSettings.otherPatSymbol || "🤍";
        }
    }
    
    let result = `${symbol}${patContent}${symbol}`;
    return result.trim();
}

function sendPatMessage(sessionId, fromSelf = true) {
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    let friendId = null;
    if (session && session.type === "friend") {
        friendId = session.targetId;
    }
    let patText = getRandomPatMessage(fromSelf, friendId);
    sendMessage(sessionId, patText, fromSelf, null, true);
}

// 新增：用于群聊拍一拍时带上发送者信息
function sendPatMessageWithSender(sessionId, fromSelf = true, senderInfo = null) {
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    let friendId = null;
    if (session && session.type === "friend") {
        friendId = session.targetId;
    }
    let patText = getRandomPatMessage(fromSelf, friendId);
    
    // 如果是群聊且指定了发送者信息，使用 senderInfo
    if (session && session.type === "group" && senderInfo) {
        sendMessage(sessionId, patText, false, senderInfo, true);
    } else {
        sendMessage(sessionId, patText, fromSelf, null, true);
    }
}

// ==================== 获取历史消息用于引用 ====================
function getAllHistoricalMessages(sessionId) {
    let msgs = appData.messages[sessionId] || [];
    return msgs.filter(m => !m.isPat && !m.isVote);
}

function getRandomHistoricalMessageForQuote(sessionId) {
    let msgs = getAllHistoricalMessages(sessionId);
    if (msgs.length === 0) return null;
    let randomIndex = Math.floor(Math.random() * msgs.length);
    let selectedMsg = msgs[randomIndex];
    let senderName = "";
    if (selectedMsg.from === "self") {
        senderName = appData.user.name;
    } else {
        senderName = selectedMsg.senderName || "对方";
    }
    let contentPreview = "";
    let isImage = false;
    let imageSrc = null;
    if (selectedMsg.text && selectedMsg.text.startsWith("data:image")) {
        contentPreview = "[图片]";
        isImage = true;
        imageSrc = selectedMsg.text;
    } else {
        if (selectedMsg.text.length > 50) {
            contentPreview = selectedMsg.text.substring(0, 50) + "...";
        } else {
            contentPreview = selectedMsg.text;
        }
    }
    return {
        msgId: selectedMsg.id,
        senderName: senderName,
        contentPreview: contentPreview,
        isImage: isImage,
        imageSrc: imageSrc
    };
}

function renderQuotePreview(replyTo) {
    if (!replyTo) return "";
    let contentHtml = "";
    if (replyTo.isImage && replyTo.imageSrc) {
        // 引用图片时：只显示缩略图，不加任何文字

            ${contentHtml}

}

// ==================== 消息发送核心函数 ====================
function sendMessage(sessionId, text, fromSelf = true, senderInfo = null, isPat = false, isVote = false, voteData = null, replyTo = null, isQuestionnaire = false, questionnaireId = null) {
    // 安全处理 text
    if (typeof text !== 'string') text = String(text || '');
    if (!text.trim() && !isVote && !isQuestionnaire) return;
    let now = new Date();
    let year = now.getFullYear();
    let month = String(now.getMonth() + 1).padStart(2, '0');
    let day = String(now.getDate()).padStart(2, '0');
    let hours = String(now.getHours()).padStart(2, '0');
    let minutes = String(now.getMinutes()).padStart(2, '0');
    let seconds = String(now.getSeconds()).padStart(2, '0');
    let timeStr = `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
    let msgId = Date.now() + "_" + Math.random().toString(36).substr(2, 6);
    let msg = {
        id: msgId,
        text: text,
        time: timeStr,
        from: fromSelf ? "self" : "other",
        timestamp: Date.now(),
        read: false,
        readByReceiver: false,
        isPat: isPat
    };
    if (isVote && voteData) {
        msg.isVote = true;
        msg.voteId = voteData.id;
        msg.title = voteData.title;
    }
    if (isQuestionnaire && questionnaireId) {
    msg.isQuestionnaire = true;
    msg.questionnaireId = questionnaireId;
    msg.fromMe = fromSelf;  // ← 只加了这一行
}
    if (senderInfo) {
        msg.senderName = senderInfo.name;
        msg.senderAvatar = senderInfo.avatar;
        msg.senderId = senderInfo.id;
    }
    if (replyTo) {
    // 如果是引用图片，确保图片数据完整传递
    msg.replyTo = {
        msgId: replyTo.msgId,
        senderName: replyTo.senderName,
        contentPreview: replyTo.isImage ? '[图片]' : replyTo.contentPreview,
        isImage: replyTo.isImage || false,
        imageSrc: replyTo.isImage ? replyTo.imageSrc : null
    };
}
    if (!appData.messages[sessionId]) {
        appData.messages[sessionId] = [];
    }
    appData.messages[sessionId].push(msg);
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (session) {
        if (isVote) {
            session.lastMsg = `投票：${voteData.title}`;
        } else if (isQuestionnaire) {
            let q = appData.questionnaires[questionnaireId];
            session.lastMsg = `📄 问卷：${q ? q.title : '问卷'}`;
        } else {
            if (text.length > 20) {
                session.lastMsg = text.substring(0, 20) + "...";
            } else {
                session.lastMsg = text;
            }
        }
        session.lastTime = timeStr;
        if (!fromSelf && currentOpenSessionId !== sessionId) {
            session.unread = (session.unread || 0) + 1;
        } else if (!fromSelf && currentOpenSessionId === sessionId) {
            msg.read = true;
        }
    }
    saveData();
    
    // ===== 新增：对方发消息时检测是否在看历史消息 =====
if (!fromSelf && currentOpenSessionId === sessionId && currentOpenChatWindow) {
    const container = currentOpenChatWindow.querySelector('.messages-container');
    if (container) {
        const isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
        if (!isAtBottom) {
            // 用户在看历史消息 → 显示新消息气泡
            showNewMsgBubble(sessionId);
        } else {
            // 用户在底部 → 正常滚动到底部
            setTimeout(() => {
                container.scrollTop = container.scrollHeight;
            }, 50);

    }
}
    
    if (currentPage === "messages") {
        let sessionItem = document.querySelector(`.session-item[data-session-id="${sessionId}"]`);
        if (sessionItem && session) {
            let lastMsgSpan = sessionItem.querySelector('.last-msg');
            if (lastMsgSpan) {
                if (isVote) {
                    lastMsgSpan.innerText = `投票：${voteData.title}`;
                } else if (isQuestionnaire) {
                    let q = appData.questionnaires[questionnaireId];
                    lastMsgSpan.innerText = `📄 问卷：${q ? q.title : '问卷'}`;
                } else {
                    if (text.length > 20) {
                        lastMsgSpan.innerText = text.substring(0, 20) + "...";
                    } else {
                        lastMsgSpan.innerText = text;
                    }
                }
            }
            let timeSpan = sessionItem.querySelector('.time');
            if (timeSpan) {
                timeSpan.innerText = timeStr;
            }
            let unreadSpan = sessionItem.querySelector('.unread-badge');
            if (session.unread > 0) {
                if (!unreadSpan) {
                    let nameSpan = sessionItem.querySelector('.session-name');
                    let badge = document.createElement('span');
                    badge.className = 'unread-badge';
                    badge.innerText = session.unread;
                    nameSpan.appendChild(badge);
                } else {
                    unreadSpan.innerText = session.unread;
                }
            } else {
                if (unreadSpan) {
                    unreadSpan.remove();
                }
            }
        } else if (!sessionItem && session) {
            renderMessagesPage();
        }
    }
    
    if (currentOpenSessionId === sessionId && currentOpenChatWindow) {
    renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
    // 滚动逻辑已由 renderChatMessagesToWindow 内部处理
    if (!fromSelf) {
        let messagesList = appData.messages[sessionId];
        let lastMyMsg = null;
        for (let i = messagesList.length - 1; i >= 0; i--) {
            if (messagesList[i].from === "self") {
                lastMyMsg = messagesList[i];
                break;
            }
        }
        if (lastMyMsg) {
            lastMyMsg.readByReceiver = true;
            saveData();

}
    
    if (fromSelf) {

function renderVoteMessage(voteId, isMine, senderName) {
    let vote = appData.votes[voteId];
    if (!vote) return `<div class="bubble">投票已失效</div>`;
    
    let now = Date.now();
    let isEnded = vote.ended || now >= vote.endTime;
    let remainingMs = Math.max(0, vote.endTime - now);
    let remainingMin = Math.floor(remainingMs / 60000);
    let remainingSec = Math.floor((remainingMs % 60000) / 1000);
    let timeText = "";
    if (isEnded) {
        timeText = "投票已结束";
    } else {
        timeText = `剩余 ${remainingMin}:${remainingSec.toString().padStart(2, '0')}`;
    }
    
    let totalVotes = vote.votes.reduce((a, b) => a + b, 0);
    let optionsHtml = "";
    for (let idx = 0; idx < vote.options.length; idx++) {
        let opt = vote.options[idx];
        let percent = 0;
        if (totalVotes > 0) {
            percent = (vote.votes[idx] / totalVotes * 100).toFixed(1);
        }
        let disabledClass = isEnded ? 'disabled' : '';
        optionsHtml += `
            <div class="vote-option ${disabledClass}" data-option-idx="${idx}">
                <div class="vote-option-name">${escapeHtml(opt)}</div>
                <div class="vote-bar">
                    <div class="vote-bar-fill" style="width: ${percent}%;">${percent}%</div>
                </div>
                <div class="vote-count">${vote.votes[idx]}票</div>
            </div>
        `;
    }
    
    let endedHtml = "";
    if (isEnded) {
        endedHtml = '<div style="margin-top:8px; font-size:11px; color:#ff3b30;">投票已结束，感谢参与</div>';
    }
    
    return `
        <div class="vote-card" data-vote-id="${voteId}">
            <div class="vote-title">📊 ${escapeHtml(vote.title)}</div>
            ${optionsHtml}
            <div class="vote-footer">
                <span>总票数: ${totalVotes}</span>
                <span class="${isEnded ? 'vote-ended' : 'vote-timer'}">${timeText}</span>
            </div>
            ${endedHtml}
        </div>
    `;
}

// ==================== 需求1：优化后的自动回复核心逻辑（第一条30-120秒，连续间隔5-60秒） ====================
function startReplyWithTyping(sessionId) {
    if (replyTimers[sessionId]) {
        clearTimeout(replyTimers[sessionId]);
        delete replyTimers[sessionId];
    }
    if (consecutiveReplyQueues[sessionId]) {
        if (consecutiveReplyQueues[sessionId].timer) {
            clearTimeout(consecutiveReplyQueues[sessionId].timer);
        }
        delete consecutiveReplyQueues[sessionId];
    }
    
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (!session) return;
    showTypingStatus(sessionId, true);
    
    let patProb = appData.chatSettings.patProbability || 30;
    let firstDelay = Math.floor(Math.random() * (appData.chatSettings.replyDelayMax - appData.chatSettings.replyDelayMin + 1) + appData.chatSettings.replyDelayMin);
    
    if (session.type === "friend") {
        let friendId = session.targetId;
        let friendSettings = getFriendChatSettings(friendId);
        let friendPatProb = friendSettings.patProbability !== undefined ? friendSettings.patProbability : patProb;
        let friendDoPat = Math.random() * 100 < friendPatProb;
        
        replyTimers[sessionId] = setTimeout(() => {
            showTypingStatus(sessionId, false);
            
            let replyCount = Math.floor(Math.random() * 5) + 1;
            
            if (friendDoPat) {
                sendPatMessage(sessionId, false);
                replyCount--;
                if (replyCount > 0) {
                    scheduleConsecutiveReplies(sessionId, friendId, replyCount);
                }
            } else {
                let doQuote = Math.random() * 100 < (appData.chatSettings.replyWithQuoteProb || 40);
                let replyText = getRandomAutoReplyForFriend(friendId);
                let replyTo = null;
                if (doQuote) {
                    let quoteMsg = getRandomHistoricalMessageForQuote(sessionId);
                    if (quoteMsg) {
                        replyTo = quoteMsg;
                    }
                }
                sendMessage(sessionId, replyText, false, null, false, false, null, replyTo);
                replyCount--;
                if (replyCount > 0) {
                    scheduleConsecutiveReplies(sessionId, friendId, replyCount);
                }
            }
            
            if (currentOpenSessionId === sessionId) {
                startIdleTimer(sessionId);
            }
            delete replyTimers[sessionId];
        }, firstDelay);
        
    } else if (session.type === "group") {
        let group = appData.groups.find(g => g.id === session.targetId);
        if (!group) return;
        
        let availableMembers = [];
        for (let mid of group.members) {
            if (mid !== "self") {
                let member = appData.friends.find(f => f.id === mid);
                if (member) {
                    availableMembers.push({
                        id: member.id,
                        name: member.name || "成员",
                        avatar: member.avatar || "👤"
                    });
                }
            }
        }
        
        if (availableMembers.length === 0) {
            showTypingStatus(sessionId, false);
            delete replyTimers[sessionId];
            return;
        }
        
        let replyCount = Math.floor(Math.random() * Math.min(availableMembers.length, 5)) + 1;
        let shuffled = [...availableMembers];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        let selectedMembers = shuffled.slice(0, replyCount);
        
        replyTimers[sessionId] = setTimeout(() => {
            showTypingStatus(sessionId, false);
            scheduleGroupConsecutiveReplies(sessionId, selectedMembers, 0, true);
            if (currentOpenSessionId === sessionId) {
                startIdleTimer(sessionId);
            }
            delete replyTimers[sessionId];
        }, firstDelay);
    }
}

// ==================== 单聊连续回复调度（间隔5-60秒） ====================
function scheduleConsecutiveReplies(sessionId, friendId, remainingCount) {
    if (remainingCount <= 0) return;
    
    let consecutiveDelay = Math.floor(Math.random() * (appData.chatSettings.consecutiveReplyMax - appData.chatSettings.consecutiveReplyMin + 1) + appData.chatSettings.consecutiveReplyMin);
    
    let timer = setTimeout(() => {
        let session = appData.sessions.find(s => s.sessionId === sessionId);
        if (!session) return;
        
        let patProb = appData.chatSettings.patProbability || 30;
        let friendSettings = getFriendChatSettings(friendId);
        let friendPatProb = friendSettings.patProbability !== undefined ? friendSettings.patProbability : patProb;
        let doPat = Math.random() * 100 < friendPatProb;
        
        if (doPat) {
            sendPatMessage(sessionId, false);
        } else {
            let doQuote = Math.random() * 100 < (appData.chatSettings.replyWithQuoteProb || 40);
            let replyText = getRandomAutoReplyForFriend(friendId);
            let replyTo = null;
            if (doQuote) {
                let quoteMsg = getRandomHistoricalMessageForQuote(sessionId);
                if (quoteMsg) {
                    replyTo = quoteMsg;
                }
            }
            sendMessage(sessionId, replyText, false, null, false, false, null, replyTo);
        }
        
        if (remainingCount - 1 > 0) {
            scheduleConsecutiveReplies(sessionId, friendId, remainingCount - 1);
        }
    }, consecutiveDelay);
    
    if (!consecutiveReplyQueues[sessionId]) {
        consecutiveReplyQueues[sessionId] = {};
    }
    consecutiveReplyQueues[sessionId].timer = timer;
}

// ==================== 群聊连续回复调度（间隔5-60秒） ====================
function scheduleGroupConsecutiveReplies(sessionId, members, index, isFirstRound) {
    if (index >= members.length) {
        if (isFirstRound) {
            let nextRoundDelay = Math.floor(Math.random() * 30000) + 10000;
            setTimeout(() => {
                let session = appData.sessions.find(s => s.sessionId === sessionId);
                if (session && currentOpenSessionId === sessionId) {
                    if (replyTimers[sessionId]) {
                        clearTimeout(replyTimers[sessionId]);
                        delete replyTimers[sessionId];
                    }
                    startReplyWithTyping(sessionId);
                }
            }, nextRoundDelay);
        }
        return;
    }
    
    let member = members[index];
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (session && session.type === "group") {
        let group = appData.groups.find(g => g.id === session.targetId);
        if (group && !group.members.includes(member.id)) {
            scheduleGroupConsecutiveReplies(sessionId, members, index + 1, isFirstRound);
            return;
        }
    }
    
    let memberInfo = {
        id: member.id,
        name: member.name || "成员",
        avatar: member.avatar || "👤"
    };
    
    let consecutiveDelay = Math.floor(Math.random() * (appData.chatSettings.consecutiveReplyMax - appData.chatSettings.consecutiveReplyMin + 1) + appData.chatSettings.consecutiveReplyMin);
    
    let memberPatProb = (appData.friendChatSettings[member.id]?.patProbability) || appData.chatSettings.patProbability || 30;
    let memberDoPat = Math.random() * 100 < memberPatProb;
    
    let timer = setTimeout(() => {
        if (memberDoPat) {
            sendPatMessageWithSender(sessionId, false, memberInfo);
        } else {
            let doQuote = Math.random() * 100 < (appData.chatSettings.replyWithQuoteProb || 40);
            let replyText = getRandomAutoReplyForFriend(member.id);
            let replyTo = null;
            if (doQuote) {
                let quoteMsg = getRandomHistoricalMessageForQuote(sessionId);
                if (quoteMsg) {
                    replyTo = quoteMsg;
                }
            }
            sendMessage(sessionId, replyText, false, {
                id: memberInfo.id,
                name: memberInfo.name,
                avatar: memberInfo.avatar
            }, false, false, null, replyTo);
        }
        
        scheduleGroupConsecutiveReplies(sessionId, members, index + 1, isFirstRound);
    }, consecutiveDelay);
    
    if (!consecutiveReplyQueues[sessionId]) {
        consecutiveReplyQueues[sessionId] = {};
    }
    consecutiveReplyQueues[sessionId].timer = timer;
}

// ==================== 空闲计时器 ====================
function startIdleTimer(sessionId) {
    if (idleTimers[sessionId]) {
        clearTimeout(idleTimers[sessionId]);
    }
    idleTimers[sessionId] = setTimeout(() => {
        if (currentOpenSessionId === sessionId && !replyTimers[sessionId] && !isTypingShowing[sessionId]) {
            if (Math.random() < 0.3) {
                showTypingStatus(sessionId, true);
                let tempTimer = setTimeout(() => {
                    showTypingStatus(sessionId, false);
                    let session = appData.sessions.find(s => s.sessionId === sessionId);
                    
                    if (session && session.type === "group") {
                        startReplyWithTyping(sessionId);
                    } else if (session && session.type === "friend") {
                        let friendId = session.targetId;
                        let doQuote = Math.random() * 100 < (appData.chatSettings.replyWithQuoteProb || 40);
                        let replyText = getRandomAutoReplyForFriend(friendId);
                        let replyTo = null;
                        if (doQuote) {
                            let quoteMsg = getRandomHistoricalMessageForQuote(sessionId);
                            if (quoteMsg) {
                                replyTo = quoteMsg;
                            }
                        }
                        sendMessage(sessionId, replyText, false, null, false, false, null, replyTo);
                        startIdleTimer(sessionId);
                    } else {
                        startIdleTimer(sessionId);
                    }
                }, 2000 + Math.random() * 3000);
                if (!replyTimers[sessionId]) {
                    replyTimers[sessionId] = tempTimer;
                } else {
                    clearTimeout(tempTimer);
                }
            } else {
                startIdleTimer(sessionId);
            }
        }
    }, 180000);
}

// ==================== 视频通话（完整版：时长+状态+悬浮球） ====================
function makeVideoCall(sessionId, friendId) {
    if (activeVideoCallContainer) {
        alert("已有进行中的通话");
        return;
    }
    let friend = appData.friends.find(f => f.id === friendId);
    if (!friend) return;
    
    // 获取情侣空间昵称
    let space = getCoupleSpace(friendId);
    let displayName = space.enabled && space.nickname ? space.nickname : friend.name;
    
    let callStartTime = Date.now();
    let durationInterval = null;
    let callDurationSeconds = 0;
    let isCallConnected = false;
    let isCallEnded = false;
    
    function formatDuration(seconds) {
        let h = Math.floor(seconds / 3600);
        let m = Math.floor((seconds % 3600) / 60);
        let s = seconds % 60;
        if (h > 0) {
            return String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
        }
        return String(m).padStart(2, '0') + ":" + String(s).padStart(2, '0');
    }
    
    function endCall(container, reason, isConnected) {
        if (isCallEnded) return;
        isCallEnded = true;
        
        if (durationInterval) {
            clearInterval(durationInterval);
            durationInterval = null;
        }
        if (container && container.parentElement) {
            container.remove();
        }
        activeVideoCallContainer = null;
        
        // 根据原因发送不同消息（不加任何 emoji 标识）
        if (reason === 'connected' && isConnected) {
            let durationText = formatDuration(callDurationSeconds);
            sendMessage(sessionId, `与 ${displayName} 通话 ${durationText}`, true, null, false);
        } else if (reason === 'noanswer') {
            sendMessage(sessionId, `${displayName} 无应答`, true, null, false);
        } else if (reason === 'rejected') {
            sendMessage(sessionId, `${displayName} 拒绝通话`, true, null, false);
        } else if (reason === 'self_hangup') {
            if (callDurationSeconds > 2) {
                let durationText = formatDuration(callDurationSeconds);
                sendMessage(sessionId, `与 ${displayName} 通话 ${durationText}`, true, null, false);
            } else {
                sendMessage(sessionId, `已拒绝 ${displayName} 的通话`, true, null, false);
            }
        } else if (reason === 'self_cancel') {
            sendMessage(sessionId, `已取消通话`, true, null, false);
        }
    }
    
    function createVideoContainer(isIncoming) {
        let container = document.createElement("div");

                }
            }, 15000);
            container._connectTimeout = connectTimeout;
            
            // 更新呼叫等待文字
            let statusDiv = container.querySelector("#callDuration");
            if (statusDiv) {
                let dots = 0;
                let dotInterval = setInterval(() => {
                    if (isCallConnected || isCallEnded) { clearInterval(dotInterval); return; }
                    dots = (dots + 1) % 4;
                    statusDiv.innerText = '呼叫中' + '.'.repeat(dots);
                }, 500);
                container._dotInterval = dotInterval;
            }
        }
        return container;
    }
    
    // 创建悬浮球
    function createFloatingBall(container) {
        // 停止计时
        if (durationInterval) {
            clearInterval(durationInterval);
            durationInterval = null;
        }
        
        let ball = document.createElement("div");
        ball.className = "video-call-floating-ball";
        ball.style.cssText = `
            position: fixed;
            bottom: 100px;
            right: 16px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(0,0,0,0.88);
            z-index: 1060;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #07c160;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
            touch-action: none;
            user-select: none;
            transition: transform 0.2s;
        `;
        
        let avatarHtml = "";
        if (friend.avatar && friend.avatar.startsWith("data:image")) {
            avatarHtml = `<img src="${friend.avatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`;
        } else {
            avatarHtml = `<span style="font-size:22px;">${friend.avatar || '👤'}</span>`;
        }
        
        ball.innerHTML = `
            <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,0.05);">${avatarHtml}</div>
            <div style="font-size:7px;color:#07c160;margin-top:1px;font-weight:500;">● 通话</div>
        `;
        
        // 移除原容器
        if (container && container.parentElement) {
            container.remove();
        }
        activeVideoCallContainer = ball;
        document.body.appendChild(ball);
        
        // 点击恢复
        ball.onclick = function(e) {
            e.stopPropagation();
            restoreFromFloatingBall(ball);
        };
        
        // 拖拽
        let isDragging = false;
        let startX, startY, ballX, ballY;
        
        ball.addEventListener('touchstart', function(e) {
            let touch = e.touches[0];
            startX = touch.clientX;
            startY = touch.clientY;
            let rect = ball.getBoundingClientRect();
            ballX = rect.left;
            ballY = rect.top;
            isDragging = true;
        }, { passive: true });
        
        ball.addEventListener('touchmove', function(e) {
            if (!isDragging) return;
            e.preventDefault();
            let touch = e.touches[0];
            let dx = touch.clientX - startX;
            let dy = touch.clientY - startY;
            let newX = ballX + dx;
            let newY = ballY + dy;
            let maxX = window.innerWidth - 70;
            let maxY = window.innerHeight - 120;
            newX = Math.max(8, Math.min(maxX, newX));
            newY = Math.max(8, Math.min(maxY, newY));
            ball.style.left = newX + 'px';
            ball.style.top = newY + 'px';
            ball.style.right = 'auto';
            ball.style.bottom = 'auto';
        }, { passive: false });
        
        ball.addEventListener('touchend', function(e) {
            if (isDragging) {
                let rect = ball.getBoundingClientRect();
                let centerX = rect.left + rect.width / 2;
                if (centerX < window.innerWidth / 2) {
                    ball.style.left = '8px';
                } else {
                    ball.style.left = (window.innerWidth - 70) + 'px';
                }
                ball.style.top = rect.top + 'px';
                ball.style.right = 'auto';
                ball.style.bottom = 'auto';
                isDragging = false;
            }
        }, { passive: true });
        
        // 鼠标拖拽（PC）
        let isMouseDragging = false;
        let mouseStartX, mouseStartY, mouseBallX, mouseBallY;
        
        ball.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;
            mouseStartX = e.clientX;
            mouseStartY = e.clientY;
            let rect = ball.getBoundingClientRect();
            mouseBallX = rect.left;
            mouseBallY = rect.top;
            isMouseDragging = true;
            ball.style.cursor = 'grabbing';
            e.preventDefault();
        });
        
        document.addEventListener('mousemove', function(e) {
            if (!isMouseDragging) return;
            let dx = e.clientX - mouseStartX;
            let dy = e.clientY - mouseStartY;
            let newX = mouseBallX + dx;
            let newY = mouseBallY + dy;
            let maxX = window.innerWidth - 70;
            let maxY = window.innerHeight - 120;
            newX = Math.max(8, Math.min(maxX, newX));
            newY = Math.max(8, Math.min(maxY, newY));
            ball.style.left = newX + 'px';
            ball.style.top = newY + 'px';
            ball.style.right = 'auto';
            ball.style.bottom = 'auto';
        });
        
        document.addEventListener('mouseup', function(e) {
            if (isMouseDragging) {
                let rect = ball.getBoundingClientRect();
                let centerX = rect.left + rect.width / 2;
                if (centerX < window.innerWidth / 2) {
                    ball.style.left = '8px';
                } else {
                    ball.style.left = (window.innerWidth - 70) + 'px';
                }
                ball.style.top = rect.top + 'px';
                ball.style.right = 'auto';
                ball.style.bottom = 'auto';
                isMouseDragging = false;
                ball.style.cursor = 'pointer';
            }
        });
    }
    
    function restoreFromFloatingBall(ball) {
        if (!ball || !ball.parentElement) return;
        ball.remove();
        activeVideoCallContainer = null;
        
        // 重新创建通话窗口
        let newContainer = createVideoContainer(false);
        // 更新状态为已接通
        isCallConnected = true;
        let statusDiv = newContainer.querySelector("#callDuration");
        if (statusDiv) {
            statusDiv.innerText = '00:00';
        }
        if (newContainer._connectTimeout) {
            clearTimeout(newContainer._connectTimeout);
        }
        if (newContainer._dotInterval) {
            clearInterval(newContainer._dotInterval);
        }
        
        // 重新绑定事件
        let hangupBtn = newContainer.querySelector("#hangupCallBtn");
        if (hangupBtn) {
            hangupBtn.onclick = function() {
                endCall(newContainer, 'self_hangup', true);
            };
        }
        let minimizeBtn = newContainer.querySelector("#minimizeCallBtn");
        if (minimizeBtn) {
            minimizeBtn.onclick = function() {
                createFloatingBall(newContainer);
            };
        }
        
        // 恢复计时
        callDurationSeconds = Math.floor((Date.now() - callStartTime) / 1000);
        durationInterval = setInterval(() => {
            if (!activeVideoCallContainer) {
                if (durationInterval) clearInterval(durationInterval);
                return;
            }
            callDurationSeconds = Math.floor((Date.now() - callStartTime) / 1000);
            let durationDiv = newContainer.querySelector("#callDuration");
            if (durationDiv) {
                durationDiv.innerText = formatDuration(callDurationSeconds);
            }
        }, 1000);
    }
    
    // ---- 主流程 ----
    let result = Math.random();
    let container = createVideoContainer(false);
    
    // 接通逻辑
    setTimeout(() => {
        if (isCallEnded) return;
        if (result < 0.5) {
            // 接通
            isCallConnected = true;
            if (container._connectTimeout) {
                clearTimeout(container._connectTimeout);
            }
            if (container._dotInterval) {
                clearInterval(container._dotInterval);
            }
            let statusDiv = container.querySelector("#callDuration");
            if (statusDiv) {
                statusDiv.innerText = '00:00';
            }
            
            // 重新绑定按钮（因为可能被覆盖）
            let hangupBtn = container.querySelector("#hangupCallBtn");
            if (hangupBtn) {
                hangupBtn.onclick = function() {
                    endCall(container, 'self_hangup', true);
                };
            }
            let minimizeBtn = container.querySelector("#minimizeCallBtn");
            if (minimizeBtn) {
                minimizeBtn.onclick = function() {
                    createFloatingBall(container);
                };
            }
            
            // 启动计时
            callDurationSeconds = 0;
            durationInterval = setInterval(() => {
                if (!activeVideoCallContainer) {
                    if (durationInterval) clearInterval(durationInterval);
                    return;
                }
                callDurationSeconds = Math.floor((Date.now() - callStartTime) / 1000);
                let durationDiv = container.querySelector("#callDuration");
                if (durationDiv) {
                    durationDiv.innerText = formatDuration(callDurationSeconds);
                }
            }, 1000);
            
            sendMessage(sessionId, `${displayName} 接听了视频通话`, true, null, false);
            alert("通话已接通");
            
        } else if (result < 0.8) {
            // 拒绝
            if (!isCallEnded) {
                endCall(container, 'rejected', false);
                alert(`${displayName} 拒绝通话`);
            }
        }
        // 否则无应答（已由 connectTimeout 处理）
    }, 2000);
    
    // 挂断按钮（初始状态 - 取消拨出）
    let hangupBtn = container.querySelector("#hangupCallBtn");
    if (hangupBtn) {
        hangupBtn.onclick = function() {
            if (!isCallConnected) {
                endCall(container, 'self_cancel', false);
            } else {
                endCall(container, 'self_hangup', true);
            }
        };
    }
}

function incomingVideoCall(sessionId, friendId) {

    if (!friend) return;
    let container = document.createElement("div");
    container.className = "video-call-container";

}

function maybeIncomingVideoCall(sessionId, friendId) {
    let prob = appData.chatSettings.videoCallProb || 2;
    if (Math.random() * 100 < prob) {
        setTimeout(() => {
            if (currentOpenSessionId === sessionId && !activeVideoCallContainer) {
                incomingVideoCall(sessionId, friendId);
            }
        }, 5000 + Math.random() * 10000);
    }
