// ==================== 发送图片 ====================
function sendImageFromCamera(sessionId) {
    let input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.onchange = async (e) => {
        let file = e.target.files[0];
        if (file) {
            try {
                let compressedDataUrl = await compressImage(file, 80, 0.5);
                let replyTo = null;
                if (currentReplyingTo) {
                    replyTo = {
                        msgId: currentReplyingTo.msgId,
                        senderName: currentReplyingTo.senderName,
                        contentPreview: currentReplyingTo.contentPreview,
                        isImage: currentReplyingTo.isImage,
                        imageSrc: currentReplyingTo.imageSrc
                    };
                }
                sendMessage(sessionId, compressedDataUrl, true, null, false, false, null, replyTo);
                if (currentReplyingTo) {
                    currentReplyingTo = null;
                    let replyBar = document.querySelector(".reply-bar");
                    if (replyBar) {
                        replyBar.remove();
                    }
                }
            } catch (err) {
                console.error("图片压缩失败", err);
                let reader = new FileReader();
                reader.onload = (ev) => {
                    let replyTo = null;
                    if (currentReplyingTo) {
                        replyTo = {
                            msgId: currentReplyingTo.msgId,
                            senderName: currentReplyingTo.senderName,
                            contentPreview: currentReplyingTo.contentPreview,
                            isImage: currentReplyingTo.isImage,
                            imageSrc: currentReplyingTo.imageSrc
                        };
                    }
                    sendMessage(sessionId, ev.target.result, true, null, false, false, null, replyTo);
                    if (currentReplyingTo) {
                        currentReplyingTo = null;
                        let replyBar = document.querySelector(".reply-bar");
                        if (replyBar) {
                            replyBar.remove();
                        }
                    }
                };
                reader.readAsDataURL(file);
            }
        }
    };
    input.click();
}

function createVote(sessionId, sessionType, targetId) {
    let modal = showModal(`
        <div style="margin-bottom:10px;"><strong>创建投票</strong></div>
        <div style="margin-bottom:10px;">
            <input type="text" id="voteTitle" placeholder="投票标题" style="width:100%; padding:6px; border-radius:8px; border:0.5px solid #ddd; font-size:13px;">
        </div>
        <div id="voteOptionsList">
            <div class="vote-option-row">
                <input type="text" class="vote-option-input" placeholder="选项1" style="flex:1; padding:6px; font-size:13px;">
                <button class="remove-option-btn" style="background:#ff3b30; padding:4px 8px; font-size:11px;">删除</button>
            </div>
            <div class="vote-option-row">
                <input type="text" class="vote-option-input" placeholder="选项2" style="flex:1; padding:6px; font-size:13px;">
                <button class="remove-option-btn" style="background:#ff3b30; padding:4px 8px; font-size:11px;">删除</button>
            </div>
        </div>
        <button id="addVoteOptionBtn" style="margin:6px 0; background:#888; padding:4px 10px; font-size:12px;">添加选项</button>
        <div class="vote-type-select">
            <label><input type="radio" name="voteType" value="single" checked> 一人只能投一次</label>
            <label style="margin-left:12px;"><input type="radio" name="voteType" value="multiple"> 一人能投多个选项</label>
        </div>
        <button id="sendVoteBtn" style="margin-top:10px; padding:6px 12px;">发送投票</button>
    `);
    
    function updateRemoveButtons() {
        let rows = modal.querySelectorAll(".vote-option-row");
        for (let row of rows) {
            let removeBtn = row.querySelector(".remove-option-btn");
            if (rows.length <= 2) {
                removeBtn.style.display = "none";
            } else {
                removeBtn.style.display = "block";
            }
        }
    }
    
    let addBtn = modal.querySelector("#addVoteOptionBtn");
    let optionsContainer = modal.querySelector("#voteOptionsList");
    if (addBtn) {
        addBtn.onclick = () => {
            let newRow = document.createElement("div");
            newRow.className = "vote-option-row";
            newRow.innerHTML = `
                <input type="text" class="vote-option-input" placeholder="新选项" style="flex:1; padding:6px; font-size:13px;">
                <button class="remove-option-btn" style="background:#ff3b30; padding:4px 8px; font-size:11px;">删除</button>
            `;
            optionsContainer.appendChild(newRow);
            let removeBtn = newRow.querySelector(".remove-option-btn");
            if (removeBtn) {
                removeBtn.onclick = () => {
                    newRow.remove();
                    updateRemoveButtons();
                };
            }
            updateRemoveButtons();
        };
    }
    
    updateRemoveButtons();
    let removeBtns = modal.querySelectorAll(".remove-option-btn");
    for (let btn of removeBtns) {
        btn.onclick = () => {
            let row = btn.closest(".vote-option-row");
            let rows = modal.querySelectorAll(".vote-option-row");
            if (row && rows.length > 2) {
                row.remove();
                updateRemoveButtons();
            } else {
                alert("至少需要2个选项");
            }
        };
    }
    
    let sendVoteBtn = modal.querySelector("#sendVoteBtn");
    if (sendVoteBtn) {
        sendVoteBtn.onclick = () => {
            let title = modal.querySelector("#voteTitle").value.trim();
            if (!title) {
                alert("请输入投票标题");
                return;
            }
            let optionInputs = modal.querySelectorAll(".vote-option-input");
            let options = [];
            for (let input of optionInputs) {
                let val = input.value.trim();
                if (val) {
                    options.push(val);
                }
            }
            if (options.length < 2) {
                alert("至少需要2个有效选项");
                return;
            }
            let voteType = modal.querySelector("input[name='voteType']:checked").value;
            
            let voteId = Date.now().toString();
            let endTime = Date.now() + 30 * 60 * 1000;
            let voteData = {
                id: voteId,
                title: title,
                options: options,
                type: voteType,
                endTime: endTime,
                votes: new Array(options.length).fill(0),
                voters: {},
                ended: false,
                intervalId: null
            };
            appData.votes[voteId] = voteData;
            saveData();
            
            sendMessage(sessionId, "", true, null, false, true, voteData);
            modal.remove();
            
            startVoteTimer(voteId, 30 * 60 * 1000);
            startVoteAiLoop(voteId);
        };
    }
}

function showGlobalThemeModal() {

    };
    
    function parseRGBA(colorStr) {
        let rgba = { r: 255, g: 255, b: 255, a: 1 };
        if (!colorStr) return rgba;
        let match = colorStr.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)/);
        if (match) {
            rgba.r = parseInt(match[1]);
            rgba.g = parseInt(match[2]);
            rgba.b = parseInt(match[3]);
            rgba.a = match[4] ? parseFloat(match[4]) : 1;
        } else if (colorStr.startsWith('#')) {
            let hex = colorStr.slice(1);
            if (hex.length === 3) {
                hex = hex.split('').map(c => c + c).join('');
            }
            rgba.r = parseInt(hex.slice(0, 2), 16);
            rgba.g = parseInt(hex.slice(2, 4), 16);
            rgba.b = parseInt(hex.slice(4, 6), 16);
        }
        return rgba;
    }

                        <select id="fontFamilySelect" style="width:100%; margin-top:4px; padding:6px; border-radius:6px; border:0.5px solid #ddd;">
                            <option value="system-ui" ${currentTheme.fontFamily === 'system-ui' ? 'selected' : ''}>系统默认</option>
                            <option value="'PingFang SC'" ${currentTheme.fontFamily === "'PingFang SC'" ? 'selected' : ''}>圆体/雅黑</option>
                            <option value="'Noto Serif SC'" ${currentTheme.fontFamily === "'Noto Serif SC'" ? 'selected' : ''}>宋体/衬线</option>

                        </select>
                    </div>
                    <div style="padding:12px; background:#f5f5f7; border-radius:8px; margin-top:6px; text-align:center; font-size:${currentTheme.fontSize || 14}px; font-family:${currentTheme.fontFamily || 'system-ui'}">

                    </div>
                </div>

            <button id="saveFontBtn" style="width:100%; margin-top:8px;">保存</button>

        let closeBtn2 = modal2.querySelector("#closeFont");
        if (closeBtn2) {
            closeBtn2.onclick = () => {
                modal2.remove();
            };
        }
        
        // ← 返回 → 回到全局装扮
        let backBtn2 = modal2.querySelector("#backToThemeFromFont");
        if (backBtn2) {
            backBtn2.onclick = () => {
                modal2.remove();
                showGlobalThemeModal();
            };
        }

        let fontPanel = modal2.querySelector('#fontCustomPanel');
        let fontSizeRange = modal2.querySelector('#fontSizeRange');
        let fontSizeValue = modal2.querySelector('#fontSizeValue');
        let fontFamilySelect = modal2.querySelector('#fontFamilySelect');
        let fontPreview = modal2.querySelector('#fontCustomPanel > div:last-child');
        let saveBtn = modal2.querySelector('#saveFontBtn');
        
        if (followSwitch) {
            followSwitch.onclick = () => {
                let isFollow = !currentTheme.followSystemFont;
                currentTheme.followSystemFont = isFollow;
                followSwitch.classList.toggle('active');
                if (fontPanel) {
                    fontPanel.style.display = isFollow ? 'none' : 'block';
                }
            };
        }
        
        if (fontSizeRange && fontSizeValue) {
            fontSizeRange.oninput = () => {
                fontSizeValue.innerText = fontSizeRange.value;
                if (fontPreview) {
                    fontPreview.style.fontSize = fontSizeRange.value + 'px';
                }
            };
        }
        
        if (fontFamilySelect && fontPreview) {
            fontFamilySelect.onchange = () => {
                if (fontPreview) {
                    fontPreview.style.fontFamily = fontFamilySelect.value;
                }
            };
        }
        
        if (saveBtn) {
            saveBtn.onclick = () => {
                currentTheme.followSystemFont = followSwitch.classList.contains('active');
                if (!currentTheme.followSystemFont) {
                    currentTheme.fontSize = parseInt(fontSizeRange.value);
                    currentTheme.fontFamily = fontFamilySelect.value;

                saveData();
                applyGlobalTheme();
                modal2.remove();
                showGlobalThemeModal();

    // ===== 保存全局装扮 =====

    if (saveBtn) {

            saveData();

            alert("全局装扮已保存");

    let resetBtn = modal.querySelector("#resetGlobalThemeBtn");
    if (resetBtn) {

                bgOpacity: 100,
                fontFamily: "",
                fontSize: 14,
                followSystemFont: true,
                headerBgColor: "rgba(255,255,255,1)",
                tabbarBgColor: "rgba(255,255,255,1)"
            };
            saveData();
            applyGlobalTheme();
            modal.remove();
            alert("已重置为默认");
            showGlobalThemeModal();
        };
    }
}

// ==================== 会话装扮设置（头像框 + 气泡） ====================
function showSessionDressingModal(sessionId) {
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (!session) {
        alert('会话不存在');
        return;
    }
    
    let chatName = session.name;
    let currentTheme = appData.chatThemes[sessionId] || {
        bgColor: "#f5f5f7",
        bgImage: null,
        fontSettings: {
            followSystem: true,
            fontFamily: "",
            fontSize: 14
        }
    };
    
    // 获取当前会话的头像框设置
    let myFrame = getSessionAvatarFrame(sessionId, 'my');
    let otherFrame = getSessionAvatarFrame(sessionId, 'other');
    let myBubble = getSessionBubble(sessionId, 'my');
    let otherBubble = getSessionBubble(sessionId, 'other');
    
    let frames = getAvatarFrameList();
    let bubbles = getChatBubbleList();
    
    function getFrameName(id) {
        let f = frames.find(f => f.id === id);
        return f ? f.name : '默认';
    }
    function getBubbleName(id) {
        let b = bubbles.find(b => b.id === id);
        return b ? b.name : '默认';
    }
    
    // ===== 主菜单 =====
    let modal = showModal(`
        <div style="margin-bottom:12px;">
            <strong>🎨 装扮设置 - ${escapeHtml(chatName)}</strong>
            <div style="font-size:11px; color:#888; margin-top:4px;">点击下方选项进行设置</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:6px; margin:10px 0;">
            <div class="settings-item" data-action="myFrame" style="padding:12px 14px; border-radius:10px; background:#f5f5f7; justify-content:space-between; border-bottom:none; cursor:pointer;">
                <span>我的头像框</span>
                <span style="color:#07c160; font-size:13px;">${escapeHtml(getFrameName(myFrame))}</span>
            </div>
            <div class="settings-item" data-action="otherFrame" style="padding:12px 14px; border-radius:10px; background:#f5f5f7; justify-content:space-between; border-bottom:none; cursor:pointer;">
                <span>对方的头像框</span>
                <span style="color:#07c160; font-size:13px;">${escapeHtml(getFrameName(otherFrame))}</span>
            </div>
            <div class="settings-item" data-action="myBubble" style="padding:12px 14px; border-radius:10px; background:#f5f5f7; justify-content:space-between; border-bottom:none; cursor:pointer;">
                <span>我的气泡</span>
                <span style="color:#07c160; font-size:13px;">${escapeHtml(getBubbleName(myBubble))}</span>
            </div>
            <div class="settings-item" data-action="otherBubble" style="padding:12px 14px; border-radius:10px; background:#f5f5f7; justify-content:space-between; border-bottom:none; cursor:pointer;">
                <span>对方的气泡</span>
                <span style="color:#07c160; font-size:13px;">${escapeHtml(getBubbleName(otherBubble))}</span>
            </div>
            <div class="settings-item" data-action="chatBg" style="padding:12px 14px; border-radius:10px; background:#f5f5f7; justify-content:space-between; border-bottom:none; cursor:pointer;">
                <span>聊天背景</span>
                <span style="color:#07c160; font-size:13px;">${currentTheme.bgImage ? '已设置图片' : (currentTheme.bgColor !== '#f5f5f7' ? '已设置颜色' : '默认')}</span>
            </div>
        </div>
        
        <hr>
        <button id="saveDressingBtn" style="width:100%; margin-top:8px;">保存装扮</button>
        <button id="resetDressingBtn" style="width:100%; background:#888; margin-top:6px;">重置所有装扮</button>
    `);
    
    // ===== 点击选项弹出对应设置 =====
    modal.querySelectorAll("[data-action]").forEach(item => {
        item.onclick = () => {
            let action = item.dataset.action;
            modal.remove();
            
            if (action === 'myFrame') {
                showFrameSelector('my');
            } else if (action === 'otherFrame') {
                showFrameSelector('other');
            } else if (action === 'myBubble') {
                showBubbleSelector('my');
            } else if (action === 'otherBubble') {
                showBubbleSelector('other');
            } else if (action === 'chatBg') {
                showChatBgSelector();
            }
        };
    });
    
    // ===== 选择头像框 =====
    function showFrameSelector(role) {
        let frames = getAvatarFrameList();
        let currentId = role === 'my' ? getSessionAvatarFrame(sessionId, 'my') : getSessionAvatarFrame(sessionId, 'other');
        let roleLabel = role === 'my' ? '我的' : '对方的';
        
        let optionsHtml = frames.map(f => {
            let isSelected = (f.id === currentId);
            return `<div class="bottom-panel-option" data-value="${f.id}" style="${isSelected ? 'border:2px solid #07c160;' : ''}">${isSelected ? '✅ ' : ''}${escapeHtml(f.name)}</div>`;
        }).join('');
        
        let selectorModal = showModal(`
            <div style="margin-bottom:10px;"><strong>选择${roleLabel}头像框</strong></div>
            ${optionsHtml}
            <div class="bottom-panel-option" data-value="cancel" style="background:#888; color:white;">取消</div>
        `);
        
        selectorModal.querySelectorAll('.bottom-panel-option').forEach(opt => {
            opt.onclick = () => {
                let val = opt.dataset.value;
                if (val === 'cancel') { selectorModal.remove(); return; }
                setSessionAvatarFrame(sessionId, role, val);
                saveData();
                selectorModal.remove();
                showSessionDressingModal(sessionId);
            };
        });
    }
    
    // ===== 选择气泡 =====
    function showBubbleSelector(role) {
        let bubbles = getChatBubbleList();
        let currentId = role === 'my' ? getSessionBubble(sessionId, 'my') : getSessionBubble(sessionId, 'other');
        let roleLabel = role === 'my' ? '我的' : '对方的';
        
        let optionsHtml = bubbles.map(b => {
            let isSelected = (b.id === currentId);
            let previewCss = b.css || '';
            return `<div class="bottom-panel-option" data-value="${b.id}" style="${isSelected ? 'border:2px solid #07c160;' : ''}">
                <span>${isSelected ? '✅ ' : ''}${escapeHtml(b.name)}</span>
                <span style="background:#e5e5ea; padding:2px 10px; border-radius:10px; font-size:11px; margin-left:10px; ${previewCss}">预览</span>
            </div>`;
        }).join('');
        
        let selectorModal = showModal(`
            <div style="margin-bottom:10px;"><strong>选择${roleLabel}气泡</strong></div>
            ${optionsHtml}
            <div class="bottom-panel-option" data-value="cancel" style="background:#888; color:white;">取消</div>
        `);
        
        selectorModal.querySelectorAll('.bottom-panel-option').forEach(opt => {
            opt.onclick = () => {
                let val = opt.dataset.value;
                if (val === 'cancel') { selectorModal.remove(); return; }
                setSessionBubble(sessionId, role, val);
                saveData();
                selectorModal.remove();
                showSessionDressingModal(sessionId);
            };
        });
    }
    
    // ===== 设置聊天背景 =====
    function showChatBgSelector() {
        let modal2 = showModal(`
            <div style="margin-bottom:12px;"><strong>聊天背景</strong></div>
            <div style="margin:10px 0; display:flex; flex-direction:column; gap:10px;">
                <div>
                    <label style="font-size:13px; font-weight:500;">背景颜色</label>
                    <input type="color" id="chatBgColorInput" value="${currentTheme.bgColor}" style="width:100%; height:45px; border:none; cursor:pointer; margin-top:4px;">
                </div>
                <div>
                    <label style="font-size:13px; font-weight:500;">背景图片</label>

                    ${currentTheme.bgImage ? `<div style="margin-top:6px;"><img src="${currentTheme.bgImage}" style="max-width:100%; max-height:150px; border-radius:8px;"><button id="removeChatBgBtn" style="margin-top:4px; background:#ff3b30;">移除图片</button></div>` : ''}

                    <div class="switch ${currentTheme.fontSettings?.followSystem !== false ? 'active' : ''}" id="chatFollowGlobalSwitch2"></div>

                <div id="chatFontPanel2" style="${currentTheme.fontSettings?.followSystem === false ? '' : 'display:none;'}">
                    <div style="display:flex; align-items:center; gap:10px; padding:8px 12px; background:#f5f5f7; border-radius:8px;">

                    </div>
                    <div style="padding:8px 12px; background:#f5f5f7; border-radius:8px; margin-top:6px;">
                        <span>字体选择</span>
                        <select id="chatFontFamilySelect2" style="width:100%; margin-top:4px; padding:6px; border-radius:6px; border:0.5px solid #ddd;">
                            <option value="system-ui" ${currentTheme.fontSettings?.fontFamily === 'system-ui' ? 'selected' : ''}>系统默认</option>
                            <option value="'PingFang SC'" ${currentTheme.fontSettings?.fontFamily === "'PingFang SC'" ? 'selected' : ''}>圆体/雅黑</option>

                currentTheme.fontSettings.followSystem = !isFollow;
            };
        }

        let fontSizeRange2 = modal2.querySelector('#chatFontSizeRange2');
        let fontSizeVal2 = modal2.querySelector('#chatFontSizeVal2');

                fontSizeVal2.innerText = fontSizeRange2.value;
            };
        }

                showChatBgSelector();

    if (!friendId) {
        alert('仅支持单人聊天');
        return;
    }
    
    var questionnaires = appData.questionnaires || {};
    var currentTab = 'sent'; // 'sent' | 'received' | 'bank'

    function getFiltered() {
        var result = [];
        for (var qid in questionnaires) {
            var q = questionnaires[qid];
            if (q.sessionId !== sessionId) continue;
            if (currentTab === 'sent' && q.fromMe !== true) continue;
            if (currentTab === 'received' && q.fromMe !== false) continue;
            result.push({ id: qid, ...q });
        }
        result.sort(function(a, b) { return b.createdAt - a.createdAt; });
        return result;
    }

function showCreateQuestionnaireModal(sessionId) {
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (!session) return;
    let friendId = session.type === 'friend' ? session.targetId : null;
    if (!friendId) {
        alert('仅支持单人聊天');
        return;
    }
    
    let questions = [];
    let questionCounter = 0;
    
    function addQuestion() {
        questionCounter++;
        questions.push({
            id: 'q' + Date.now() + '_' + questionCounter,
            text: '',
            type: 'choice', // 'choice' | 'truefalse' | 'essay'
            options: ['', ''],
            multiple: false,
            jumpMap: {} // { optionIndex: targetQuestionId }
        });
        render();
    }
    
    function removeQuestion(index) {
        if (questions.length <= 1) {
            alert('至少保留一个问题');
            return;
        }
        questions.splice(index, 1);
        render();
    }
    
    function render() {
        let container = modal.querySelector('#questionBuilder');
        if (!container) return;
        
        let html = '';
        for (let i = 0; i < questions.length; i++) {
            let q = questions[i];
            let typeLabel = q.type === 'choice' ? '选择题' : (q.type === 'truefalse' ? '对错题' : '解答题');
            
            html += `
                <div style="background:#f8f8fa;border-radius:10px;padding:12px;margin-bottom:12px;border-left:3px solid #07c160;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                        <span style="font-weight:600;font-size:13px;">问题 ${i+1}</span>
                        <div style="display:flex;gap:4px;">
                            <button class="removeQBtn" data-idx="${i}" style="background:#ff3b30;padding:2px 8px;font-size:10px;border-radius:12px;">删除</button>

                    }
                }

function sendQuestionnaireAsFile(sessionId, questionnaire, isFromMe) {
    if (isFromMe === undefined) isFromMe = true;
    
    // ===== 关键修复：将 isFromMe 存入问卷数据 =====
    questionnaire.fromMe = isFromMe;
    questionnaire.direction = isFromMe ? 'sent' : 'received';
    
    // ===== 关键修复：使用 isFromMe 而不是写死 true =====
    sendMessage(sessionId, '', isFromMe, null, false, false, null, null, true, questionnaire.id);
    
    var session = appData.sessions.find(function(s) { return s.sessionId === sessionId; });
    if (session) {
        session.lastMsg = '📋 问卷：' + questionnaire.title;
        session.lastTime = new Date().toLocaleString();
        saveData();
        if (currentPage === "messages") {
            renderMessagesPage();
        }
    }
}

function startQuestionnaireAutoReply(questionnaireId) {
    // ⚠️ 此函数已废弃，改用 checkPendingQuestionnaires 检查机制

    let q = appData.questionnaires[questionnaireId];

function answerQuestionnaire(questionnaireId) {
    var q = appData.questionnaires[questionnaireId];
    if (!q) return;
    if (q.status === 'completed') return;
    
    var isMine = (q.fromMe === true);
    var isTheirs = (q.fromMe === false);
    
    if (q.status === 'pending') {
        q.status = 'answering';
        saveData();
        if (currentOpenChatWindow && currentOpenSessionId) {
            renderChatMessagesToWindow(currentOpenChatWindow, currentOpenSessionId);
        }
    }
    var questions = q.questions;
    var i = 0;
    var answeredCount = 0;
    function answerNextQuestion() {
        if (i >= questions.length) {
            q.status = 'completed';
            q.completedAt = Date.now();
            q.hasRedDot = true;
            saveData();
            if (currentOpenChatWindow && currentOpenSessionId) {
                renderChatMessagesToWindow(currentOpenChatWindow, currentOpenSessionId);
            }
            
            var friendName = '对方';
            var friend = appData.friends.find(function(f) { return f.id === q.friendId; });
            if (friend) friendName = friend.name;
            
            if (isMine) {
                if (!appData.friendQuestionnaireRedDot) appData.friendQuestionnaireRedDot = {};
                appData.friendQuestionnaireRedDot[q.friendId] = true;
                saveData();
                if (currentOpenChatWindow && currentOpenSessionId) {
                    renderChatBanner(currentOpenChatWindow, currentOpenSessionId);
                }
                showQuestionnaireCompletePopup(q.friendId, questionnaireId);
            } else {
                alert('📋 ' + friendName + ' 已完成问卷：' + q.title + '\n\n点击「➕ → 问卷系统 → 我给他的」查看详细回答');
            }
            return;
        }
        var qItem = questions[i];
        if (q.answers[qItem.id] !== undefined && q.answers[qItem.id] !== null) {
            i++;
            answerNextQuestion();
            return;
        }
        var answer = generateAnswerForQuestion(qItem, q.friendId);
        q.answers[qItem.id] = answer;
        answeredCount++;
        saveData();
        if (currentOpenChatWindow && currentOpenSessionId) {
            renderChatMessagesToWindow(currentOpenChatWindow, currentOpenSessionId);
        }
        var jumpTo = null;
        if (qItem.type !== 'essay' && qItem.jumpMap) {
            var answerIndex = Array.isArray(answer) ? answer[0] : answer;
            if (answerIndex !== undefined && qItem.jumpMap[answerIndex] !== undefined) {
                jumpTo = qItem.jumpMap[answerIndex];
            }
        }
        if (jumpTo !== null && jumpTo < questions.length && jumpTo > i) {
            i = jumpTo;
        } else {
            i++;
        }
        var delay = Math.floor(Math.random() * 12000) + 3000;
        setTimeout(answerNextQuestion, delay);
    }
    var startDelay = Math.floor(Math.random() * 4000) + 1000;
    setTimeout(answerNextQuestion, startDelay);
}

function checkPendingQuestionnaires() {
    var now = Date.now();
    var questionnaires = appData.questionnaires || {};
    var hasStarted = false;
    for (var qid in questionnaires) {
        var q = questionnaires[qid];
        if (!q) continue;
        if (q.status === 'completed') continue;
        if (!q.expectedReplyTimestamp) continue;
        if (q.fromMe !== true) continue;
        if (now >= q.expectedReplyTimestamp) {
            if (q.status === 'pending' || q.status === 'answering') {
                console.log('⏰ 触发自动作答：' + q.title);
                answerQuestionnaire(qid);
                hasStarted = true;
            }
        }
    }
    if (hasStarted && currentOpenChatWindow && currentOpenSessionId) {
        renderChatMessagesToWindow(currentOpenChatWindow, currentOpenSessionId);
    }
}

function generateAnswerForQuestion(qItem, friendId) {
    if (qItem.type === 'essay') {
        // 解答题：从词条库组合 3-10 条
        return getQuestionnaireAnswerForEssay(friendId);
    } else if (qItem.type === 'truefalse') {
        // 对错题：随机选 0 或 1
        return Math.random() < 0.5 ? 0 : 1;
    } else if (qItem.type === 'sort') {
        // 排序题：随机打乱选项索引顺序
        var sortOptions = qItem.options || [];
        var indices = sortOptions.map(function(_, idx) { return idx; });
        for (var i = indices.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var temp = indices[i];
            indices[i] = indices[j];
            indices[j] = temp;
        }
        return indices;
    } else {
        // 选择题
        let validOptions = [];
        for (let i = 0; i < qItem.options.length; i++) {
            if (qItem.options[i] && qItem.options[i].trim()) {
                validOptions.push(i);
            }
        }
        if (validOptions.length === 0) return 0;
        
        if (qItem.multiple) {
            // 多选：随机选 1 到 N 个
            let count = Math.floor(Math.random() * validOptions.length) + 1;
            let shuffled = [...validOptions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, count).sort((a, b) => a - b);
        } else {
            // 单选：随机选一个
            return validOptions[Math.floor(Math.random() * validOptions.length)];
        }
    }
}

function getQuestionnaireAnswerForEssay(friendId) {
    var allItems = [];
    // ===== 严格只取纯文本，排除所有图片（data:image） =====
    // 从以下分类中取：字卡、颜文字、emoji、天气、状态
    var includeCategories = ["wordCards", "kaomojis", "emoji", "weather", "status"];
    
    // 1. 从公共词条库收集
    for (var ci = 0; ci < includeCategories.length; ci++) {
        var cat = includeCategories[ci];
        var groups = appData.lexicon.public[cat] || {};
        for (var g in groups) {
            if (groups.hasOwnProperty(g)) {
                var items = groups[g] || [];
                for (var i = 0; i < items.length; i++) {
                    var item = items[i];
                    // 只取字符串，且不能以 data:image 开头（排除表情包/图片）
                    if (typeof item === 'string' && !item.startsWith('data:image')) {
                        allItems.push(item);
                    }
                }
            }
        }
    }
    
    // 2. 从该好友的私人词条库收集（仅该好友可用）
    if (friendId) {
        var priv = getPrivateLexicon(friendId);
        for (var ci = 0; ci < includeCategories.length; ci++) {
            var cat = includeCategories[ci];
            var groups = priv[cat] || {};
            for (var g in groups) {
                if (groups.hasOwnProperty(g)) {
                    var items = groups[g] || [];
                    for (var i = 0; i < items.length; i++) {
                        var item = items[i];
                        // 只取字符串，且不能以 data:image 开头（排除表情包/图片）
                        if (typeof item === 'string' && !item.startsWith('data:image')) {
                            allItems.push(item);
                        }
                    }
                }
            }
        }
    }
    
    // 3. 如果词条库为空，返回默认提示
    if (allItems.length === 0) {
        return "（暂无词条，请在公共词条库或私人词条库中添加内容）";
    }
    
    // 4. 随机取 3-10 条
    var count = Math.floor(Math.random() * 8) + 3;  // 3-10
    count = Math.min(count, allItems.length);
    
    // 打乱顺序
    var shuffled = [...allItems];
    for (var i = shuffled.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
    }
    var selected = shuffled.slice(0, count);
    
    // 5. 用中文逗号连接返回
    return selected.join("，");
}

    // 检查问卷是否所有题目都已回答
    let q = appData.questionnaires[questionnaireId];
    if (!q) return false;
    if (q.status === 'completed') return true;
    
    let allAnswered = true;
    for (let qItem of q.questions) {
        let answer = q.answers[qItem.id];
        if (answer === undefined || answer === null || answer === '') {
            allAnswered = false;
            break;
        }
    }
    
    if (allAnswered) {
        q.status = 'completed';
        q.completedAt = Date.now();
        q.hasRedDot = true;
        saveData();
        
        // 刷新聊天中的显示
        if (currentOpenChatWindow && currentOpenSessionId) {
            renderChatMessagesToWindow(currentOpenChatWindow, currentOpenSessionId);
        }
        
        let friendName = '对方';
        let friend = appData.friends.find(f => f.id === q.friendId);
        if (friend) friendName = friend.name;
        alert(`📋 ${friendName} 已完成问卷：${q.title}`);
        return true;
    }
    return false;
}

function getTargetIdFromSessionId(sessionId) {
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (!session) return null;
    if (session.type === "friend") return session.targetId;
    if (session.type === "group") return session.targetId;
    return null;
}

function clearCurrentChatAllData(sessionId) {
    let targetId = getTargetIdFromSessionId(sessionId);
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (!session) return;
    
    if (appData.messages[sessionId]) {
        delete appData.messages[sessionId];
    }
    
    if (session.type === "friend" && targetId) {
        if (appData.friendDiaries[targetId]) delete appData.friendDiaries[targetId];
        if (appData.friendMoments[targetId]) delete appData.friendMoments[targetId];
        if (appData.letters[targetId]) delete appData.letters[targetId];
        if (appData.chatThemes[sessionId]) delete appData.chatThemes[sessionId];
        if (appData.friendDiaryRedDot[targetId]) delete appData.friendDiaryRedDot[targetId];
        if (appData.friendMomentRedDot[targetId]) delete appData.friendMomentRedDot[targetId];
        if (appData.friendLetterRedDot[targetId]) delete appData.friendLetterRedDot[targetId];
    }
    
    if (session.type === "group") {
        if (appData.chatThemes[sessionId]) delete appData.chatThemes[sessionId];
    }
    
    buildSessionsFromData();
    saveData();
    
    if (currentOpenSessionId === sessionId && currentOpenChatWindow) {
        currentOpenChatWindow.remove();
        currentOpenChatWindow = null;
        currentOpenSessionId = null;
        currentOpenFriendId = null;
    }
    
    alert("当前聊天数据已全部清除（聊天记录、日记、朋友圈、写信回信、装扮）");

}

// ==================== 单人存储操作执行器 ====================
function executeChatStorageAction(sessionId, targetId, action, modal) {
    var confirmMsg = '';
    var needConfirm = true;
    
    switch(action) {
        case 'deleteImages':
            confirmMsg = '确定要删除该会话中所有图片吗？文字消息将保留。';
            break;
        case 'deleteAll':
            confirmMsg = '确定要删除整个会话的所有消息吗？此操作不可撤销！';
            break;
        case 'diaryAll':
            confirmMsg = '确定要删除该好友的所有日记吗？此操作不可撤销！';
            break;
        case 'diary90':
            confirmMsg = '确定要删除该好友 90 天前的日记吗？';
            break;
        case 'diary30':
            confirmMsg = '确定要删除该好友 30 天前的日记吗？';
            break;
        case 'diary7':
            confirmMsg = '确定要删除该好友 7 天前的日记吗？';
            break;
        case 'momentImagesOnly':
            confirmMsg = '确定要删除该好友朋友圈中的所有图片吗？文字将保留。';
            break;
        case 'momentAll':
            confirmMsg = '确定要删除该好友的所有朋友圈吗？此操作不可撤销！';
            break;
        case 'letterMy':
            confirmMsg = '确定要删除你写给该好友的所有信吗？';
            break;
        case 'letterTheir':
            confirmMsg = '确定要删除该好友写给你的所有信吗？';
            break;
        case 'letterReply':
            confirmMsg = '确定要删除所有回信吗？（双方的回复）';
            break;
        case 'letterAll':
            confirmMsg = '确定要删除该好友的所有信件吗？此操作不可撤销！';
            break;
        case 'coupleAll':
            confirmMsg = '确定要删除该好友的所有情侣空间回忆吗？此操作不可撤销！';
            break;
        case 'couple90':
            confirmMsg = '确定要删除该好友 90 天前的情侣空间回忆吗？';
            break;
        case 'couple30':
            confirmMsg = '确定要删除该好友 30 天前的情侣空间回忆吗？';
            break;
        default:
            return;
    }
        
    // ===== 新增：删除前提醒备份 =====
    if (!confirm('⚠️ 建议先导出备份，防止误删重要数据！\n\n点击「确定」继续删除，点击「取消」先去备份')) {
        // 用户取消 → 导出备份
        exportAllData();
        return;
    }
    
    if (needConfirm && !confirm(confirmMsg)) return;
    
    // 执行操作
    var now = Date.now();
    var days90 = 90 * 24 * 60 * 60 * 1000;
    var days30 = 30 * 24 * 60 * 60 * 1000;
    var days7 = 7 * 24 * 60 * 60 * 1000;
    
    switch(action) {
        case 'deleteImages':
            if (appData.messages[sessionId]) {
                var msgs = appData.messages[sessionId];
                for (var i = msgs.length - 1; i >= 0; i--) {
                    if (msgs[i].text && msgs[i].text.startsWith('data:image')) {
                        msgs[i].text = '[图片已删除]';
                    }
                }
                appData.messages[sessionId] = msgs;
            }
            break;
            
        case 'deleteAll':
            delete appData.messages[sessionId];
            buildSessionsFromData();
            // 关闭聊天窗口
            if (currentOpenSessionId === sessionId && currentOpenChatWindow) {
                currentOpenChatWindow.remove();
                currentOpenChatWindow = null;
                currentOpenSessionId = null;
                currentOpenFriendId = null;
            }
            break;
            
        case 'diaryAll':
            if (targetId) appData.friendDiaries[targetId] = [];
            break;
            
        case 'diary90':
            if (targetId && appData.friendDiaries[targetId]) {
                appData.friendDiaries[targetId] = appData.friendDiaries[targetId].filter(function(d) {
                    var dTime = new Date(d.date).getTime();
                    return !isNaN(dTime) && dTime > now - days90;
                });
            }
            break;
            
        case 'diary30':
            if (targetId && appData.friendDiaries[targetId]) {
                appData.friendDiaries[targetId] = appData.friendDiaries[targetId].filter(function(d) {
                    var dTime = new Date(d.date).getTime();
                    return !isNaN(dTime) && dTime > now - days30;
                });
            }
            break;
            
        case 'diary7':
            if (targetId && appData.friendDiaries[targetId]) {
                appData.friendDiaries[targetId] = appData.friendDiaries[targetId].filter(function(d) {
                    var dTime = new Date(d.date).getTime();
                    return !isNaN(dTime) && dTime > now - days7;
                });
            }
            break;
            
        case 'momentImagesOnly':
            if (targetId && appData.friendMoments[targetId]) {
                var moments = appData.friendMoments[targetId];
                for (var i = 0; i < moments.length; i++) {
                    moments[i].images = [];
                }
                appData.friendMoments[targetId] = moments;
            }
            break;
            
        case 'momentAll':
            if (targetId) appData.friendMoments[targetId] = [];
            break;
            
        case 'letterMy':
            if (targetId && appData.letters[targetId]) {
                appData.letters[targetId] = appData.letters[targetId].filter(function(l) {
                    return l.direction !== 'my' && l.from !== 'self';
                });
            }
            break;
            
        case 'letterTheir':
            if (targetId && appData.letters[targetId]) {
                appData.letters[targetId] = appData.letters[targetId].filter(function(l) {
                    return l.direction !== 'their' && l.from !== 'other';
                });
            }
            break;
            
        case 'letterReply':
            if (targetId && appData.letters[targetId]) {
                appData.letters[targetId] = appData.letters[targetId].filter(function(l) {
                    return !l.reply;
                });
            }
            break;
            
        case 'letterAll':
            if (targetId) appData.letters[targetId] = [];
            break;
            
        case 'coupleAll':
            if (targetId && appData.coupleMemories) {
                appData.coupleMemories[targetId] = [];
            }
            break;
            
        case 'couple90':
            if (targetId && appData.coupleMemories && appData.coupleMemories[targetId]) {
                appData.coupleMemories[targetId] = appData.coupleMemories[targetId].filter(function(m) {
                    var mTime = new Date(m.time).getTime();
                    return !isNaN(mTime) && mTime > now - days90;
                });
            }
            break;
            
        case 'couple30':
            if (targetId && appData.coupleMemories && appData.coupleMemories[targetId]) {
                appData.coupleMemories[targetId] = appData.coupleMemories[targetId].filter(function(m) {
                    var mTime = new Date(m.time).getTime();
                    return !isNaN(mTime) && mTime > now - days30;
                });
            }
            break;
    }
    
    saveData();
    modal.remove();
    
    // 刷新聊天窗口
    if (currentOpenSessionId === sessionId && currentOpenChatWindow) {
        renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
    }
    
    // 刷新页面
    renderCurrentPage();
    alert('✅ 操作完成！');
}

        </div>
        
        <!-- 操作选项 -->

            <!-- 清除所有数据 -->

            </div>

        <button id="cancelGlobalStorageBtn" style="width:100%; margin-top:14px; background:#888; padding:12px; border-radius:20px; border:none; color:white; font-size:14px; cursor:pointer;">取消</button>
    `);
    
    // 异步获取存储大小并更新显示
    getDBSize().then(function(bytes) {
        var mb = (bytes / (1024 * 1024));
        var kb = Math.round(bytes / 1024);
        var display = modal.querySelector('#storageSizeDisplay2');
        if (display) {
            display.textContent = mb.toFixed(2) + ' MB / 100 MB（网页显示）';
        }
        var progress = modal.querySelector('#storageProgressBar2');
        if (progress) {
            var pct = Math.min((mb / 100) * 100, 100);
            progress.style.width = pct + '%';
        }
        var status = modal.querySelector('#storageStatus2');
        if (status) {
            status.textContent = mb > 85 ? '⚠️ 已超过85MB建议清理' : '✅ 空间充足';
        }
        var kbDisplay = modal.querySelector('#storageKb2');
        if (kbDisplay) {
            kbDisplay.textContent = kb;
        }
    }).catch(function() {
        var display = modal.querySelector('#storageSizeDisplay2');
        if (display) {
            display.textContent = '0.00 MB / 100 MB（网页显示）';
        }
    });
    
    // 清除所有数据
    var clearAllBtn = modal.querySelector("[data-action='clearAll']");
    if (clearAllBtn) {

    // 仅清除会话数据
    var clearSessionsBtn = modal.querySelector("[data-action='clearSessionsOnly']");
    if (clearSessionsBtn) {
        clearSessionsBtn.onclick = function() {

    if (cancelBtn) {

    }
}

// ==================== 聊天窗口渲染函数 ====================
// ==================== 虚拟滚动渲染函数 ====================
// ==================== 渲染聊天消息（增量更新） ====================
function renderChatMessagesToWindow(chatWin, sessionId) {
    var msgs = appData.messages[sessionId] || [];
    var session = appData.sessions.find(function(s) { return s.sessionId === sessionId; });
    if (!session) return;
    
    var container = chatWin.querySelector('.messages-container');
    if (!container) return;
    
    // 如果容器没有消息，或者消息数量变化，全量渲染
    var existingMsgs = container.querySelectorAll('.virtual-message-item');
    if (existingMsgs.length === 0 || existingMsgs.length !== msgs.length) {
    // 全量渲染（首次打开或消息数量变化）
    // 保存当前滚动位置
    var savedScrollTop = container.scrollTop;
    
    container.innerHTML = '';
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.padding = '12px';
    container.style.gap = '4px';
    container.style.overflowY = 'auto';
    
    var fragment = document.createDocumentFragment();
    for (var i = 0; i < msgs.length; i++) {
        var msgDiv = createMessageElement(msgs[i], session, sessionId, i);
        if (msgDiv) {
            fragment.appendChild(msgDiv);
        }
    }
    container.appendChild(fragment);
    
    // 恢复滚动位置
    container.scrollTop = savedScrollTop;
    
// 自己发送的消息强制滚动到底部；首次加载也滚动到底部
// 判断最后一条消息是否是自己发的
var lastMsg = msgs.length > 0 ? msgs[msgs.length - 1] : null;
var isLastMsgMine = lastMsg && lastMsg.from === 'self';
var isInitialLoad = container.scrollTop === 0 && msgs.length > 0;

if (isLastMsgMine || isInitialLoad) {
    container.scrollTop = container.scrollHeight;
} else {
    // 对方发消息：用户在底部才滚动
    var isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
    if (isAtBottom) {
        container.scrollTop = container.scrollHeight;
    }
}
} else {
    // 增量更新：只添加新消息
    // 保存当前滚动位置
    var savedScrollTop = container.scrollTop;
    
    var lastExistingMsg = container.querySelector('.virtual-message-item:last-child');
    var lastMsgId = lastExistingMsg ? lastExistingMsg.getAttribute('data-msg-id') : null;
    
    // 从最后一条消息开始，找出需要新增的消息
    var startIndex = 0;
    if (lastMsgId) {
        for (var i = 0; i < msgs.length; i++) {
            if (msgs[i].id === lastMsgId) {
                startIndex = i + 1;
                break;
            }
        }
    }
    
    // 添加新消息
    var fragment = document.createDocumentFragment();
    for (var i = startIndex; i < msgs.length; i++) {
        var msgDiv = createMessageElement(msgs[i], session, sessionId, i);
        if (msgDiv) {
            fragment.appendChild(msgDiv);
        }
    }
    container.appendChild(fragment);
    
    // 恢复滚动位置
    container.scrollTop = savedScrollTop;
    
    // 如果用户在底部，滚动到底部
    // 如果新增消息中存在自己发的，强制滚动到底部；否则判断用户是否在底部
var hasNewMine = false;
for (var i = 0; i < fragment.children.length; i++) {
    var child = fragment.children[i];
    if (child.getAttribute('data-msg-from') === 'self') {
        hasNewMine = true;
        break;
    }
}

if (hasNewMine) {
    container.scrollTop = container.scrollHeight;
} else {
    var isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
    if (isAtBottom && fragment.children.length > 0) {
        container.scrollTop = container.scrollHeight;
    }
}
}
    
    // ===== 恢复新消息气泡状态 =====
    if (newMsgBubbleState[sessionId] && newMsgBubbleState[sessionId].count > 0) {
        var isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
        if (isAtBottom) {
            clearNewMsgBubble(sessionId);
        } else {
            // 重新显示气泡（不增加计数）
            var count = newMsgBubbleState[sessionId].count;
            var oldBubble = container.querySelector('.new-msg-bubble');
            if (oldBubble) oldBubble.remove();
            
            var bubble = document.createElement('div');
            bubble.className = 'new-msg-bubble';
            bubble.textContent = count;
            bubble.style.cssText = `
                position: sticky;
                bottom: 12px;
                left: 12px;
                width: 20px;
                height: 20px;
                background: #007aff;
                color: #ffffff;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
                z-index: 10;
                flex-shrink: 0;
                user-select: none;
                transition: transform 0.15s ease;
            `;
            
            bubble.onclick = function() {
                container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                clearNewMsgBubble(sessionId);
            };
            
            container.appendChild(bubble);
        }
    }
}

function renderChatBanner(chatWin, sessionId) {
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    if (!session || session.type !== 'friend') {
        let banner = chatWin.querySelector('#chatBanner');
        if (banner) banner.style.display = 'none';
        return;
    }
    
    let friendId = session.targetId;
    let space = getCoupleSpace(friendId);
    let banner = chatWin.querySelector('#chatBanner');
    if (!banner) return;
    
    // 如果情侣空间未开启，隐藏横幅
    if (!space.enabled || !space.startDate) {
        banner.style.display = 'none';
        return;
    }
    
    let nickname = space.nickname || session.name;
    
    // 检查是否有生日红点
    let birthdayRedDot = appData.friendBirthdayRedDot && appData.friendBirthdayRedDot[friendId];
    // 检查是否有周年红点
    let anniversaryRedDot = appData.friendAnniversaryRedDot && appData.friendAnniversaryRedDot[friendId];
    
    // ===== 只有生日或纪念日才显示横幅 =====
    if (birthdayRedDot && space.hisBirthday) {
        let daysUntil = getDaysUntilDate(space.hisBirthday);
        let age = calculateAge(space.hisBirthday);
        let dayText = '';
        if (daysUntil === 0) {
            dayText = '今天';
        } else if (daysUntil === -1) {
            dayText = '明天';
        } else if (daysUntil === -2) {
            dayText = '后天';
        } else {
            dayText = `${Math.abs(daysUntil)}天后`;
        }
        let ageText = age !== null ? `${age}岁` : '';
        // 水墨晕染背景
        banner.style.background = '#f5f0eb';
        banner.style.boxShadow = 'inset 0 0 40px rgba(200,180,160,0.3)';
        banner.style.border = '0.5px solid rgba(180,160,140,0.2)';
        banner.textContent = `🎂 ${nickname} 的生日${dayText}${ageText ? '，' + ageText : ''} 💞`;
        banner.style.display = 'block';
        banner.style.fontSize = '11px';
        banner.style.padding = '2px 12px';
        banner.style.minHeight = '20px';
        banner.style.lineHeight = '20px';
        banner.style.color = '#5a4a3a';
        return;
    }
    
    if (anniversaryRedDot && space.startDate) {
        let start = new Date(space.startDate);
        let thisYear = new Date().getFullYear();
        let daysUntil = getDaysUntilDate(
            `${thisYear}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`
        );
        if (daysUntil < 0) {
            let nextYear = thisYear + 1;
            daysUntil = getDaysUntilDate(
                `${nextYear}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`
            );
        }
        let yearsTogether = new Date().getFullYear() - start.getFullYear();
        if (new Date() < new Date(space.startDate)) yearsTogether = 0;
        let yearText = yearsTogether + 1;
        let dayText = '';
        if (daysUntil === 0) {
            dayText = '今天';
        } else if (daysUntil === -1) {
            dayText = '明天';
        } else if (daysUntil === -2) {
            dayText = '后天';
        } else {
            dayText = `${Math.abs(daysUntil)}天后`;
        }
        // 水墨晕染背景
        banner.style.background = '#f5f0eb';
        banner.style.boxShadow = 'inset 0 0 40px rgba(200,180,160,0.3)';
        banner.style.border = '0.5px solid rgba(180,160,140,0.2)';
        banner.textContent = `💞 和 ${nickname} 在一起 ${yearText} 周年${dayText !== '今天' ? '还有 ' + dayText : ' 🎉'}`;
        banner.style.display = 'block';
        banner.style.fontSize = '11px';
        banner.style.padding = '2px 12px';
        banner.style.minHeight = '20px';
        banner.style.lineHeight = '20px';
        banner.style.color = '#5a4a3a';
        return;
    }
    
    // ===== 没有生日/纪念日提醒 → 隐藏横幅 =====
    banner.style.display = 'none';
}

// ==================== 创建单条消息元素 ====================
function createMessageElement(m, session, sessionId, index) {
    if (!m) return null;
    
    // ===== 修复：确保头像左右固定 =====
var isMine = m.from === 'self';

// 如果是群聊且不是自己发的，确保 senderInfo 正确
if (!isMine && session.type === 'group' && m.senderId) {
    var member = appData.friends.find(function(f) { return f.id === m.senderId; });
    if (member) {
        m.senderName = member.name;
        m.senderAvatar = member.avatar || '👤';
    }
}
    
    var isMine = m.from === 'self';
    var isPat = m.isPat === true;
    var isVote = m.isVote === true;
    var isQuestionnaire = m.isQuestionnaire === true;
    
    var senderName = '';
    var senderAvatar = '';
    
    if (isMine) {
        senderName = appData.user.name;
        senderAvatar = appData.user.avatar;
    } else {
        if (m.senderName) {
            senderName = m.senderName;
        } else if (m.senderId) {
            var member = appData.friends.find(function(f) { return f.id === m.senderId; });
            senderName = member ? member.name : session.name;
        } else {
            senderName = session.name;
        }
        
        if (m.senderAvatar) {
            senderAvatar = m.senderAvatar;
        } else if (m.senderId) {
            var member2 = appData.friends.find(function(f) { return f.id === m.senderId; });
            senderAvatar = member2 ? (member2.avatar || '👤') : session.avatar;
        } else {
            senderAvatar = session.avatar;
        }
    }
    
    var msgClass = 'message';
    if (isMine) {
        msgClass += ' message-mine';
    } else if (!isPat && !isQuestionnaire) {
        msgClass += ' message-other';
    }
    if (isPat) {
        msgClass += ' message-pat';
    }
    
    // 头像框
    var frameId = 'frame_default';
    if (isMine) {
        frameId = getSessionAvatarFrame(sessionId, 'my');
    } else {
        if (session.type === 'group' && m.senderId) {
            frameId = getGroupMemberAvatarFrame(session.targetId, m.senderId);
        } else if (session.type === 'friend') {
            frameId = getSessionAvatarFrame(sessionId, 'other');
        } else {
            frameId = getDefaultAvatarFrame();
        }
    }
    if (frameId && frameId !== 'frame_default') {
        var frames = getAvatarFrameList();
        var exists = frames.some(function(f) { return f.id === frameId; });
        if (!exists) frameId = getDefaultAvatarFrame();
    } else {
        frameId = getDefaultAvatarFrame();
    }
    var avatarHtml = renderAvatarWithFrame(senderAvatar, frameId, 32);
    
    // 内容
    var contentHtml = '';
    var isFileCard = false;
    
    if (isQuestionnaire && m.questionnaireId) {
    var q = appData.questionnaires[m.questionnaireId];
    if (q) {
        isFileCard = true;
        var statusText = q.status === 'completed' ? '✅ 已完成' : (q.status === 'answering' ? '⏳ 回答中...' : '📤 待回答');
        var hasRedDot = q.status === 'completed' && q.hasRedDot !== false;
        var redDotHtml = hasRedDot ? '<span style="display:inline-block;width:8px;height:8px;background:#ff3b30;border-radius:50%;margin-left:6px;"></span>' : '';
        
        // ===== 新增：预计时间显示 =====
        var timeHtml = '';
        if (q.fromMe === true && q.status !== 'completed' && q.expectedReplyTimestamp) {
            var now = Date.now();
            var remaining = q.expectedReplyTimestamp - now;
            if (remaining > 0) {
                var hours = Math.floor(remaining / (1000 * 60 * 60));
                var minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                var timeText = '';
                if (hours > 0) {
                    timeText = hours + '小时' + (minutes > 0 ? minutes + '分钟' : '');
                } else {
                    timeText = Math.max(1, minutes) + '分钟';
                }
                timeHtml = '<div style="font-size:10px;color:#ff9500;margin-top:2px;">⏳ 预计 ' + timeText + ' 后开始作答</div>';
            } else {
                timeHtml = '<div style="font-size:10px;color:#ff9500;margin-top:2px;">⏳ 正在作答...</div>';
            }
        }
        
        var viewBtnHtml = '<button class="viewQuestionnaireBtn" data-qid="' + m.questionnaireId + '" style="background:#07c160;padding:3px 10px;font-size:11px;border-radius:14px;margin-top:4px;">查看详情</button>';
        contentHtml = '<div class="bubble" style="background:#f0f4f8;padding:12px 16px;border-radius:12px;min-width:160px;cursor:pointer;" data-qid="' + m.questionnaireId + '">' +
            '<div style="font-size:16px;font-weight:600;">📄 ' + escapeHtml(q.title) + '</div>' +
            '<div style="font-size:12px;color:#666;margin-top:4px;">状态：' + statusText + ' ' + redDotHtml + '</div>' +
            timeHtml +
            '<div style="font-size:11px;color:#999;margin-top:2px;">' + (q.questions ? q.questions.length : 0) + ' 道题</div>' +
            viewBtnHtml +
            '</div>';
    } else {
        contentHtml = escapeHtml('[问卷已失效]');
    }
} else if (isVote && m.voteId) {
        contentHtml = renderVoteMessage(m.voteId, isMine, senderName);
    } else if (m.text && m.text.startsWith('data:image')) {
    contentHtml = '<img src="' + m.text + '" style="max-width:60px; max-height:60px; border-radius:8px; cursor:pointer;" onclick="showImageViewer(\'' + m.text.replace(/'/g, "\\'") + '\')">';
} else {
        contentHtml = escapeHtml(m.text || '');
    }
    
    var readMark = '';
    if (isMine && m.readByReceiver) {
        readMark = '<span class="read-status">已读</span>';
    }
    
    var replyPreviewHtml = '';
    if (m.replyTo) {
        replyPreviewHtml = renderQuotePreview(m.replyTo);
    }
    
    var escapedText = escapeHtml(m.text || '').replace(/"/g, '&quot;');
    var isImageAttr = (m.text && m.text.startsWith('data:image')) ? 'true' : 'false';
    
    // 气泡
    var bubbleId = 'bubble_default';
    if (isMine) {
        bubbleId = getSessionBubble(sessionId, 'my');
    } else {
        if (session.type === 'group' && m.senderId) {
            bubbleId = getGroupMemberBubble(session.targetId, m.senderId);
        } else if (session.type === 'friend') {
            bubbleId = getSessionBubble(sessionId, 'other');
        } else {
            bubbleId = getDefaultChatBubble();
        }
    }
    var bubbleCss = getBubbleCss(bubbleId);
    var bubbleStyle = bubbleCss ? 'style="' + bubbleCss.replace(/"/g, '&quot;') + '"' : '';
    var bubbleExtra = bubbleCss ? ' data-bubble-id="' + bubbleId + '"' : '';
    
    var bubbleHtml = '<div class="bubble" ' + bubbleStyle + bubbleExtra + ' data-msg-id="' + m.id + '" data-msg-from="' + m.from + '" data-msg-text="' + escapedText + '" data-msg-is-image="' + isImageAttr + '">' + contentHtml + '</div>';
    
    // 组装消息
    var wrapper = document.createElement('div');
    wrapper.className = 'virtual-message-item';
    wrapper.setAttribute('data-msg-id', m.id);
    wrapper.setAttribute('data-msg-from', m.from);
    
    // 如果是图片，添加懒加载属性
    if (m.text && m.text.startsWith('data:image')) {
        wrapper.setAttribute('data-is-image', 'true');
    }
    
    var nameHtml = isPat ? '' : escapeHtml(senderName);
    var timeHtml = appData.chatSettings.showTime ? '<div class="msg-time" style="white-space: nowrap; font-size: 10px; color: #8e8e93;">' + m.time + '</div>' : '';
    
    wrapper.innerHTML = 
        '<div class="' + msgClass + '" style="' + (isPat ? 'width:100%;justify-content:center;' : '') + '">' +
            (isPat ? '' : '<div class="msg-avatar">' + avatarHtml + '</div>') +
            '<div class="msg-content" style="' + (isMine ? '' : 'max-width:80%;') + (isPat ? 'text-align:center;' : '') + '">' +
                '<div class="msg-name">' + nameHtml + '</div>' +
                (replyPreviewHtml || '') +
                bubbleHtml +
                '<div style="display: flex; justify-content: flex-end; align-items: center; margin-top: 2px; gap: 6px;">' +
                    timeHtml +
                    readMark +
                '</div>' +
            '</div>' +
        '</div>';
    
    // 添加事件：长按菜单（图片和文字都支持）
var bubble = wrapper.querySelector('.bubble');
if (bubble) {
    var pressTimer = null;
    var isImage = bubble.getAttribute('data-msg-is-image') === 'true';
    
    bubble.addEventListener('touchstart', function(e) {
        pressTimer = setTimeout(function() {
            var msgId = bubble.getAttribute('data-msg-id');
            var msgFrom = bubble.getAttribute('data-msg-from');
            var msgText = bubble.getAttribute('data-msg-text');
            showMessageActionMenu(sessionId, msgId, msgFrom, msgText);
        }, 500);
    });
    bubble.addEventListener('touchend', function() { clearTimeout(pressTimer); });
    bubble.addEventListener('touchmove', function() { clearTimeout(pressTimer); });
    
    bubble.addEventListener('mousedown', function(e) {
        pressTimer = setTimeout(function() {
            var msgId = bubble.getAttribute('data-msg-id');
            var msgFrom = bubble.getAttribute('data-msg-from');
            var msgText = bubble.getAttribute('data-msg-text');
            showMessageActionMenu(sessionId, msgId, msgFrom, msgText);
        }, 500);
    });
    bubble.addEventListener('mouseup', function() { clearTimeout(pressTimer); });
    bubble.addEventListener('mouseleave', function() { clearTimeout(pressTimer); });
}
    
    // 头像点击
    var avatarEl = wrapper.querySelector('.msg-avatar');
    if (avatarEl && session.type === 'friend') {
        avatarEl.style.cursor = 'pointer';
        avatarEl.addEventListener('click', function(e) {
            e.stopPropagation();
            showFriendProfile(session.targetId);
        });
    }
    
// 问卷卡片点击
var card = wrapper.querySelector('.bubble[data-qid]');
if (card) {
    card.addEventListener('click', function(e) {
        var qid = card.getAttribute('data-qid');
        if (qid) {
            var q = appData.questionnaires[qid];
            if (q) {
                showQuestionnaireDetailModal(qid, q.fromMe);
            }
        }
    });
}
    
    // 问卷按钮点击
    var viewBtn = wrapper.querySelector('.viewQuestionnaireBtn');
    if (viewBtn) {
        viewBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            var qid = viewBtn.getAttribute('data-qid');
            if (qid) showQuestionnaireDetailModal(qid);
        });
    }
    
    // 回复预览点击跳转
    var replyPreview = wrapper.querySelector('.reply-preview');
    if (replyPreview) {
        replyPreview.addEventListener('click', function(e) {
            var targetMsgId = replyPreview.getAttribute('data-reply-msg-id');
            var container = chatWin.querySelector('.messages-container');
            var targetWrapper = container.querySelector('.virtual-message-item[data-msg-id="' + targetMsgId + '"]');
            if (targetWrapper) {
                targetWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetWrapper.classList.add('highlight-message');
                setTimeout(function() {
                    targetWrapper.classList.remove('highlight-message');
                }, 2000);
            } else {
                alert('原消息可能已被清除');
            }
        });
    }
    
    return wrapper;
}

function renderAllMessages(container, sessionId, msgs) {
    container.innerHTML = '';
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.padding = '12px';
    container.style.gap = '4px';

            fragment.appendChild(msgDiv);
        }
    }
    container.appendChild(fragment);

}

// ==================== 图片懒加载 ====================

function lazyLoadImage(imgId) {
    var img = document.getElementById(imgId);
    if (!img) return;
    var src = img.getAttribute('data-src');
    if (src && !img.src) {
        img.src = src;
        img.removeAttribute('data-src');
    }
}

// 为所有图片添加懒加载观察器
function setupLazyLoading(container) {
    if (!container) return;
    var images = container.querySelectorAll('img[data-src]');
    if (images.length === 0) return;
    
    if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function(entries) {
            for (var i = 0; i < entries.length; i++) {
                if (entries[i].isIntersecting) {
                    var img = entries[i].target;
                    var src = img.getAttribute('data-src');
                    if (src) {
                        img.src = src;
                        img.removeAttribute('data-src');
                    }
                    observer.unobserve(img);
                }
            }
        }, { rootMargin: '100px' });
        
        for (var i = 0; i < images.length; i++) {
            observer.observe(images[i]);
        }
        container._lazyObserver = observer;
    } else {
        // 降级方案：直接加载所有图片
        for (var i = 0; i < images.length; i++) {
            var img = images[i];
            var src = img.getAttribute('data-src');
            if (src) {
                img.src = src;
                img.removeAttribute('data-src');
            }
        }
    }
}

// 显示消息操作菜单（引用/删除）
function showMessageActionMenu(sessionId, msgId, msgFrom, msgText) {
    // 获取消息对象
    let msgs = appData.messages[sessionId] || [];
    let msg = msgs.find(m => m.id === msgId);
    if (!msg) return;
    
    let isMine = (msgFrom === "self");
    let isImage = msg.text && msg.text.startsWith("data:image");
    
    // 获取发送者名称
    let session = appData.sessions.find(s => s.sessionId === sessionId);
    let senderName = "";
    if (isMine) {
        senderName = appData.user.name;
    } else {
        senderName = msg.senderName || (session ? session.name : "对方");
    }
    
    let options = [
        { label: "💬 引用", value: "quote" }
    ];
    
    // 只有自己发的消息才能删除
    if (isMine) {
        options.push({ label: "🗑️ 删除", value: "delete" });
    }
    
    showBottomPanel("操作", options, (action) => {
        if (action === "quote") {
            // 引用消息
            let contentPreview = "";
            if (isImage) {
                contentPreview = "[图片]";
            } else {
                if (msgText.length > 50) {
                    contentPreview = msgText.substring(0, 50) + "...";
                } else {
                    contentPreview = msgText;
                }
            }
            
            currentReplyingTo = {
                msgId: msg.id,
                senderName: senderName,
                contentPreview: contentPreview,
                isImage: isImage,
                imageSrc: isImage ? msg.text : null,
                rawText: isImage ? null : msgText  // 新增：非图片消息的原始文本
            };
            
            // 显示引用预览条
            let existingReplyBar = document.querySelector(".reply-bar");
            if (existingReplyBar) existingReplyBar.remove();
            
            let inputArea = currentOpenChatWindow.querySelector(".input-area");
            let replyBar = document.createElement("div");
            replyBar.className = "reply-bar";
            let previewContent = isImage ? '🖼️ [图片]' : escapeHtml(contentPreview);
            replyBar.innerHTML = `
                <div class="reply-info">💬 引用 ${escapeHtml(senderName)}：${previewContent}</div>
                <div class="cancel-reply">取消</div>
            `;
            inputArea.insertBefore(replyBar, inputArea.firstChild);
            
            let cancelBtn = replyBar.querySelector(".cancel-reply");
            if (cancelBtn) {
                cancelBtn.onclick = () => {
                    currentReplyingTo = null;
                    replyBar.remove();
                };
            }
            
            closeBottomPanel();
        } else if (action === "delete") {
            // 删除消息
            if (confirm("确定删除这条消息吗？")) {
                let index = msgs.findIndex(m => m.id === msgId);
                if (index !== -1) {
                    msgs.splice(index, 1);
                    saveData();
                    
                    // 更新会话的最后一条消息
                    let session = appData.sessions.find(s => s.sessionId === sessionId);
                    if (session && msgs.length > 0) {
                        let lastMsg = msgs[msgs.length - 1];
                        if (lastMsg.isVote) {
                            session.lastMsg = `投票：${lastMsg.title}`;
                        } else if (lastMsg.text) {
                            session.lastMsg = lastMsg.text.length > 20 ? lastMsg.text.substring(0,20)+"..." : lastMsg.text;
                        } else {
                            session.lastMsg = "图片";
                        }
                        session.lastTime = lastMsg.time;
                    } else if (session) {
                        session.lastMsg = "暂无消息";
                        session.lastTime = "";
                    }
                    
                    // 重新渲染聊天窗口
                    if (currentOpenChatWindow && currentOpenSessionId === sessionId) {
                        renderChatMessagesToWindow(currentOpenChatWindow, sessionId);
                    }
                    
                    // 更新消息列表页
                    if (currentPage === "messages") {
                        renderMessagesPage();
                    }
                    
                    alert("消息已删除");
                }
            }
            closeBottomPanel();
        }
    });
}

// ==================== 新增：发消息后强制滚动到底部（供 send 调用） ====================
function scrollToBottomIfNeeded(sessionId, fromSelf) {
    if (!currentOpenChatWindow || currentOpenSessionId !== sessionId) return;
    var container = currentOpenChatWindow.querySelector('.messages-container');
    if (!container) return;
    
    // 自己发的消息：强制滚动到底部
    if (fromSelf) {
        container.scrollTop = container.scrollHeight;
        return;
    }
    
    // 对方发的消息：用户在底部才滚动，否则显示新消息气泡
    var isAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
    if (isAtBottom) {
        container.scrollTop = container.scrollHeight;
    } else {
        showNewMsgBubble(sessionId);
    }
}

// ==================== 打开聊天窗口 ====================
function openChatSession(session) {
    if (!session) return;
    if (currentOpenChatWindow) {
        closeEmojiPanel();
        if (activeVideoCallContainer) {
            activeVideoCallContainer.remove();
            activeVideoCallContainer = null;
        }
        if (currentOpenSessionId) {
            if (replyTimers[currentOpenSessionId]) {
                clearTimeout(replyTimers[currentOpenSessionId]);
            }
            if (idleTimers[currentOpenSessionId]) {
                clearTimeout(idleTimers[currentOpenSessionId]);
            }
        }
        currentOpenChatWindow.remove();
        currentOpenChatWindow = null;
        currentOpenSessionId = null;
    }
    if (!appData.messages[session.sessionId]) {
        appData.messages[session.sessionId] = [];
    }
    let msgs = appData.messages[session.sessionId];
    let unreadChanged = false;
    for (let i = 0; i < msgs.length; i++) {
        if (msgs[i].from !== "self" && !msgs[i].read) {
            msgs[i].read = true;
            unreadChanged = true;
        }
    }
    if (unreadChanged) {
        session.unread = 0;
        saveData();
        if (currentPage === "messages") {
            let sessionItem = document.querySelector(`.session-item[data-session-id="${session.sessionId}"]`);
            if (sessionItem) {
                let badge = sessionItem.querySelector('.unread-badge');
                if (badge) {
                    badge.remove();
                }
            }
        }
    }
    let chatWin = document.createElement("div");
    chatWin.className = "chat-view";
    chatWin.setAttribute("data-session-id", session.sessionId);

}

                senderName: currentReplyingTo.senderName,

};

    if (session.type === "friend") {

        var hasUnread = appData.friendQuestionnaireRedDot && appData.friendQuestionnaireRedDot[friendId] === true;

            // 查找该好友最近完成的我发给他的问卷
            var latestQ = null;
            for (var qid in appData.questionnaires) {
                var qItem = appData.questionnaires[qid];
                if (qItem && qItem.friendId === friendId && qItem.fromMe === true && qItem.status === 'completed' && qItem.hasRedDot === true) {
                    if (!latestQ || qItem.completedAt > latestQ.completedAt) {
                        latestQ = qItem;
                    }
