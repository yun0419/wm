}

// ==================== 表情面板 ====================
function openEmojiPanel(sessionId, friendId) {
    if (currentEmojiPanel) {
        closeEmojiPanel();
        return;
    }
    
    const categories = [
        { id: "emojis", name: "表情包", isGrid: true, isImage: true },
        { id: "emoji", name: "emoji", isGrid: true, isImage: false },
        { id: "kaomojis", name: "颜文字", isGrid: true, isImage: false },
        { id: "patPat", name: "拍一拍", isGrid: false, isImage: false }
    ];
    
    const sources = [
        { id: "my", name: "我的", canEdit: true },
        { id: "public", name: "公共词条库", canEdit: false },
        { id: "private", name: "私人词条库", canEdit: false }
    ];
    
    let currentCategory = categories[0].id;
    let currentSource = "my";
    
    function getItems() {
        if (currentSource === "my") {
            // 我的词条：存储在 appData.lexicon 的旧结构中
            let catData = appData.lexicon[currentCategory];
            if (catData && catData["默认"]) {
                return catData["默认"];
            }
            return [];
        } else if (currentSource === "public") {
            // 公共词条库：存储在 appData.lexicon.public 中
            let catData = appData.lexicon.public;
            if (catData && catData[currentCategory] && catData[currentCategory]["默认"]) {
                return catData[currentCategory]["默认"];
            }
            return [];
        } else {
            // 私人词条库：针对该好友的私人词条
            let priv = getPrivateLexicon(friendId);
            let catData = priv[currentCategory];
            if (catData && catData["默认"]) {
                return catData["默认"];
            }
            return [];
        }
    }

    function addTextItem(value) {
        if (!value.trim()) return false;
        if (currentSource !== "my") {
            alert("只能在「我的」中添加词条");
            return false;
        }
        let items = getItems();
        if (items.includes(value)) return false;
        items.push(value);
        if (!appData.lexicon[currentCategory]) {
            appData.lexicon[currentCategory] = {};
        }
        appData.lexicon[currentCategory]["默认"] = items;
        saveData();
        return true;
    }

    async function addImageToMyEmojis(file) {
        if (currentCategory !== 'emojis') return false;
        if (currentSource !== "my") {
            alert("只能在「我的」中添加图片");
            return false;
        }
        try {
            let compressed = await compressImage(file, 80, 0.5);
            let items = getItems();
            items.push(compressed);
            if (!appData.lexicon[currentCategory]) {
                appData.lexicon[currentCategory] = {};
            }
            appData.lexicon[currentCategory]["默认"] = items;
            saveData();
            return true;
        } catch (e) {
            console.error("图片压缩失败", e);
            return false;
        }
    }
    
    let panel = document.createElement("div");
    panel.className = "emoji-panel";
    panel.innerHTML = `
        <div class="emoji-panel-tabs" id="categoryTabs"></div>
        <div class="emoji-source-tabs" id="sourceTabs"></div>
        <div id="emojiAddArea" class="emoji-add-area" style="display: none;"></div>
        <div class="emoji-panel-content" id="emojiPanelContent"></div>
        <div style="padding:6px; text-align:center; font-size:10px; color:#8e8e93; border-top:0.5px solid #e9e9ef;">
            📌 长按“我的”中的词条可删除
        </div>
    `;
    document.body.appendChild(panel);
    currentEmojiPanel = panel;
    currentEmojiSessionId = sessionId;
    
    if (currentOpenChatWindow) {
        currentOpenChatWindow.style.height = "55%";
        let msgContainer = currentOpenChatWindow.querySelector(".messages-container");
        if (msgContainer) {
            msgContainer.style.height = "calc(55% - 56px)";
        }
    }
    
    function renderCategoryTabs() {
        let container = panel.querySelector("#categoryTabs");
        if (!container) return;
        container.innerHTML = "";
        for (let cat of categories) {
            let tab = document.createElement("div");
            tab.className = "emoji-panel-tab";
            if (currentCategory === cat.id) {
                tab.classList.add("active");
            }
            tab.textContent = cat.name;
            tab.onclick = () => {
                currentCategory = cat.id;
                renderCategoryTabs();
                renderContent();
                updateAddAreaVisibility();
            };
            container.appendChild(tab);
        }
    }
    
    function renderSourceTabs() {
        let container = panel.querySelector("#sourceTabs");
        if (!container) return;
        container.innerHTML = "";
        for (let src of sources) {
            let tab = document.createElement("div");
            tab.className = "emoji-source-tab";
            if (currentSource === src.id) {
                tab.classList.add("active");
            }
            tab.textContent = src.name;
            tab.onclick = () => {
                currentSource = src.id;
                renderSourceTabs();
                renderContent();
                updateAddAreaVisibility();
            };
            container.appendChild(tab);
        }
    }
    
    function updateAddAreaVisibility() {
        let addArea = panel.querySelector("#emojiAddArea");
        if (!addArea) return;
        let currentCat = categories.find(c => c.id === currentCategory);
        let canEdit = (currentSource === "my" && currentCat);
        
        addArea.innerHTML = "";
        if (!canEdit) {
            addArea.style.display = "none";
            return;
        }
        
        addArea.style.display = "block";
        
        if (currentCat.isImage) {
            addArea.innerHTML = `
                <div class="emoji-add-input" style="justify-content: center;">
                    <input type="file" id="emojiImageUpload" accept="image/*" multiple style="display:none;">
                    <button id="uploadEmojiImageBtn" style="background:#07c160; padding:6px 12px;">📷 从相册选择图片（可多选）</button>
                </div>
            `;
            let uploadBtn = addArea.querySelector("#uploadEmojiImageBtn");
            let fileInput = addArea.querySelector("#emojiImageUpload");
            if (uploadBtn) {
                uploadBtn.onclick = () => {
                    if (fileInput) fileInput.click();
                };
            }
            if (fileInput) {
                fileInput.onchange = async (e) => {
                    let files = e.target.files;
                    if (files.length === 0) return;
                    let added = 0;
                    for (let i = 0; i < files.length; i++) {
                        let success = await addImageToMyEmojis(files[i]);
                        if (success) added++;
                    }
                    if (added > 0) {
                        renderContent();
                        alert(`成功添加 ${added} 张图片`);
                    } else {
                        alert("添加失败");
                    }
                    fileInput.value = "";
                };
            }
        } else {
            addArea.innerHTML = `
                <div class="emoji-add-input">
                    <input type="text" id="newEmojiInput" placeholder="输入新词条...">
                    <button id="addEmojiBtn">添加</button>
                </div>
            `;
            let addBtn = addArea.querySelector("#addEmojiBtn");
            let addInput = addArea.querySelector("#newEmojiInput");
            if (addBtn) {
                addBtn.onclick = () => {
                    let val = addInput.value.trim();
                    if (!val) {
                        alert("请输入内容");
                        return;
                    }
                    if (addTextItem(val)) {
                        addInput.value = "";
                        renderContent();
                    } else {
                        alert("词条已存在");
                    }
                };
            }
            if (addInput) {
                addInput.addEventListener("keypress", (e) => {
                    if (e.key === "Enter" && addBtn) {
                        addBtn.click();
                    }
                });
            }
        }
    }
    
    function renderContent() {
        let container = panel.querySelector("#emojiPanelContent");
        if (!container) return;
        let items = getItems();
        let isGrid = true;
        let currentCat = categories.find(c => c.id === currentCategory);
        if (currentCat) {
            isGrid = currentCat.isGrid;
        }
        
        if (items.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:30px; color:#8e8e93;">暂无词条</div>`;
            return;
        }
        
        if (isGrid) {
            let html = `<div class="emoji-grid-view">`;
            for (let idx = 0; idx < items.length; idx++) {
                let item = items[idx];
                let displayHtml = "";
                if (item && item.startsWith("data:image")) {
                    displayHtml = `<img src="${item}">`;
                } else {
                    displayHtml = escapeHtml(item);
                }
                let kaomojiClass = "";
                if (currentCategory === 'kaomojis') {
                    kaomojiClass = "kaomoji-cell";
                }
                html += `<div class="emoji-cell ${kaomojiClass}" data-index="${idx}" data-value="${escapeHtml(item)}">${displayHtml}</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            
            let cells = container.querySelectorAll(".emoji-cell");
            for (let cell of cells) {
                cell.onclick = (e) => {
                    e.stopPropagation();
                    let val = cell.dataset.value;
                    let replyTo = null;
                    if (currentReplyingTo) {
                        replyTo = {
                            msgId: currentReplyingTo.msgId,
                            senderName: currentReplyingTo.senderName,
                            contentPreview: currentReplyingTo.contentPreview,
                            isImage: currentReplyingTo.isImage,
                            imageSrc: currentReplyingTo.imageSrc
                        };
                    }
                    sendMessage(sessionId, val, true, null, false, false, null, replyTo);
                    if (currentReplyingTo) {
                        currentReplyingTo = null;
                        let replyBar = document.querySelector(".reply-bar");
                        if (replyBar) {
                            replyBar.remove();
                        }
                    }
                    closeEmojiPanel();
                };
                
                if (currentSource === "my") {
                    let pressTimer = null;
                    cell.addEventListener("touchstart", (e) => {
                        pressTimer = setTimeout(() => {
                            let idx = parseInt(cell.dataset.index);
                            if (confirm("确定删除这个词条吗？")) {
                                let itemsList = getItems();
                                itemsList.splice(idx, 1);
                                if (currentSource === "my") {
                                    if (!appData.lexicon[currentCategory]) {
                                        appData.lexicon[currentCategory] = {};
                                    }
                                    appData.lexicon[currentCategory]["默认"] = itemsList;
                                } else if (currentSource === "public") {
                                    if (!appData.lexicon.public[currentCategory]) {
                                        appData.lexicon.public[currentCategory] = {};
                                    }
                                    appData.lexicon.public[currentCategory]["默认"] = itemsList;
                                } else {
                                    let priv = getPrivateLexicon(friendId);
                                    if (!priv[currentCategory]) {
                                        priv[currentCategory] = {};
                                    }
                                    priv[currentCategory]["默认"] = itemsList;
                                }
                                saveData();
                                renderContent();
                            }
                        }, 500);
                        cell.addEventListener("touchend", () => {
                            if (pressTimer) clearTimeout(pressTimer);
                        });
                        cell.addEventListener("touchmove", () => {
                            if (pressTimer) clearTimeout(pressTimer);
                        });
                    });
                }
            }
        } else {
            let html = `<div class="patpat-list-view">`;
            for (let idx = 0; idx < items.length; idx++) {
                let item = items[idx];
                html += `<div class="patpat-item" data-index="${idx}" data-value="${escapeHtml(item)}">${escapeHtml(item)}</div>`;
            }
            html += `<div class="patpat-item" data-value="拍拍自己">👏 拍拍自己</div>`;
            html += `</div>`;
            container.innerHTML = html;
            
            let patItems = container.querySelectorAll(".patpat-item");
            for (let item of patItems) {
                item.onclick = (e) => {
    e.stopPropagation();
    let patContent = item.dataset.value;  // 获取用户点击的具体拍一拍内容
    let symbol = appData.chatSettings.myPatSymbol || "🤍";
    let patText = `${symbol}${patContent}${symbol}`;
    let replyTo = null;
    if (currentReplyingTo) {
        replyTo = {
            msgId: currentReplyingTo.msgId,
            senderName: currentReplyingTo.senderName,
            contentPreview: currentReplyingTo.contentPreview,
            isImage: currentReplyingTo.isImage,
            imageSrc: currentReplyingTo.imageSrc
        };
    }
    sendMessage(sessionId, patText, true, null, true, false, null, replyTo);
    if (currentReplyingTo) {
        currentReplyingTo = null;
        let replyBar = document.querySelector(".reply-bar");
        if (replyBar) replyBar.remove();
    }
    closeEmojiPanel();
};
                
                if (currentSource === "my" && item.dataset.index !== undefined) {
                    let pressTimer = null;
                    item.addEventListener("touchstart", (e) => {
                        pressTimer = setTimeout(() => {
                            let idx = parseInt(item.dataset.index);
                            if (confirm("确定删除这个词条吗？")) {
                                let itemsList = getItems();
                                itemsList.splice(idx, 1);
                                if (currentSource === "my") {
                                    if (!appData.lexicon[currentCategory]) {
                                        appData.lexicon[currentCategory] = {};
                                    }
                                    appData.lexicon[currentCategory]["默认"] = itemsList;
                                } else if (currentSource === "public") {
                                    if (!appData.lexicon.public[currentCategory]) {
                                        appData.lexicon.public[currentCategory] = {};
                                    }
                                    appData.lexicon.public[currentCategory]["默认"] = itemsList;
                                } else {
                                    let priv = getPrivateLexicon(friendId);
                                    if (!priv[currentCategory]) {
                                        priv[currentCategory] = {};
                                    }
                                    priv[currentCategory]["默认"] = itemsList;
                                }
                                saveData();
                                renderContent();
                            }
                        }, 500);
                        item.addEventListener("touchend", () => {
                            if (pressTimer) clearTimeout(pressTimer);
                        });
                        item.addEventListener("touchmove", () => {
                            if (pressTimer) clearTimeout(pressTimer);
                        });
                    });
                }
            }
        }
    }
    
    renderCategoryTabs();
    renderSourceTabs();
    renderContent();
    updateAddAreaVisibility();
    
    setTimeout(() => {
        if (panel) {
            panel.classList.add("open");
        }
    }, 10);
}

function closeEmojiPanel() {
    if (currentEmojiPanel) {
        currentEmojiPanel.classList.remove("open");
        if (currentOpenChatWindow) {
            currentOpenChatWindow.style.height = "100%";
            let msgContainer = currentOpenChatWindow.querySelector(".messages-container");
            if (msgContainer) {
                msgContainer.style.height = "";
            }
        }
        setTimeout(() => {
            if (currentEmojiPanel && currentEmojiPanel.parentElement) {
                currentEmojiPanel.remove();
                currentEmojiPanel = null;
            }
        }, 300);
    }

async function showPublishMomentModal() {
    let selectedImages = [];
    
    let modalHtml = `
        <div class="full-page-modal" style="height:80%; display:flex; flex-direction:column; background:var(--app-bg-color);">
            <div style="padding:12px; border-bottom:0.5px solid #e9e9ef; display:flex; justify-content:space-between; align-items:center;">
                <span class="modal-close-btn" style="position:relative; top:0; left:0; font-size:24px;">← 返回</span>
                <span style="font-weight:600; font-size:16px;">发表新动态</span>
                <span id="addImageBtn" style="font-size:24px; cursor:pointer;">➕</span>
            </div>
            <div style="flex:1; padding:16px; overflow-y:auto;">
                <textarea id="momentTextInput" placeholder="分享此刻的心情..." style="width:100%; min-height:200px; padding:12px; border:0.5px solid #ddd; border-radius:12px; font-size:14px; resize:none; background:var(--app-bg-color);"></textarea>
                <div id="imagePreviewArea" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:12px;"></div>
            </div>
            <div style="padding:12px; border-top:0.5px solid #e9e9ef;">
                <button id="publishBtn" style="width:100%; padding:12px; background:#07c160; color:white; border:none; border-radius:24px; font-size:16px;">发布</button>
            </div>
        </div>
    `;
    let modal = showModal(modalHtml, true);
    let container = modal.querySelector(".modal-container");
    if (container) {
        container.classList.add("full-page-modal");
        container.style.padding = "0";
    }
    
    let closeBtn = modal.querySelector(".modal-close-btn");
    if (closeBtn) {
        closeBtn.onclick = () => modal.remove();
    }
    
    let addImageBtn = modal.querySelector("#addImageBtn");
    let imagePreviewArea = modal.querySelector("#imagePreviewArea");
    let textInput = modal.querySelector("#momentTextInput");
    let publishBtn = modal.querySelector("#publishBtn");
    
    function updateImagePreview() {
        if (!imagePreviewArea) return;
        imagePreviewArea.innerHTML = "";
        for (let idx = 0; idx < selectedImages.length; idx++) {
            let img = selectedImages[idx];
            let imgContainer = document.createElement("div");
            imgContainer.style.position = "relative";
            imgContainer.style.width = "80px";
            imgContainer.style.height = "80px";
            imgContainer.style.borderRadius = "8px";
            imgContainer.style.overflow = "hidden";
            imgContainer.style.border = "1px solid #ddd";
            let imgElem = document.createElement("img");
            imgElem.src = img.thumb;
            imgElem.style.width = "100%";
            imgElem.style.height = "100%";
            imgElem.style.objectFit = "cover";
            let deleteBtn = document.createElement("span");
            deleteBtn.innerHTML = "✕";
            deleteBtn.style.position = "absolute";
            deleteBtn.style.top = "2px";
            deleteBtn.style.right = "2px";
            deleteBtn.style.background = "rgba(0,0,0,0.6)";
            deleteBtn.style.color = "white";
            deleteBtn.style.borderRadius = "50%";
            deleteBtn.style.width = "20px";
            deleteBtn.style.height = "20px";
            deleteBtn.style.display = "flex";
            deleteBtn.style.alignItems = "center";
            deleteBtn.style.justifyContent = "center";
            deleteBtn.style.fontSize = "12px";
            deleteBtn.style.cursor = "pointer";
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                selectedImages.splice(idx, 1);
                updateImagePreview();
            };
            imgContainer.appendChild(imgElem);
            imgContainer.appendChild(deleteBtn);
            imagePreviewArea.appendChild(imgContainer);
        }
        if (addImageBtn) {
            if (selectedImages.length >= 9) {
                addImageBtn.style.display = "none";
            } else {
                addImageBtn.style.display = "inline-block";
            }
        }
    }
    
    if (addImageBtn) {
        addImageBtn.onclick = () => {
            if (selectedImages.length >= 9) {
                alert("最多只能添加9张图片");
                return;
            }
            let input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.multiple = true;
            input.onchange = async (e) => {
                let files = e.target.files;
                let remaining = 9 - selectedImages.length;
                let toAdd = Math.min(files.length, remaining);
                for (let i = 0; i < toAdd; i++) {
                    try {
                        let thumb = await compressImage(files[i], 80, 0.5);
                        let original = await compressImageToWidth(files[i], 800, 0.7);
                        selectedImages.push({ thumb, original });
                        if (i === toAdd - 1) {
                            updateImagePreview();
                        }
                    } catch (err) {
                        console.error("图片处理失败", err);
                        let reader = new FileReader();
                        reader.onload = (ev) => {
                            selectedImages.push({ thumb: ev.target.result, original: ev.target.result });
                            if (i === toAdd - 1) {
                                updateImagePreview();
                            }
                        };
                        reader.readAsDataURL(files[i]);
                    }
                }
                updateImagePreview();
            };
            input.click();
        };
    }
    
    if (publishBtn) {
    publishBtn.onclick = async () => {
        let text = textInput.value.trim();
        if (!text && selectedImages.length === 0) {
            alert("请输入内容或添加图片");
            return;
        }
        let newMoment = {
            id: Date.now(),
            text: text,
            images: selectedImages,
            time: new Date().toLocaleString(),
            comments: []
        };
        appData.moments.unshift(newMoment);
        saveData();
        modal.remove();
        alert("发布成功！所有好友将在30分钟内陆续评论~");
        renderProfilePage();
        
        // ✅ 新增：所有好友在30分钟内随机时间评论
        scheduleAllFriendsCommentOnNewMoment(newMoment.id);
    };
}
}

// ==================== 我的朋友圈（倒序+时间轴折叠+点击时间查看详情） ====================
function renderMomentTimeline(moments, onPublish) {
    // 保存模态框引用，用于实时刷新评论
    if (currentMomentModalRef) {
        currentMomentModalRef.remove();
        currentMomentModalRef = null;
    }
    
    let sortedMoments = [...moments].sort((a, b) => {
        let dateA = new Date(a.time);
        let dateB = new Date(b.time);
        return dateB - dateA;
    });
    
    // 按年月分组
    let grouped = {};
    for (let m of sortedMoments) {
        let date = new Date(m.time);
        let year = date.getFullYear();
        let month = date.getMonth() + 1;
        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][month]) grouped[year][month] = [];
        grouped[year][month].push(m);
    }
    
    let years = Object.keys(grouped).sort((a, b) => b - a);
    
    let html = `
        <div class="full-page-modal" style="height:100%; display:flex; flex-direction:column; background:var(--app-bg-color);">
            <div style="padding:10px; border-bottom:0.5px solid #e9e9ef; display:flex; justify-content:space-between; align-items:center;">
                <span id="closeFullModal" style="cursor:pointer; font-size:22px;">← 返回</span>
                <span style="font-size:15px;">朋友圈</span>
                <div>
                    <span id="publishNewBtn" style="cursor:pointer; font-size:20px; margin-right:12px;">➕</span>
                </div>
            </div>
            <div id="timelineContainer" style="flex:1; overflow-y:auto; padding:12px;">`;
    
    if (sortedMoments.length === 0) {
        html += `<div style="text-align:center; padding:40px; color:#8e8e93;">暂无动态，点击➕发布第一条朋友圈</div>`;
    } else {
        for (let year of years) {
            let months = Object.keys(grouped[year]).sort((a, b) => b - a);
            html += `<div class="timeline-year">
                <div class="timeline-year-header" data-year="my_year_${year}">
                    <span>${year}年</span>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="timeline-year-content" id="my_year_${year}">`;
            
            for (let month of months) {
                html += `<div class="timeline-month">
                    <div class="timeline-month-header" data-month="my_year_${year}_month_${month}">
                        <span>${month}月</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="timeline-month-content" id="my_year_${year}_month_${month}">`;
                
                for (let m of grouped[year][month]) {
                    let contentHtml = formatMomentContent(m);
                    let commentsHtml = "";
                    if (m.comments && m.comments.length) {
                        commentsHtml = `<div class="moment-comments">`;
                        for (let cmt of m.comments) {
                            commentsHtml += `<div class="moment-comment"><span>${escapeHtml(cmt.name)}</span>：${renderCommentText(cmt.text)}</div>`;
                        }
                        commentsHtml += `</div>`;
                    }
                    let avatarHtml = "";
                    if (appData.user.avatar && appData.user.avatar.startsWith("data:image")) {
                        avatarHtml = `<img src="${appData.user.avatar}">`;
                    } else {
                        avatarHtml = appData.user.avatar || "😊";
                    }
                    
                    let timeDisplay = formatMomentTimeDisplay(m.time);
                    
                    html += `
                        <div class="moment-item" data-moment-id="${m.id}" style="display:flex; gap:10px; margin-bottom:15px;">
                            <div class="moment-time-clickable" data-moment-id="${m.id}" style="width:65px; flex-shrink:0; font-size:11px; color:#07c160; padding-top:8px; cursor:pointer;">${timeDisplay}</div>
                            <div style="flex:1;">
                                <div class="moment-header" style="margin-bottom:6px;">
                                    <div class="moment-avatar">${avatarHtml}</div>
                                    <div><div class="moment-user">${escapeHtml(appData.user.name)}</div></div>
                                </div>
                                <div class="moment-content" data-moment-id="${m.id}" style="cursor:pointer;">${contentHtml}</div>
                                ${commentsHtml}
                                <div class="flex-between" style="margin-top:10px;">
                                    <input type="text" class="momentCommentInput" placeholder="写评论..." style="flex:1; padding:6px 8px; border-radius:18px; border:0.5px solid #ccc; font-size:12px;">
                                    <button class="momentCommentBtn" data-moment-id="${m.id}" style="margin-left:6px; padding:5px 12px; font-size:12px;">评论</button>
                                </div>
                                <button class="deleteMomentBtn" data-moment-id="${m.id}" style="margin-top:8px; background:#ff3b30; width:100%; padding:6px; font-size:12px;">删除</button>
                            </div>
                        </div>
                        <div style="height:1px; background:#f0f0f0; margin:10px 0;"></div>
                    `;
                }
                html += `</div></div>`;
            }
            html += `</div></div>`;
        }
    }
    
    html += `</div></div>`;
    let modal = showModal(html, true);
// ===== 保存模态框引用 =====
currentMomentModalRef = modal;
let container = modal.querySelector(".modal-container");
    if (container) container.classList.add("full-page-modal");
    
    // 关闭按钮
    let closeBtn = modal.querySelector("#closeFullModal");
    if (closeBtn) closeBtn.onclick = () => modal.remove();
    
    // 发布按钮
    let publishBtn = modal.querySelector("#publishNewBtn");
    if (publishBtn && onPublish) {
        publishBtn.onclick = () => { modal.remove(); onPublish(); };
    }
    
    // 年份折叠
    let yearHeaders = modal.querySelectorAll(".timeline-year-header");
    for (let h of yearHeaders) {
        h.onclick = () => {
            let yearId = h.dataset.year;
            let content = document.getElementById(yearId);
            if (content) {
                content.classList.toggle("collapsed");
                let icon = h.querySelector(".toggle-icon");
                if (icon) icon.innerHTML = content.classList.contains("collapsed") ? "▶" : "▼";
            }
        };
    }
    
    // 月份折叠
    let monthHeaders = modal.querySelectorAll(".timeline-month-header");
    for (let h of monthHeaders) {
        h.onclick = () => {
            let monthId = h.dataset.month;
            let content = document.getElementById(monthId);
            if (content) {
                content.classList.toggle("collapsed");
                let icon = h.querySelector(".toggle-icon");
                if (icon) icon.innerHTML = content.classList.contains("collapsed") ? "▶" : "▼";
            }
        };
    }
    
    // 点击左侧时间查看详情
    let timeClickables = modal.querySelectorAll(".moment-time-clickable");
    for (let el of timeClickables) {
        el.onclick = (e) => {
            e.stopPropagation();
            let momentId = el.dataset.momentId;
            let moment = moments.find(m => m.id == momentId);
            if (moment) showSingleMomentModal(moment);
        };
    }
    
    // 点击内容区域查看详情
    let contentAreas = modal.querySelectorAll(".moment-content");
    for (let area of contentAreas) {
        area.onclick = (e) => {
            e.stopPropagation();
            let momentId = area.dataset.momentId;
            let moment = moments.find(m => m.id == momentId);
            if (moment) showSingleMomentModal(moment);
        };
    }
    
    // 图片预览
    let containerDiv = modal.querySelector("#timelineContainer");
    if (containerDiv) {
        containerDiv.addEventListener("click", (e) => {
            let img = e.target.closest(".moment-image");
            if (img) {
                e.stopPropagation();
                let originalSrc = img.getAttribute("data-original");
                if (originalSrc) showImageViewer(originalSrc);
            }
        });
    }
    
    // 评论功能
    let commentBtns = modal.querySelectorAll(".momentCommentBtn");
    for (let btn of commentBtns) {
        btn.onclick = () => {
            let momentId = btn.dataset.momentId;
            let moment = moments.find(m => m.id == momentId);
            if (moment) {
                let input = btn.parentElement.parentElement.querySelector(".momentCommentInput");
                let commentText = input.value.trim();
                if (commentText) {
                    if (!moment.comments) moment.comments = [];
                    moment.comments.push({ name: appData.user.name, text: commentText });
                    saveData();
                    modal.remove();
                    renderMomentTimeline(moments, onPublish);
                    scheduleFriendAutoCommentAfterMyComment(momentId, commentText);
                } else alert("请输入评论内容");
            }

// 格式化时间显示（用于左侧时间轴）
function formatMomentTimeDisplay(timeStr) {
    if (!timeStr) return "";
    let date = new Date(timeStr);
    let now = new Date();
    let isToday = date.toDateString() === now.toDateString();
    if (isToday) {
        return `今天 ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
    } else {
        return `${date.getMonth() + 1}月${date.getDate()}日`;
    }
}

// ==================== 需求3：好友自动评论（0-30分钟延迟） ====================
// 需求2：朋友圈评论实时刷新（修复评论不显示问题）
// 全局变量：当前打开的朋友圈弹窗

function scheduleFriendAutoCommentAfterMyComment(momentId, myCommentText) {
    let availableFriends = appData.friends.filter(f => f.id !== "self");
    if (availableFriends.length === 0) return;
    let randomFriend = availableFriends[Math.floor(Math.random() * availableFriends.length)];
    
    let delayMinutes = Math.random() * 30;
    let delayMs = delayMinutes * 60 * 1000;
    
    setTimeout(() => {
        let moment = appData.moments.find(m => m.id == momentId);
        if (!moment) return;
        
        let commentItems = getOtherReplyItems(randomFriend.id);
        if (commentItems.length === 0) return;
        let count = Math.min(Math.floor(Math.random() * 3) + 1, commentItems.length);
        let shuffled = [...commentItems];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        let selected = shuffled.slice(0, count);
        let commentText = selected.join("");
        
        if (!moment.comments) moment.comments = [];
        moment.comments.push({ 
            from: randomFriend.id, 
            name: randomFriend.name, 
            text: commentText,
            time: new Date().toLocaleString()
        });
        saveData();
        
        // 如果朋友圈弹窗当前是打开的，实时刷新
        if (currentMomentModalRef) {
            let moments = appData.moments;
            let onPublish = () => {
                showPublishMomentModal();
            };
            currentMomentModalRef.remove();
            currentMomentModalRef = null;
            renderMomentTimeline(moments, onPublish);
        } else {
            renderCurrentPage();
        }
        
        alert(`好友 ${randomFriend.name} 评论了你的朋友圈：${commentText}`);
    }, delayMs);
}

// 所有好友在30分钟内随机时间评论朋友圈
function scheduleAllFriendsCommentOnNewMoment(momentId) {
    let availableFriends = appData.friends.filter(f => f.id !== "self");
    if (availableFriends.length === 0) return;
    
    for (let friend of availableFriends) {
        let delaySeconds = Math.random() * 30 * 60;
        let delayMs = delaySeconds * 1000;
        
        setTimeout(() => {
            let moment = appData.moments.find(m => m.id == momentId);
            if (!moment) return;
            
            let commentItems = getOtherReplyItems(friend.id);
            if (commentItems.length === 0) return;
            
            let count = Math.min(Math.floor(Math.random() * 3) + 1, commentItems.length);
            let shuffled = [...commentItems];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            let selected = shuffled.slice(0, count);
            let commentText = selected.join("");
            
            if (!moment.comments) moment.comments = [];
            moment.comments.push({
                from: friend.id,
                name: friend.name,
                text: commentText,
                time: new Date().toLocaleString(),
                isAutoReply: true
            });
            saveData();
            
            if (currentMomentModalRef) {
                let moments = appData.moments;
                let onPublish = () => { showPublishMomentModal(); };
                currentMomentModalRef.remove();
                currentMomentModalRef = null;
                renderMomentTimeline(moments, onPublish);
            } else {
                renderCurrentPage();
            }
            
        }, delayMs);
    }
}

function openLexiconModal() {
    if (!appData.lexicon.public) {
        appData.lexicon.public = {
            wordCards: { "默认": [] }, emojis: { "默认": [] }, kaomojis: { "默认": [] },
            emoji: { "默认": [] }, patPat: { "默认": [] }, weather: { "默认": [] }, status: { "默认": [] }
        };
        saveData();
    }

    let categories = [
        { id: "wordCards", name: "字卡" },
        { id: "emojis", name: "表情包" },
        { id: "kaomojis", name: "颜文字" },
        { id: "emoji", name: "emoji" },
        { id: "patPat", name: "拍一拍" },
        { id: "weather", name: "天气" },
        { id: "status", name: "状态" }
    ];
    let currentCategory = categories[0].id;
    let currentGroup = "默认";
    let batchMode = false;
    let selectedIndices = new Set();
    let floatingBar = null;
    let searchKeyword = "";

    function getCurrentItems() {
        if (!appData.lexicon.public[currentCategory]) {
            appData.lexicon.public[currentCategory] = {};
        }
        if (!appData.lexicon.public[currentCategory][currentGroup]) {
            appData.lexicon.public[currentCategory][currentGroup] = [];
        }
        return appData.lexicon.public[currentCategory][currentGroup];
    }

    function saveCurrentItems(items) {
        if (!appData.lexicon.public[currentCategory]) {
            appData.lexicon.public[currentCategory] = {};
        }
        appData.lexicon.public[currentCategory][currentGroup] = items;
        saveData();
    }

    function deleteGroup(groupName) {
        if (groupName === "默认") {
            alert("不能删除默认分组");
            return false;
        }
        let groups = appData.lexicon.public[currentCategory] || {};
        if (!groups[groupName]) return false;
        if (confirm(`确定删除分组“${groupName}”及其所有词条吗？`)) {
            delete groups[groupName];
            if (Object.keys(groups).length === 0) {
                groups["默认"] = [];
            }
            appData.lexicon.public[currentCategory] = groups;
            saveData();
            if (currentGroup === groupName) {
                let keys = Object.keys(groups);
                currentGroup = keys[0] || "默认";
            }
            return true;
        }
        return false;
    }

    function showFloatingBar(modalContainer) {
        if (floatingBar) floatingBar.remove();
        floatingBar = document.createElement("div");
        floatingBar.className = "floating-action-bar show";
        floatingBar.innerHTML = `
            <button id="floatingSelectAllBtn" style="background: #07c160; padding: 6px; font-size: 12px;">全选</button>
            <button id="floatingBatchDeleteBtn" style="background: #ff3b30; padding: 6px; font-size: 12px;">删除选中 (${selectedIndices.size})</button>
            <button id="floatingExitBatchBtn" style="background: #888; padding: 6px; font-size: 12px;">取消</button>
        `;
        document.body.appendChild(floatingBar);
        
        floatingBar.querySelector("#floatingSelectAllBtn").onclick = () => {
            let items = getCurrentItems();
            if (selectedIndices.size === items.length) {
                selectedIndices.clear();
            } else {
                for (let i = 0; i < items.length; i++) selectedIndices.add(i);
            }
            renderModal(modalContainer);
        };
        
        floatingBar.querySelector("#floatingBatchDeleteBtn").onclick = () => {
            if (selectedIndices.size === 0) { alert("请至少选择一个词条"); return; }
            if (confirm(`确定删除 ${selectedIndices.size} 个词条吗？`)) {
                let items = getCurrentItems();
                let newItems = items.filter((_, idx) => !selectedIndices.has(idx));
                saveCurrentItems(newItems);
                batchMode = false;
                selectedIndices.clear();
                if (floatingBar) floatingBar.remove();
                renderModal(modalContainer);
            }
        };
        
        floatingBar.querySelector("#floatingExitBatchBtn").onclick = () => {
            batchMode = false;
            selectedIndices.clear();
            if (floatingBar) floatingBar.remove();
            renderModal(modalContainer);
        };
    }

    // 弹出添加菜单
    function showAddMenu(modalRef) {
        let menuHtml = `
            <div class="modal-container" style="width: 80%; max-width: 300px; padding: 16px;">
                <div style="text-align: center; margin-bottom: 16px; font-size: 16px; font-weight: 600;">选择添加方式</div>
                <div class="bottom-panel-option" data-action="single" style="margin: 8px 0; background: #07c160; color: white;">📝 添加一条（文本）</div>
                <div class="bottom-panel-option" data-action="batch" style="margin: 8px 0; background: #07c160; color: white;">📚 批量添加（多行）</div>
                <div class="bottom-panel-option" data-action="uploadImages" style="margin: 8px 0; background: #07c160; color: white;">📷 上传图片（可多选）</div>
                <div class="bottom-panel-option" data-action="cancel" style="margin: 8px 0; background: #888; color: white;">❌ 取消</div>
            </div>
        `;
        let menuModal = showModal(menuHtml);
        
        menuModal.querySelectorAll(".bottom-panel-option").forEach(opt => {
            opt.onclick = () => {
                let action = opt.dataset.action;
                menuModal.remove();
                if (action === "single") {
                    showSingleAddModal(modalRef);
                } else if (action === "batch") {
                    showBatchAddModal(modalRef);
                } else if (action === "uploadImages") {
        if (currentCategory !== "emojis") {
            alert("图片只能添加到「表情包」分类中");
            return;
        }
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.multiple = true;
        input.onchange = async (e) => {
            let files = e.target.files;
            if (files.length === 0) return;
            
            // ===== 新增：检查词条库图片总数 =====
            let totalImages = countAllLexiconImages();
            let maxImages = 500;
            
            if (totalImages >= maxImages) {
                alert('❌ 词条库图片已达上限 ' + maxImages + ' 张，请先删除旧图片再添加。');
                return;
            }
            
            let remaining = maxImages - totalImages;
            if (files.length > remaining) {
                if (!confirm('⚠️ 词条库最多 ' + maxImages + ' 张图片，当前已有 ' + totalImages + ' 张，只能再添加 ' + remaining + ' 张。\n\n是否只添加前 ' + remaining + ' 张？')) {
                    return;
                }
                // 只取前 remaining 个文件
                let originalFiles = files;
                files = [];
                for (var fi = 0; fi < Math.min(originalFiles.length, remaining); fi++) {
                    files.push(originalFiles[fi]);
                }
            }
            // ===== 新增结束 =====
            
            let items = getCurrentItems();
            let added = 0;
            for (let i = 0; i < files.length; i++) {
                try {
                    let compressed = await compressImage(files[i], 90, 0.5);
                    if (!items.includes(compressed)) {
                        items.push(compressed);
                        added++;
                    }
                } catch (err) {
                    let reader = new FileReader();
                    reader.onload = (ev) => {
                        let dataUrl = ev.target.result;
                        if (!items.includes(dataUrl)) {
                            items.push(dataUrl);
                            added++;
                        }
                    };
                    reader.readAsDataURL(files[i]);
                }
            }
            setTimeout(() => {
                saveCurrentItems(items);
                renderModal(modalRef);
                alert(`成功添加 ${added} 张图片`);
            }, 500);
        };
        input.click();
    }
            };
        });
    }

        let batchHtml = `

            </div>

        let textarea = batchModal.querySelector("#batchTextArea");
        let confirmBtn = batchModal.querySelector("#confirmBatchBtn");
        let cancelBtn = batchModal.querySelector("#cancelBatchBtn");
        
        if (confirmBtn) {
            confirmBtn.onclick = () => {
                let text = textarea.value.trim();
                if (!text) { alert("请输入内容"); return; }
                let items = getCurrentItems();
                let lines = text.split(/\r?\n/).filter(line => line.trim().length > 0);
                let newLines = [];
                for (let line of lines) {
                    if (!items.includes(line) && !newLines.includes(line)) {
                        newLines.push(line);
                    }
                }
                if (newLines.length) {
                    items.push(...newLines);
                    saveCurrentItems(items);
                }
                batchModal.remove();
                renderModal(modalRef);
                alert(`成功添加 ${newLines.length} 个词条（重复 ${lines.length - newLines.length} 个）`);
            };
        }
        if (cancelBtn) {
            cancelBtn.onclick = () => batchModal.remove();
        }
        setTimeout(() => textarea.focus(), 100);
    }

                e.stopPropagation();

            };

        if (backBtn) {
            backBtn.onclick = (e) => {
                e.stopPropagation();
                modal.remove();
                if (floatingBar) floatingBar.remove();
                renderSettingsPage();
            };
        }
        
        let searchInput = container.querySelector("#searchInput");
        if (searchInput) {
            searchInput.oninput = (e) => {
                searchKeyword = e.target.value;
                renderModal(modal);
            };
        }
        
        container.querySelectorAll("[data-cat]").forEach(el => {
            el.onclick = () => {
                currentCategory = el.dataset.cat;
                let groupsObj = appData.lexicon.public[currentCategory] || {};
                let keys = Object.keys(groupsObj);
                currentGroup = keys[0] || "默认";
                if (!groupsObj[currentGroup]) groupsObj[currentGroup] = [];
                batchMode = false;
                selectedIndices.clear();
                searchKeyword = "";
                if (floatingBar) floatingBar.remove();
                renderModal(modal);
            };
        });
        
        let groupSpans = container.querySelectorAll("[data-group]");
        groupSpans.forEach(el => {
            let groupName = el.dataset.group;
            let isDefault = el.dataset.isDefault === "true";
            el.onclick = (e) => {
                e.stopPropagation();
                if (groupName !== currentGroup) {
                    currentGroup = groupName;
                    batchMode = false;
                    selectedIndices.clear();
                    searchKeyword = "";
                    if (floatingBar) floatingBar.remove();
                    renderModal(modal);
                }
            };
            if (!isDefault) {
                let pressTimer;
                el.addEventListener("touchstart", (e) => {
                    pressTimer = setTimeout(() => {
                        showPopupMenu(`删除分组“${groupName}”`, [
                            { label: "删除分组及所有词条", value: "delete" }
                        ], (action) => {
                            if (action === "delete" && deleteGroup(groupName)) renderModal(modal);
                        });
                    }, 500);
                    el.addEventListener("touchend", () => { clearTimeout(pressTimer); });
                    el.addEventListener("touchmove", () => { clearTimeout(pressTimer); });
                });
            }
        });
        
        let addGroupBtn = container.querySelector("#addGroupBtnInLexicon");
        if (addGroupBtn) {
            addGroupBtn.onclick = () => {
                let newName = prompt("请输入分组名称");
                if (newName && newName.trim()) {
                    let groups = appData.lexicon.public[currentCategory] || {};
                    if (!groups[newName]) {
                        groups[newName] = [];
                        appData.lexicon.public[currentCategory] = groups;
                        saveData();
                        currentGroup = newName;
                        batchMode = false;
                        selectedIndices.clear();
                        searchKeyword = "";
                        if (floatingBar) floatingBar.remove();
                        renderModal(modal);
                    } else alert("分组已存在");
                }
            };
        }
        
        let batchDeleteBtn = container.querySelector("#batchDeleteBtnInLexicon");
        if (batchDeleteBtn) {
            batchDeleteBtn.onclick = () => {
                batchMode = true;
                selectedIndices.clear();
                renderModal(modal);
                showFloatingBar(modal);
            };
        }
        
        let addBtn = container.querySelector("#addItemBtn");
        if (addBtn) {
            addBtn.onclick = () => {
                showAddMenu(modal);
            };
        }
        
        let itemsContainerInner = container.querySelector("#lexiconItemsList");
        if (itemsContainerInner && batchMode) {
            itemsContainerInner.querySelectorAll(".item-checkbox").forEach(cb => {
                cb.onchange = (e) => {
                    let idx = parseInt(cb.dataset.idx);
                    if (cb.checked) selectedIndices.add(idx);
                    else selectedIndices.delete(idx);
                    if (floatingBar) {
                        let btn = floatingBar.querySelector("#floatingBatchDeleteBtn");
                        if (btn) btn.innerHTML = `删除选中 (${selectedIndices.size})`;
                    }
                    let card = cb.closest(".lexicon-item-card");
                    if (card) {
                        if (cb.checked) card.style.background = "#e8f5e9";
                        else card.style.background = "transparent";
                    }
                };
            });
        }
        
        if (!batchMode && itemsContainerInner) {
            itemsContainerInner.querySelectorAll(".edit-item-btn").forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let idx = parseInt(btn.dataset.idx);
                    editItem(idx, modal);
                };
            });
            itemsContainerInner.querySelectorAll(".delete-item-btn").forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    let idx = parseInt(btn.dataset.idx);
                    if (confirm("确定删除这个词条吗？")) {
                        let items = getCurrentItems();
                        items.splice(idx, 1);
                        saveCurrentItems(items);
                        renderModal(modal);
                    }
                };
            });
            itemsContainerInner.querySelectorAll(".lexicon-item-card").forEach(card => {
                let idx = parseInt(card.dataset.idx);
                let pressTimer;
                card.addEventListener("touchstart", (e) => {
                    pressTimer = setTimeout(() => {
                        showPopupMenu("删除词条", [
                            { label: "删除", value: "delete" },
                            { label: "批量删除", value: "batch" },
                            { label: "全选删除", value: "selectAll" }
                        ], (action) => {
                            let items = getCurrentItems();
                            if (action === "delete") {
                                if (confirm("确定删除这个词条吗？")) {
                                    items.splice(idx, 1);
                                    saveCurrentItems(items);
                                    renderModal(modal);
                                }
                            } else if (action === "batch") {
                                batchMode = true;
                                selectedIndices.clear();
                                renderModal(modal);
                                showFloatingBar(modal);
                            } else if (action === "selectAll") {
                                batchMode = true;
                                for (let i = 0; i < items.length; i++) selectedIndices.add(i);
                                renderModal(modal);
                                showFloatingBar(modal);
                            }
                        });
                    }, 500);
                    card.addEventListener("touchend", () => { clearTimeout(pressTimer); });
                    card.addEventListener("touchmove", () => { clearTimeout(pressTimer); });
                });
            });
        }
    }
    
    let modal = showModal(`<div class="modal-container" style="padding: 12px;"></div>`);
    renderModal(modal);
}

function openDiaryListModal() {
    let diaries = appData.diaryEntries;
    if (!diaries.length) {
        alert("暂无日记记录");
        return;
    }
    let currentIndex = diaries.length - 1;
    
    // 将内容中的<br>和\n正确转换为HTML换行
    function formatDiaryContent(content) {
        if (!content) return "";
        let withBr = content.replace(/<br>/g, "【BR】");
        let escaped = escapeHtml(withBr);
        let withBrAgain = escaped.replace(/【BR】/g, "<br>");
        let final = withBrAgain.replace(/\n/g, "<br>");
        return final;
    }
    
    function renderDiary(index) {
        if (index < 0 || index >= diaries.length) return;
        let diary = diaries[index];
        let commentsHtml = "";
        if (diary.comments && diary.comments.length) {
            commentsHtml = `<div class="moment-comments">`;
            for (let cmt of diary.comments) {
                let commenterName = (cmt.from === "self") ? "我" : (appData.friends.find(f => f.id === cmt.from)?.name || "好友");
                commentsHtml += `<div class="moment-comment"><span>${escapeHtml(commenterName)}</span>：${renderCommentText(cmt.text)}</div>`;
            }
            commentsHtml += `</div>`;
        }
        let formattedContent = formatDiaryContent(diary.content);
        let html = `
            <div class="full-page-modal" style="height:100%; display:flex; flex-direction:column; background:var(--app-bg-color);">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:0.5px solid #e9e9ef;">
                    <span id="closeDiaryListModal" style="cursor:pointer; font-size:18px; color:#ff3b30;">✕ 关闭</span>
                    <span style="font-size:15px; font-weight:600;">📖 日记</span>
                    <span id="backToSettingsFromDiary" style="cursor:pointer; font-size:14px; color:#07c160;">← 返回</span>
                </div>
                <div style="flex:1; overflow-y:auto; padding:12px;">
                    <div class="diary-directory" style="border-bottom:0.5px solid #e9e9ef; padding:10px; max-height:120px; overflow-y:auto;">
                        <div style="font-size:12px; color:#8e8e93; margin-bottom:4px;">📖 目录</div>
                        ${diaries.map((d, i) => `<div class="diary-directory-item" data-dir-index="${i}">${escapeHtml(d.date)}</div>`).join('')}
                    </div>
                    <div class="diary-content-area" style="flex:6; overflow-y:auto; padding:12px; border-bottom:0.5px solid #e9e9ef;">
                        <div class="diary-date">📅 ${escapeHtml(diary.date)}</div>
                        <div class="diary-text" contenteditable="true" id="editableDiary">${formattedContent}</div>
                        <button id="saveDiaryBtn" style="margin-top:8px;">保存修改</button>
                    </div>
                    <div class="diary-comments-area" style="flex:4; overflow-y:auto; padding:12px;">
                        <div style="font-weight:500; margin-bottom:8px;">💬 评论</div>
                        ${commentsHtml}
                        <div class="flex-between" style="margin-top:8px;">
                            <input type="text" class="diaryCommentInput" placeholder="写评论..." style="flex:1; padding:6px; border-radius:16px; border:0.5px solid #ccc;">
                            <button class="diaryCommentBtn" data-idx="${index}">评论</button>
                        </div>
                        <div class="diary-nav">
                            <button id="prevDiaryBtn" ${index === 0 ? 'disabled' : ''}>← 上一篇</button>
                            <button id="nextDiaryBtn" ${index === diaries.length-1 ? 'disabled' : ''}>下一篇 →</button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        let modal = showModal(html, true);
        let container = modal.querySelector(".modal-container");
        if (container) container.classList.add("full-page-modal");
        
        // ✕ 关闭 → 回到消息列表
        let closeBtn = modal.querySelector("#closeDiaryListModal");
        if (closeBtn) {
            closeBtn.onclick = () => {
                modal.remove();
            };
        }
        
        // ← 返回 → 回到设置页
        let backBtn = modal.querySelector("#backToSettingsFromDiary");
        if (backBtn) {
            backBtn.onclick = () => {
                modal.remove();
                renderSettingsPage();
            };
        }
        
        let dirItems = modal.querySelectorAll(".diary-directory-item");
        for (let item of dirItems) {
            item.onclick = () => {
                let newIndex = parseInt(item.dataset.dirIndex);
                modal.remove();
                renderDiary(newIndex);
            };
        }
        
        let prevBtn = modal.querySelector("#prevDiaryBtn");
        if (prevBtn) {
            prevBtn.addEventListener("click", () => {
                if (index > 0) {
                    modal.remove();
                    renderDiary(index - 1);
                }
            });
        }
        
        let nextBtn = modal.querySelector("#nextDiaryBtn");
        if (nextBtn) {
            nextBtn.addEventListener("click", () => {
                if (index < diaries.length - 1) {
                    modal.remove();
                    renderDiary(index + 1);
                }
            });
        }
        
        let saveBtn = modal.querySelector("#saveDiaryBtn");
        if (saveBtn) {
            saveBtn.addEventListener("click", () => {
                let newContent = modal.querySelector("#editableDiary").innerHTML;
                diary.content = newContent;
                saveData();
                alert("已保存");
            });
        }
        
        let commentBtn = modal.querySelector(".diaryCommentBtn");
        if (commentBtn) {
            commentBtn.addEventListener("click", () => {
                let input = modal.querySelector(".diaryCommentInput");
                let commentText = input.value.trim();
                if (commentText) {
                    if (!diary.comments) diary.comments = [];
                    diary.comments.push({ from: "self", text: commentText, time: new Date().toLocaleString() });
                    saveData();
                    modal.remove();
                    renderDiary(index);
                } else {
                    alert("请输入评论内容");
                }
            });
        }
    }
    renderDiary(currentIndex);
}

function openMemoryModal() {
    let modal = showModal(`<div><h3>记·念</h3><div id="pastList"></div><div id="futureList"></div><button id="addMemory">新增事件</button></div>`);
    function refresh() {
        let pastDiv = modal.querySelector("#pastList");
        let futureDiv = modal.querySelector("#futureList");
        if (pastDiv) {
            pastDiv.innerHTML = "";
            for (let e of appData.memoryEvents) {
                if (e.type === "past") {
                    pastDiv.innerHTML += `<div class="memory-entry flex-between"><div>${escapeHtml(e.title)} 始于 ${e.date} 已过 ${calcDays(e.date)} 天</div><button class="delMemoryBtn" data-id="${e.id}" style="background:#ff3b30;">删除</button></div>`;
                }
            }
        }
        if (futureDiv) {
            futureDiv.innerHTML = "";
            for (let e of appData.memoryEvents) {
                if (e.type === "future") {
                    futureDiv.innerHTML += `<div class="memory-entry flex-between"><div>${escapeHtml(e.title)} 距离 ${e.date} 还剩 ${calcDaysFuture(e.date)} 天</div><button class="delMemoryBtn" data-id="${e.id}" style="background:#ff3b30;">删除</button></div>`;
                }
            }
        }
        let delBtns = modal.querySelectorAll(".delMemoryBtn");
        for (let btn of delBtns) {
            btn.onclick = () => {
                let id = btn.dataset.id;
                appData.memoryEvents = appData.memoryEvents.filter(e => e.id != id);
                saveData();
                refresh();
            };
        }
    }
    refresh();
    let addBtn = modal.querySelector("#addMemory");
    if (addBtn) {
        addBtn.onclick = () => {
            let title = prompt("事件名");
            let date = prompt("日期 YYYY-MM-DD");
            let type = confirm("过去事件? 确定过去,取消未来") ? "past" : "future";
            appData.memoryEvents.push({ id: Date.now(), type: type, title: title, date: date });
            saveData();
            refresh();
        };
    }
}

function openChatSettingsModal() {
    let s = appData.chatSettings;
    let minSec = s.replyDelayMin / 1000;
    let maxSec = s.replyDelayMax / 1000;
    let consecutiveMinSec = (s.consecutiveReplyMin || 5000) / 1000;
    let consecutiveMaxSec = (s.consecutiveReplyMax || 60000) / 1000;
    let modal = showModal(`
        <div class="flex-between">正在输入标识 <div class="switch ${s.typingIndicator ? 'active' : ''}" data-key="typingIndicator"></div></div>
        <div class="flex-between">消息发送时间 <div class="switch ${s.showTime ? 'active' : ''}" data-key="showTime"></div></div>
        <div class="flex-between">组合发送(1-3条) <div class="switch ${s.enableCombine ? 'active' : ''}" data-key="enableCombine"></div></div>
        <hr>
        <div><strong>⏱️ 第一条回复延迟范围 (秒)</strong></div>
        <div><div>最小延迟: <span id="minDelayValDisplay">${minSec}</span> 秒</div><input type="range" id="minDelayRange" min="30" max="120" value="${minSec}"></div>
        <div><div>最大延迟: <span id="maxDelayValDisplay">${maxSec}</span> 秒</div><input type="range" id="maxDelayRange" min="30" max="120" value="${maxSec}"></div>
        <hr>
        <div><strong>⏱️ 连续回复间隔范围 (秒) - 需求1</strong></div>
        <div><div>最小间隔: <span id="consecutiveMinValDisplay">${consecutiveMinSec}</span> 秒</div><input type="range" id="consecutiveMinRange" min="5" max="60" value="${consecutiveMinSec}"></div>
        <div><div>最大间隔: <span id="consecutiveMaxValDisplay">${consecutiveMaxSec}</span> 秒</div><input type="range" id="consecutiveMaxRange" min="5" max="60" value="${consecutiveMaxSec}"></div>
        <hr>
        <div><strong>💬 拍一拍设置</strong></div>
        <div>我的拍一拍标识 <input id="myPatSymbol" value="${escapeHtml(s.myPatSymbol)}" style="width:70px;"></div>
        <div>对方拍一拍标识 <input id="otherPatSymbol" value="${escapeHtml(s.otherPatSymbol)}" style="width:70px;"></div>
        <div>对方主动拍一拍概率(%): <input id="patProbability" value="${s.patProbability}" type="number" min="0" max="100" style="width:70px;"></div>
        <hr>
        <div>引用回复概率(%) <input id="replyWithQuoteProb" value="${s.replyWithQuoteProb || 40}" type="number" min="0" max="100" style="width:80px;"></div>
        <hr>
        <div>视频通话概率(%) <input id="videoCallProb" value="${s.videoCallProb || 2}" type="number" min="0" max="100" style="width:80px;"></div>
        <button id="saveChatSettingsBtn" style="margin-top:12px;">保存设置</button>
    `);
    
    let minSlider = modal.querySelector("#minDelayRange");
    let maxSlider = modal.querySelector("#maxDelayRange");
    let minSpan = modal.querySelector("#minDelayValDisplay");
    let maxSpan = modal.querySelector("#maxDelayValDisplay");
    let consecutiveMinSlider = modal.querySelector("#consecutiveMinRange");
    let consecutiveMaxSlider = modal.querySelector("#consecutiveMaxRange");
    let consecutiveMinSpan = modal.querySelector("#consecutiveMinValDisplay");
    let consecutiveMaxSpan = modal.querySelector("#consecutiveMaxValDisplay");
    
    if (minSlider && maxSlider && minSpan && maxSpan) {
        let updateMinVal = () => {
            let newMin = parseInt(minSlider.value);
            let currentMax = parseInt(maxSlider.value);
            if (newMin > currentMax) {
                newMin = currentMax;
                minSlider.value = newMin;
            }
            minSpan.innerText = newMin;
            s.replyDelayMin = newMin * 1000;
            if (s.replyDelayMin > s.replyDelayMax) s.replyDelayMax = s.replyDelayMin;
            maxSlider.value = Math.max(newMin, parseInt(maxSlider.value));
            maxSpan.innerText = maxSlider.value;
            saveData();
        };
        let updateMaxVal = () => {
            let newMax = parseInt(maxSlider.value);
            let currentMin = parseInt(minSlider.value);
            if (newMax < currentMin) {
                newMax = currentMin;
                maxSlider.value = newMax;
            }
            maxSpan.innerText = newMax;
            s.replyDelayMax = newMax * 1000;
            if (s.replyDelayMax < s.replyDelayMin) s.replyDelayMin = s.replyDelayMax;
            minSlider.value = Math.min(newMax, parseInt(minSlider.value));
            minSpan.innerText = minSlider.value;
            saveData();
        };
        minSlider.addEventListener("input", updateMinVal);
        maxSlider.addEventListener("input", updateMaxVal);
    }
    
    if (consecutiveMinSlider && consecutiveMaxSlider && consecutiveMinSpan && consecutiveMaxSpan) {
        let updateConsecutiveMin = () => {
            let newMin = parseInt(consecutiveMinSlider.value);
            let currentMax = parseInt(consecutiveMaxSlider.value);
            if (newMin > currentMax) {
                newMin = currentMax;
                consecutiveMinSlider.value = newMin;
            }
            consecutiveMinSpan.innerText = newMin;
            s.consecutiveReplyMin = newMin * 1000;
            if (s.consecutiveReplyMin > s.consecutiveReplyMax) s.consecutiveReplyMax = s.consecutiveReplyMin;
            consecutiveMaxSlider.value = Math.max(newMin, parseInt(consecutiveMaxSlider.value));
            consecutiveMaxSpan.innerText = consecutiveMaxSlider.value;
            saveData();
        };
        let updateConsecutiveMax = () => {
            let newMax = parseInt(consecutiveMaxSlider.value);
            let currentMin = parseInt(consecutiveMinSlider.value);
            if (newMax < currentMin) {
                newMax = currentMin;
                consecutiveMaxSlider.value = newMax;
            }
            consecutiveMaxSpan.innerText = newMax;
            s.consecutiveReplyMax = newMax * 1000;
            if (s.consecutiveReplyMax < s.consecutiveReplyMin) s.consecutiveReplyMin = s.consecutiveReplyMax;
            consecutiveMinSlider.value = Math.min(newMax, parseInt(consecutiveMinSlider.value));
            consecutiveMinSpan.innerText = consecutiveMinSlider.value;
            saveData();
        };
        consecutiveMinSlider.addEventListener("input", updateConsecutiveMin);
        consecutiveMaxSlider.addEventListener("input", updateConsecutiveMax);
    }
    
    let switches = modal.querySelectorAll(".switch");
    for (let sw of switches) {
        sw.onclick = () => {
            let key = sw.dataset.key;
            s[key] = !s[key];
            sw.classList.toggle("active");
            saveData();
        };
    }
    
    let saveBtn = modal.querySelector("#saveChatSettingsBtn");
    if (saveBtn) {
        saveBtn.onclick = () => {
            let myPatSymbol = modal.querySelector("#myPatSymbol").value;
            let otherPatSymbol = modal.querySelector("#otherPatSymbol").value;
            let patProbability = parseInt(modal.querySelector("#patProbability").value) || 30;
            let replyWithQuoteProb = parseInt(modal.querySelector("#replyWithQuoteProb").value) || 40;
            let videoCallProb = parseInt(modal.querySelector("#videoCallProb").value) || 2;
            if (patProbability < 0) patProbability = 0;
            if (patProbability > 100) patProbability = 100;
            if (replyWithQuoteProb < 0) replyWithQuoteProb = 0;
            if (replyWithQuoteProb > 100) replyWithQuoteProb = 100;
            if (videoCallProb < 0) videoCallProb = 0;
            if (videoCallProb > 100) videoCallProb = 100;
            s.myPatSymbol = myPatSymbol;
            s.otherPatSymbol = otherPatSymbol;
            s.patProbability = patProbability;
            s.replyWithQuoteProb = replyWithQuoteProb;
            s.videoCallProb = videoCallProb;
            saveData();
            alert("聊天设置已保存");
            modal.remove();
        };
    }
}

function openCalendarModal() {
    let today = new Date();
    let year = today.getFullYear();
    let month = today.getMonth();
    let todayStr = getTodayDateStr();
    function renderCalendar(y, m) {
        let firstDay = new Date(y, m, 1).getDay();
        let daysInMonth = new Date(y, m + 1, 0).getDate();
        let html = `<div class="calendar-container"><div class="calendar-header"><button id="prevMonth">◀</button><span>${y}年${m + 1}月</span><button id="nextMonth">▶</button></div>`;
        html += `<div class="calendar-weekdays">${["日", "一", "二", "三", "四", "五", "六"].map(d => `<div class="calendar-weekday">${d}</div>`).join("")}</div><div class="calendar-days">`;
        for (let i = 0; i < firstDay; i++) html += `<div></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
            let dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            let hasEvent = appData.calendarEvents[dateStr] && appData.calendarEvents[dateStr].length;
            let isToday = (dateStr === todayStr);
            let dayClass = "calendar-day";
            if (isToday) dayClass += " today";
            else if (hasEvent) dayClass += " has-event";
            html += `<div class="${dayClass}" data-date="${dateStr}">${d}<div class="event-marker">${hasEvent ? '📅' : ''}</div></div>`;
        }
        html += `</div><button id="addEventToday">添加今日事件</button><div id="eventList" style="margin-top:12px;"></div></div>`;
        let modal = showModal(html);
        function showEventsForDate(dateStr) {
            let events = appData.calendarEvents[dateStr] || [];
            let eventDiv = modal.querySelector("#eventList");
            if (eventDiv) {
                eventDiv.innerHTML = `<strong>${dateStr} 事件：</strong>`;
                if (events.length === 0) {
                    eventDiv.innerHTML += `<div>暂无事件</div>`;
                } else {
                    for (let idx = 0; idx < events.length; idx++) {
                        let e = events[idx];
                        eventDiv.innerHTML += `<div class="flex-between">${e.type}：${e.title}${e.note ? ` (${e.note})` : ""}<button class="delEventBtn" data-idx="${idx}" style="background:#ff3b30;">删除</button></div>`;
                    }
                }
                let addBtn = document.createElement("button");
                addBtn.innerText = "添加事件";
                addBtn.onclick = () => {
                    let type = prompt("事件类型（生日/纪念日/经期/其他）");
                    let title = prompt("事件标题");
                    let note = prompt("备注（可选）");
                    if (title) {
                        if (!appData.calendarEvents[dateStr]) appData.calendarEvents[dateStr] = [];
                        appData.calendarEvents[dateStr].push({ type: type || "其他", title: title, note: note || "" });
                        saveData();
                        modal.remove();
                        openCalendarModal();
                    }
                };
                eventDiv.appendChild(addBtn);
                let delBtns = modal.querySelectorAll(".delEventBtn");
                for (let btn of delBtns) {
                    btn.onclick = () => {
                        let idx = parseInt(btn.dataset.idx);
                        appData.calendarEvents[dateStr].splice(idx, 1);
                        if (appData.calendarEvents[dateStr].length === 0) delete appData.calendarEvents[dateStr];
                        saveData();
                        modal.remove();
                        openCalendarModal();
                    };
                }
            }
        }
        let days = modal.querySelectorAll(".calendar-day");
        for (let day of days) {
            day.onclick = () => {
                let date = day.dataset.date;
                showEventsForDate(date);
            };
        }
        let prevBtn = modal.querySelector("#prevMonth");
        if (prevBtn) {
            prevBtn.onclick = () => {
                modal.remove();
                renderCalendar(y, m - 1);
            };
        }
        let nextBtn = modal.querySelector("#nextMonth");
        if (nextBtn) {
            nextBtn.onclick = () => {
                modal.remove();
                renderCalendar(y, m + 1);
            };
        }
        let addEventTodayBtn = modal.querySelector("#addEventToday");
        if (addEventTodayBtn) {
            addEventTodayBtn.onclick = () => {
                showEventsForDate(todayStr);
            };
        }
    }
    renderCalendar(year, month);
}

// ==================== 初始化 ====================
function init() {
    loadData();
    let tabs = document.querySelectorAll(".tab-item");
    for (let tab of tabs) {
        tab.addEventListener("click", () => {
            let page = tab.dataset.page;
            currentPage = page;
            for (let t of document.querySelectorAll(".tab-item")) {
                t.classList.remove("active");
            }
            tab.classList.add("active");
            for (let p of document.querySelectorAll(".page")) {
                p.classList.remove("active");
            }
            let targetPage = document.getElementById(`page-${page}`);
            if (targetPage) {
                targetPage.classList.add("active");
            }
            renderCurrentPage();
        });
    }
    let myProfileBtn = document.getElementById("myProfileBtn");
    if (myProfileBtn) {
        myProfileBtn.addEventListener("click", () => {
            let profileTab = document.querySelector(".tab-item[data-page='profile']");
            if (profileTab) {
                profileTab.click();
            }
        });
    }
    let addBtn = document.getElementById("addBtn");
    if (addBtn) {
        addBtn.addEventListener("click", () => {
            alert("增加联系人或群聊: 请到联系人页面操作 ➕");
        });
    }
    currentPage = "messages";
    let messagesPage = document.getElementById("page-messages");
    if (messagesPage) {
        messagesPage.classList.add("active");
    }
    renderCurrentPage();
    
    // ===== 🆕 新增：启动自检测和自动清理 =====
    // 启动时延迟3秒执行，等页面加载完成
    setTimeout(function() {
        autoCleanOldMessages();      // 90天自动清理
        performPerformanceCheck();   // 性能自检测
    }, 3000);
    
    // 每30分钟检查一次性能
    setInterval(function() {
        performPerformanceCheck();
    }, 30 * 60 * 1000);
    
    // 每小时检查一次90天清理
    setInterval(function() {
        autoCleanOldMessages();
    }, 60 * 60 * 1000);
}

                for (var i = 0; i < items.length; i++) selectedIndices.add(i);
            }

        };
